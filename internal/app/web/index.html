<!DOCTYPE html>
<html lang="en">

<script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { wa: { dark:'#075E54', mid:'#128C7E', green:'#25D366', tea:'#DCF8C6', blue:'#34B7F1', gray:'#ECE5DD' } } } } }</script>

<style>
  :root { --wa-dark:#075E54; --wa-mid:#128C7E; --wa-green:#25D366; --wa-tea:#DCF8C6; --wa-blue:#34B7F1; --wa-gray:#ECE5DD; }
  body { background:#ECE5DD; color:#111827; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; margin:0; }
  .log-line { font-family:'SF Mono',Monaco,monospace; font-size:11px; white-space:pre-wrap; word-break:break-all; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }

  input[type=text]:focus,input[type=password]:focus { box-shadow:0 0 0 2px #128C7E; }

<body>
<div id="root"></div>

<!-- Native bridge shim. The Python build uses pywebview, which exposes
     `window.pywebview.api.*`. Under webview_go we bind a flat function
     `_wkpPickFolder` from Go and adapt it to the same shape so the React
     code below can stay unchanged. -->
<script>
  window.pywebview = {
    api: {
      pick_folder: async () => {
        if (typeof window._wkpPickFolder !== "function") return null;
        const p = await window._wkpPickFolder();
        return p || null;
      },
    },
  };

  // Cmd+Q shim. webview_go doesn't install an NSApplication main menu,
  // so macOS has no menu item to dispatch ⌘Q to and the keystroke is
  // silently swallowed. We listen for it here and call the bound
  // _wkpQuit, which signals webview_go to stop the run loop and lets
  // the Go side run its graceful HTTP-server shutdown — same path as
  // closing the window with the red dot.
  //
  // Captures on keydown (not keyup) so the user gets the same instant
  // feedback they expect from a native ⌘Q. preventDefault stops WebKit
  // from beeping at us. Only fires for the actual modifier (metaKey on
  // macOS, ctrlKey elsewhere) — KeyQ matches the physical key so it
  // works regardless of keyboard layout.
  window.addEventListener("keydown", (e) => {
    if (e.code !== "KeyQ") return;
    if (!(e.metaKey || e.ctrlKey)) return;
    if (e.shiftKey || e.altKey) return;
    e.preventDefault();
    if (typeof window._wkpQuit === "function") {
      try { window._wkpQuit(); } catch (_) {}
    }
  }, true);
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;

// ── Icons ─────────────────────────────────────────────────────────────────
const Svg = ({ d, size=16, cls="" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
    className={cls}><path d={d}/></svg>
);
const FolderPlusIcon = () => <Svg size={20} d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2zM12 11v6M9 14h6" />;
const FolderOpenIcon = () => <Svg size={20} d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />;
const RefreshIcon    = () => <Svg d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />;
const TrashIcon      = () => <Svg size={15} d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />;
const CheckIcon      = () => <Svg d="M20 6 9 17l-5-5" />;
const XIcon          = () => <Svg d="M18 6 6 18M6 6l12 12" />;
const BackIcon       = () => <Svg size={15} d="M19 12H5M12 19l-7-7 7-7" />;
const ArrowUpIcon    = () => <Svg size={13} d="M12 19V5M5 12l7-7 7 7" />;
const LockIcon       = () => <Svg size={13} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4" />;
const UnlockIcon     = () => <Svg size={13} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 9.9-1" />;

// ── identity helpers ──────────────────────────────────────────────────────
// phoneFromJID turns "971504320432@s.whatsapp.net" into "+971504320432".
// Returns "" for anything that isn't a phone-number JID. Mirrors
// internal/binding.Binding.Phone on the server side.
function phoneFromJID(jid) {
  if (!jid) return "";
  const at = jid.indexOf("@");
  if (at <= 0) return "";
  const digits = jid.slice(0, at);
  if (!/^[0-9]+$/.test(digits)) return "";
  return "+" + digits;
}
// shortUDID compacts a 40-hex-char iOS backup UDID into "XXXXXXXX…XXXX"
// so it can sit in a header line without crowding everything else out.
function shortUDID(u) {
  if (!u || u.length < 12) return u || "";
  return u.slice(0, 8) + "…" + u.slice(-4);
}

// ── API ───────────────────────────────────────────────────────────────────
// Build an Error from a non-OK response, preserving the HTTP status on
// `.status` so callers can branch on it (e.g. 409 = workspace already
// exists → offer "Open instead") while still reading `.message`.
function httpErr(r, e) {
  const err = new Error((e && e.detail) || r.statusText);
  err.status = r.status;
  return err;
}

const api = {
  get:  url => fetch(url).then(r => { if (!r.ok) return r.json().then(e => { throw httpErr(r, e); }); return r.json(); }),
  post: (url, body) => fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) })
    .then(r => { if (!r.ok) return r.json().then(e => { throw httpErr(r, e); }); return r.json(); }),
  del:  url => fetch(url, { method:"DELETE" })
    .then(r => { if (!r.ok) return r.json().then(e => { throw httpErr(r, e); }); }),
};

// ── ElapsedTimer ──────────────────────────────────────────────────────────
function ElapsedTimer({ isRunning, startedAt }) {
  const calcSecs = () => startedAt
    ? Math.max(0, Math.round((Date.now() - new Date(startedAt).getTime()) / 1000))
    : 0;
  const [secs, setSecs] = useState(() => calcSecs());
  useEffect(() => {
    if (!isRunning) return;
    setSecs(calcSecs());
    const id = setInterval(() => setSecs(s => s + 1), 1000);
    return () => clearInterval(id);
  }, [isRunning, startedAt]);
  const m = String(Math.floor(secs / 60)).padStart(2, "0");
  const s = String(secs % 60).padStart(2, "0");
  return <span className="tabular-nums">{m}:{s}</span>;
}

// formatBytes: human-readable size for the dir-stats line.
function formatBytes(b) {
  if (b == null || isNaN(b)) return null;
  if (b < 1024)            return `${b} B`;
  if (b < 1024 ** 2)       return `${(b / 1024).toFixed(1)} KB`;
  if (b < 1024 ** 3)       return `${(b / 1024 ** 2).toFixed(1)} MB`;
  return `${(b / 1024 ** 3).toFixed(2)} GB`;
}

// parseBackupProgress: idevicebackup2 prints lines like
//   "[01/12] Receiving file Snapshot/AppDomain-com.foo/Library/..."
// once the receive phase starts. We walk `lines` from the end and
// return the first match so the UI shows the freshest progress.
// Earlier phases (negotiation, "Sending '...'") have no [N/M] — we
// return null and the card falls back to the polled dir-stats line.
function parseBackupProgress(lines) {
  for (let i = lines.length - 1; i >= 0; i--) {
    const m = lines[i].match(/^\[(\d+)\/(\d+)\]\s*(.*)$/);
    if (m) {
      const n = parseInt(m[1], 10);
      const total = parseInt(m[2], 10);
      if (!total) continue;
      return { n, total, pct: Math.min(100, (n / total) * 100), detail: (m[3] || "").trim() };
    }
  }
  return null;
}

// ── BackupProgressCard ────────────────────────────────────────────────────
// runningLabel/successLabel/failureLabel let the caller customise
// the headline. The default copy is the Backups-tab wording so
// existing call sites work unchanged; the Database tab passes
// sync-specific strings.
//
// `dirStats` (optional) is the latest /api/backup/{udid}/dir-stats
// response, polled by App. Used only for backup jobs — the database
// sync doesn't have a meaningful dir-size signal.
function BackupProgressCard({ lines, adopted, pid, isRunning, done, startedAt, dirStats,
                              runningLabel = "Backing up…",
                              successLabel = "Backup complete.",
                              failureLabel = "Backup failed." }) {
  const [expanded, setExpanded] = useState(false);
  const bottomRef = useRef(null);
  useEffect(() => { if (expanded) bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [lines, expanded]);

  const progress = isRunning ? parseBackupProgress(lines) : null;

  // Polled dir-stats line: "12,345 files · 287 MB written".
  // Hidden once parsed [N/M] is available because that line is more
  // precise — keeping both would just be noise.
  const writtenLine = (() => {
    if (!dirStats || !dirStats.exists) return null;
    if (progress) return null;
    const parts = [];
    if (dirStats.file_count) parts.push(`${dirStats.file_count.toLocaleString()} files`);
    const sz = formatBytes(dirStats.total_bytes);
    if (sz) parts.push(`${sz} written`);
    return parts.length ? parts.join(" · ") : null;
  })();

  // Subline inside the headline area, in priority order:
  //   1. Parsed "Receiving 1,234 / 5,678" + truncated current file
  //   2. Polled dir-stats summary
  //   3. Last raw stdout line (early-phase backups, after-the-fact log tail)
  const lastLine = [...lines].reverse().find(l => l.trim()) || "";
  const subline = progress
    ? `Receiving ${progress.n.toLocaleString()} / ${progress.total.toLocaleString()} files`
    : (writtenLine || lastLine);

  // Adopted backups never get stdout, so we can't parse [N/M] — but
  // dirStats works the same way. If we have it, render the same rich
  // card the freshly-started branch uses; otherwise fall back to the
  // PID + elapsed minimalist card.
  if (adopted && isRunning && !dirStats?.exists) return (
    <div className="mt-4 rounded-xl p-4" style={{background:'#DCF8C6',border:'1px solid #128C7E'}}>
      <div className="flex items-center gap-3">
        <span className="relative flex h-3 w-3">
          <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style={{background:'#25D366'}}></span>
          <span className="relative inline-flex rounded-full h-3 w-3" style={{background:'#128C7E'}}></span>
        </span>
        <div>
          <p className="text-sm font-medium" style={{color:'#075E54'}}>Backup in progress</p>
          <p className="text-xs mt-0.5 text-gray-500">Detected running process · PID {pid}</p>
        </div>
        <span className="ml-auto text-xs text-gray-500 font-mono">
          <ElapsedTimer isRunning={isRunning} startedAt={startedAt} />
        </span>
      </div>
    </div>
  );

  if (!isRunning && done === null) return null;

  return (
    <div className="mt-4 rounded-xl overflow-hidden border" style={{borderColor:'#128C7E',background:'#fff'}}>
      <div className="flex items-center gap-3 px-4 py-3">
        {isRunning
          ? <span className="relative flex h-3 w-3">
              <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style={{background:'#25D366'}}></span>
              <span className="relative inline-flex rounded-full h-3 w-3" style={{background:'#25D366'}}></span>
            </span>
          : done ? <span className="text-green-600"><CheckIcon /></span>
                 : <span className="text-red-500"><XIcon /></span>
        }
        <div className="min-w-0 flex-1">
          {isRunning
            ? <>
                <p className="text-sm font-medium flex items-center gap-2" style={{color:'#075E54'}}>
                  <span>{runningLabel}</span>
                  {adopted && <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded" style={{background:'#DCF8C6',color:'#075E54'}}>resumed · pid {pid}</span>}
                </p>
                {subline && <p className="text-xs text-gray-500 truncate mt-0.5">{subline}</p>}
                {progress && progress.detail && (
                  <p className="text-[11px] text-gray-400 truncate mt-0.5 font-mono">{progress.detail}</p>
                )}
              </>
            : <p className={`text-sm font-medium ${done ? "text-green-600" : "text-red-500"}`}>
                {done ? successLabel : failureLabel}
              </p>
          }
        </div>
        <div className="flex items-center gap-3 shrink-0">
          {isRunning && <span className="text-xs text-gray-500 font-mono"><ElapsedTimer isRunning={isRunning} startedAt={startedAt} /></span>}
          {lines.length > 0 && (
            <button onClick={() => setExpanded(x => !x)}
              className="text-xs underline underline-offset-2" style={{color:'#128C7E'}}>
              {expanded ? "hide log" : "show log"}
            </button>
          )}
        </div>
      </div>
      {/* Progress bar fills the full card width below the headline,
          cleanly visible whether or not the log is expanded. */}
      {isRunning && progress && (
        <div className="px-4 pb-3 -mt-1">
          <div className="h-1.5 w-full rounded-full overflow-hidden" style={{background:'#ECE5DD'}}>
            <div className="h-full transition-all duration-500 ease-out"
                 style={{width:`${progress.pct}%`,background:'#25D366'}}></div>
          </div>
          <div className="flex justify-between text-[10px] text-gray-400 mt-1 tabular-nums">
            <span>{Math.round(progress.pct)}%</span>
            {writtenLineIfDifferent(dirStats, progress)}
          </div>
        </div>
      )}
      {expanded && lines.length > 0 && (
        <div className="border-t p-3 max-h-48 overflow-y-auto" style={{borderColor:'#DCF8C6',background:'#f9fafb'}}>
          {lines.map((l, i) => <div key={i} className="log-line text-gray-600 leading-5">{l || "\u00a0"}</div>)}
          <div ref={bottomRef} />
        </div>
      )}
    </div>
  );
}

// Render the polled dir-stats below the progress bar as a secondary
// hint (so the user can correlate "1,234 / 5,678 files" with disk
// usage). Returns a span so it slots into the right-aligned flex row.
function writtenLineIfDifferent(dirStats, progress) {
  if (!dirStats || !dirStats.exists) return null;
  const parts = [];
  if (dirStats.file_count) parts.push(`${dirStats.file_count.toLocaleString()} files`);
  const sz = formatBytes(dirStats.total_bytes);
  if (sz) parts.push(sz);
  if (!parts.length) return null;
  return <span>{parts.join(" · ")}</span>;
}

// ── WorkspaceDeleteModal ──────────────────────────────────────────────────
// Confirms an os.RemoveAll of the active workspace directory. The
// language is deliberately concrete ("local copy of WhatsApp data…")
// rather than abstract ("this workspace") because the destruction is
// unrecoverable — the next sync re-downloads from the encrypted iOS
// backup, but anything the user customised in the workspace (notes,
// agent state) is gone. onDeleted fires after the server's 204.
function WorkspaceDeleteModal({ workspace, onClose, onDeleted }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const confirm = async () => {
    setBusy(true);
    try { await api.del("/api/workspace/current"); onDeleted(); }
    catch(e) { setError(e.message); setBusy(false); }
  };
  const bound = workspace.binding;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[460px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-full flex items-center justify-center text-red-500" style={{background:'#fee2e2'}}><TrashIcon /></div>
          <div>
            <h2 className="text-base font-semibold text-gray-900">Delete workspace?</h2>
            <p className="text-xs text-gray-500 mt-0.5">This cannot be undone.</p>
          </div>
        </div>
        <div className="rounded-lg px-4 py-3 mb-4" style={{background:'#ECE5DD'}}>
          {bound && (
            <p className="text-sm font-medium text-gray-900">
              {bound.device_name}
              {bound.owner_jid && <span className="text-gray-500 font-normal ml-2">{phoneFromJID(bound.owner_jid)}</span>}
            </p>
          )}
          <p className={`${bound ? "text-xs text-gray-500 mt-0.5" : "text-sm font-medium text-gray-900"} font-mono break-all`}>
            {workspace.path}
          </p>
        </div>
        <p className="text-sm text-gray-600 leading-relaxed mb-4">
          The entire folder above will be permanently removed, including
          the decrypted <code className="font-mono text-xs bg-gray-100 px-1 rounded">ChatStorage.sqlite</code>,
          any on-disk media, voice notes, profile pictures, and anything
          else you've put in there. The original encrypted iOS backup on
          this Mac is not touched.
        </p>
        {error && <p className="text-sm text-red-500 mb-3">{error}</p>}
        <div className="flex gap-2">
          <button onClick={onClose} disabled={busy}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">Cancel</button>
          <button onClick={confirm} disabled={busy}
            className="flex-1 rounded-lg bg-red-500 hover:bg-red-600 disabled:opacity-50 px-4 py-2 text-sm font-semibold text-white">
            {busy ? "Deleting…" : "Delete workspace"}
          </button>
        </div>
      </div>
    </div>
  );
}

function DeleteConfirmModal({ backup, onClose, onDeleted }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const confirm = async () => {
    setBusy(true);
    try { await api.del(`/api/backups/${backup.udid}`); onDeleted(); }
    catch(e) { setError(e.message); setBusy(false); }
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[420px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-full flex items-center justify-center text-red-500" style={{background:'#fee2e2'}}><TrashIcon /></div>
          <div>
            <h2 className="text-base font-semibold text-gray-900">Delete backup?</h2>
            <p className="text-xs text-gray-500 mt-0.5">This cannot be undone.</p>
          </div>
        </div>
        <div className="rounded-lg px-4 py-3 mb-4" style={{background:'#ECE5DD'}}>
          <p className="text-sm font-medium text-gray-900">{backup.device_name}</p>
          <p className="text-xs text-gray-500 mt-0.5">{backup.product_type} · iOS {backup.product_version}</p>
          <p className="text-xs text-gray-400 mt-0.5">Last backup: {backup.last_backup}</p>
        </div>
        {error && <p className="text-sm text-red-500 mb-3">{error}</p>}
        <div className="flex gap-2">
          <button onClick={onClose} disabled={busy}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">Cancel</button>
          <button onClick={confirm} disabled={busy}
            className="flex-1 rounded-lg bg-red-500 hover:bg-red-600 disabled:opacity-50 px-4 py-2 text-sm font-semibold text-white">
            {busy ? "Deleting…" : "Delete"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── BackupCard ────────────────────────────────────────────────────────────
function BackupCard({ backup, onDelete, isBound }) {
  return (
    <div className="rounded-xl bg-white border px-5 py-4 flex items-center gap-4"
         style={{borderColor: isBound ? '#128C7E' : '#DCF8C6', opacity: isBound ? 1 : 0.7}}>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <p className="font-semibold text-gray-900 truncate">{backup.device_name}</p>
          {isBound && (
            <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded-full font-semibold"
                  style={{background:'#075E54',color:'#fff'}}>
              This workspace
            </span>
          )}
          <span className={`flex items-center gap-1 text-xs px-1.5 py-0.5 rounded-full border`}
            style={backup.is_encrypted
              ? {background:'#DCF8C6',borderColor:'#128C7E',color:'#075E54'}
              : {background:'#f3f4f6',borderColor:'#d1d5db',color:'#6b7280'}}>
            {backup.is_encrypted ? <><LockIcon /> encrypted</> : <><UnlockIcon /> unencrypted</>}
          </span>
        </div>
        <p className="text-xs text-gray-500 mt-0.5">{backup.product_type} · iOS {backup.product_version}</p>
        <p className="text-xs text-gray-500 mt-0.5">Last backup: <span className="text-gray-700">{backup.last_backup}</span></p>
        <p className="text-xs text-gray-300 mt-0.5 font-mono truncate">{backup.udid}</p>
      </div>
      <div className="shrink-0">
        <button onClick={() => onDelete(backup)} title="Delete backup"
          className="p-2 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
          <TrashIcon />
        </button>
      </div>
    </div>
  );
}

// ── PasswordPromptModal ───────────────────────────────────────────────────
// The same iOS-backup password is needed for two different operations:
//   • Running idevicebackup2 (Backups tab) — "Start backup".
//   • Decrypting an existing backup for sync (Database tab) — "Sync now".
// Both reuse this modal; `confirmLabel` lets the caller name the action
// so the button doesn't lie about what's about to happen.
function PasswordPromptModal({ device, onConfirm, onCancel, confirmLabel = "Start backup" }) {
  const [password, setPassword] = useState("");
  const [show, setShow] = useState(false);
  const inputRef = useRef(null);
  useEffect(() => { inputRef.current?.focus(); }, []);
  const submit = () => { if (password) onConfirm(password); };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[380px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <h2 className="text-base font-semibold text-gray-900 mb-1">iPhone backup password</h2>
        <p className="text-xs text-gray-500 mb-4">
          Enter the encryption password for <span className="font-medium text-gray-800">{device.name}</span>.
        </p>
        <div className="relative mb-4">
          <input ref={inputRef} type={show ? "text" : "password"} value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === "Enter" && submit()}
            className="w-full border rounded-lg px-3 py-2 pr-14 text-sm"
            style={{borderColor:'#128C7E'}}
            placeholder="Backup password" />
          <button onClick={() => setShow(x => !x)}
            className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600 px-1">
            {show ? "hide" : "show"}
          </button>
        </div>
        <div className="flex gap-2">
          <button onClick={onCancel}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">
            Cancel
          </button>
          <button onClick={submit} disabled={!password}
            className="flex-1 rounded-lg text-white disabled:opacity-40 px-4 py-2 text-sm font-semibold"
            style={{background:'#128C7E'}}>
            {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MediaIssuesModal — explainer + per-row list for failed/skipped images
// ═══════════════════════════════════════════════════════════════════════════
// Fetches GET /api/database/media-index/issues on mount, then groups
// the error rows by error-message so "11 images failed with 'decrypt:
// EOF'" doesn't render as 11 individual lines the user has to scan.
// Missing rows aren't grouped — they all share the same (non-)reason
// and the row count + sample paths are the useful signal there.
function MediaIssuesModal({ onClose }) {
  const [data, setData] = useState(null);   // null = loading, {} = loaded
  const [error, setError] = useState("");
  const [tab, setTab] = useState("errors"); // "errors" | "missing"

  useEffect(() => {
    api.get("/api/database/media-index/issues?limit=500")
      .then(setData)
      .catch(e => setError(e.message || "Failed to load issues"));
  }, []);

  // Group error rows by message so "decrypt: EOF (x11)" collapses
  // into one folded entry the user can expand to see the rowids.
  const grouped = useMemo(() => {
    if (!data || !data.errors) return [];
    const m = new Map();
    for (const row of data.errors) {
      const key = row.error || "(no error message)";
      if (!m.has(key)) m.set(key, []);
      m.get(key).push(row);
    }
    return Array.from(m.entries())
      .map(([msg, rows]) => ({ msg, rows }))
      .sort((a, b) => b.rows.length - a.rows.length);
  }, [data]);

  const errorsTotal  = data?.errors_total  ?? 0;
  const missingTotal = data?.missing_total ?? 0;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4"
         onClick={onClose}>
      <div className="w-full max-w-2xl max-h-[80vh] rounded-2xl bg-white border shadow-2xl flex flex-col"
           style={{borderColor:'#ECE5DD'}}
           onClick={e => e.stopPropagation()}>

        <header className="px-6 py-4 border-b flex items-center justify-between" style={{borderColor:'#ECE5DD'}}>
          <div>
            <h2 className="text-base font-semibold text-gray-900">Image indexing issues</h2>
            <p className="text-xs text-gray-500 mt-0.5">
              From <code>media_index</code> · most recent first
            </p>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl leading-none px-2">×</button>
        </header>

        {/* Tab strip — only show the row if either kind exists. */}
        {(errorsTotal > 0 || missingTotal > 0) && (
          <div className="px-6 pt-3 flex gap-2">
            <button onClick={() => setTab("errors")}
              className={"text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors " +
                         (tab === "errors" ? "text-white" : "text-gray-600 hover:bg-gray-100")}
              style={tab === "errors" ? {background:'#075E54'} : {}}>
              Errors ({errorsTotal.toLocaleString()})
            </button>
            <button onClick={() => setTab("missing")}
              className={"text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors " +
                         (tab === "missing" ? "text-white" : "text-gray-600 hover:bg-gray-100")}
              style={tab === "missing" ? {background:'#075E54'} : {}}>
              Missing ({missingTotal.toLocaleString()})
            </button>
          </div>
        )}

        <div className="flex-1 overflow-y-auto px-6 py-4">
          {error && <p className="text-sm text-red-500">{error}</p>}
          {!error && !data && <p className="text-sm text-gray-500">Loading…</p>}

          {data && tab === "errors" && (
            errorsTotal === 0 ? (
              <p className="text-sm text-gray-500">
                No errors recorded. Every image that the indexer could read was successfully described.
              </p>
            ) : (
              <>
                <p className="text-[11px] text-gray-500 mb-3">
                  An <strong>error</strong> means the indexer found the file in the backup manifest but
                  couldn't OCR it. Reasons: corrupted/truncated JPEG, decrypt failed, Vision crashed on a
                  specific image, etc. Showing {data.errors.length.toLocaleString()} of {errorsTotal.toLocaleString()}.
                </p>
                <div className="space-y-3">
                  {grouped.map(g => (
                    <ErrorGroup key={g.msg} msg={g.msg} rows={g.rows} />
                  ))}
                </div>
              </>
            )
          )}

          {data && tab === "missing" && (
            missingTotal === 0 ? (
              <p className="text-sm text-gray-500">
                No missing files. Every image referenced by a message exists in the backup.
              </p>
            ) : (
              <>
                <p className="text-[11px] text-gray-500 mb-3">
                  <strong>Missing</strong> means the chat references an image but the file is not present
                  in the iOS backup. This is almost always because the image was never downloaded on the
                  phone (you saw a thumbnail in chat but never tapped to fetch the full image), or WhatsApp's
                  local media cache evicted it before the backup ran. Not an error — there's simply no file
                  to OCR. Showing {data.missing.length.toLocaleString()} of {missingTotal.toLocaleString()}.
                </p>
                <ul className="space-y-1">
                  {data.missing.map(row => (
                    <li key={row.rowid} className="text-[11px] font-mono text-gray-600 truncate" title={row.manifest_path}>
                      <span className="text-gray-400">#{row.rowid}</span> · {row.manifest_path}
                    </li>
                  ))}
                </ul>
              </>
            )
          )}
        </div>

        <footer className="px-6 py-3 border-t flex justify-end" style={{borderColor:'#ECE5DD'}}>
          <button onClick={onClose}
            className="rounded-lg px-4 py-1.5 text-sm font-semibold text-white"
            style={{background:'#075E54'}}>
            Close
          </button>
        </footer>
      </div>
    </div>
  );
}

// ErrorGroup — collapsible folder for N rows that share an error message.
// Default-collapsed; expand to see rowids + manifest paths. Keeps the
// modal scannable even when there are hundreds of errors.
function ErrorGroup({ msg, rows }) {
  const [open, setOpen] = useState(rows.length <= 3); // small groups: expand by default

  return (
    <div className="rounded-lg border" style={{borderColor:'#DCF8C6'}}>
      <button onClick={() => setOpen(o => !o)}
        className="w-full px-3 py-2 flex items-center justify-between hover:bg-gray-50 text-left rounded-lg">
        <div className="min-w-0 flex-1">
          <p className="text-xs font-mono text-gray-900 truncate">{msg}</p>
        </div>
        <div className="flex items-center gap-2 shrink-0 ml-3">
          <span className="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">
            {rows.length} {rows.length === 1 ? "image" : "images"}
          </span>
          <span className="text-gray-400 text-xs">{open ? "▾" : "▸"}</span>
        </div>
      </button>
      {open && (
        <ul className="border-t px-3 py-2 space-y-1" style={{borderColor:'#DCF8C6'}}>
          {rows.map(r => (
            <li key={r.rowid} className="text-[11px] font-mono text-gray-600 truncate" title={r.manifest_path}>
              <span className="text-gray-400">#{r.rowid}</span> · {r.manifest_path}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

// ── DeviceRow ─────────────────────────────────────────────────────────────
function DeviceRow({ device, job, onStart, hasSessionPassword, onForgetPassword }) {
  const j = job || {};
  const isRunning = !!j.running;
  const done = j.done !== undefined ? j.done : null;
  const started = (j.lines || []).length > 0 || isRunning || done !== null;
  const [prompting, setPrompting] = useState(false);
  // When the server already holds a cached password for this session,
  // skip the modal entirely and reuse it. Saves a click per backup
  // after the first one in a session.
  const launch = () => {
    if (hasSessionPassword) onStart(device, "");
    else setPrompting(true);
  };
  const tryDifferentPassword = async () => {
    await onForgetPassword();
    setPrompting(true);
  };
  return (
    <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
      <div className="flex items-center justify-between gap-4">
        <div className="min-w-0">
          <div className="flex items-center gap-2">
            <span className="flex h-2 w-2 rounded-full shrink-0" style={{background:'#25D366'}}></span>
            <p className="font-semibold text-gray-900">{device.name}</p>
          </div>
          <p className="text-xs text-gray-400 mt-0.5 font-mono truncate">{device.udid}</p>
        </div>
        <button onClick={launch} disabled={isRunning}
          className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-50 px-4 py-2 text-sm font-semibold transition-colors"
          style={{background: isRunning ? '#128C7E' : '#075E54'}}>
          <RefreshIcon />
          {isRunning ? "Backing up…" : started ? "Back up again" : "Back up now"}
        </button>
      </div>
      {j.error && <p className="text-sm text-red-400 mt-2">{j.error}</p>}
      {j.error && hasSessionPassword && (
        <button onClick={tryDifferentPassword}
          className="text-xs text-gray-500 hover:text-gray-800 mt-1 underline">
          Use a different password
        </button>
      )}
      <BackupProgressCard
        lines={j.lines || []}
        adopted={!!j.adopted}
        pid={j.pid}
        isRunning={isRunning}
        done={done}
        startedAt={j.startedAt}
        dirStats={j.dirStats}
      />
      {prompting && (
        <PasswordPromptModal
          device={device}
          onConfirm={pw => { setPrompting(false); onStart(device, pw); }}
          onCancel={() => setPrompting(false)}
        />
      )}
    </div>
  );
}

// SCREEN 1 — Workspace Picker

const DEFAULT_WS_PATH = "~/Documents/my-whatsapp-chat";

function WorkspaceScreen({ onOpen }) {
  const [mode, setMode]         = useState(null);
  const [path, setPath]         = useState(DEFAULT_WS_PATH);
  const [openPath, setOpenPath] = useState("");
  const [busy, setBusy]         = useState(false);
  const [error, setError]       = useState("");
  const [existsPath, setExistsPath] = useState(""); // set when Create hits an existing folder (409)
  const [recent, setRecent]     = useState([]);

  useEffect(() => { api.get("/api/workspace/recent").then(setRecent).catch(() => {}); }, []);

  const pickFolder = async (setter) => {
    const pyapi = window.pywebview && window.pywebview.api;
    if (!pyapi) return;

  };

  const create = async () => {
    if (!path.trim()) { setError("Enter a workspace path."); return; }
    setBusy(true); setError(""); setExistsPath("");
    try { onOpen(await api.post("/api/workspace/create", { path: path.trim() })); }
    catch(e) {
      setError(e.message);
      // 409 = the folder already exists; offer to open it instead of
      // forcing the user to back out and use the Open flow manually.
      if (e.status === 409) setExistsPath(path.trim());
      setBusy(false);
    }
  };

  const open = async (p) => {
    const target = (p || openPath).trim();
    if (!target) { setError("Enter a workspace path."); return; }
    setBusy(true); setError("");
    try { onOpen(await api.post("/api/workspace/open", { path: target })); }
    catch(e) { setError(e.message); setBusy(false); }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-8" style={{background:'#ECE5DD'}}>

          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#075E54" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>

        // primary CTA in the green WhatsKept brand colour; the rest
        // stack underneath in the lighter card style.
        const existingRecent = recent.filter(r => r.exists);
        const [top, ...rest] = existingRecent;
        const hasRecent      = !!top;
        // When there's no recent at all (first run, or every recent
        // was deleted), "New workspace" inherits the primary green
        // slot so the screen still has a clear default action. When
        // there IS a recent, "New workspace" demotes to the same
        // secondary style as "Open existing".
        const newIsPrimary = !hasRecent;
        return (
          <div className="w-full max-w-sm space-y-3">
            {top && (
              <button onClick={() => open(top.path)}
                className="w-full flex items-center gap-3 rounded-xl px-5 py-4 text-left transition-colors text-white"
                style={{background:'#075E54'}}>
                <FolderOpenIcon />
                <div className="min-w-0 flex-1">
                  {top.binding ? (
                    <>
                      <p className="font-semibold text-sm truncate">
                        {top.binding.device_name || "iPhone"}
                        {top.binding.owner_jid && (
                          <span className="font-normal ml-2" style={{color:'#DCF8C6'}}>{phoneFromJID(top.binding.owner_jid)}</span>
                        )}
                      </p>
                      <p className="text-xs mt-0.5 truncate" style={{color:'#DCF8C6'}}>
                        {top.path.replace(/^\/Users\/[^/]+/, "~")}
                        {top.total_bytes > 0 && (
                          <span className="ml-2 tabular-nums">{formatBytes(top.total_bytes)}</span>
                        )}
                      </p>
                    </>
                  ) : (
                    <>
                      <p className="font-semibold text-sm truncate">{top.path.replace(/^\/Users\/[^/]+/, "~")}</p>
                      <p className="text-xs mt-0.5" style={{color:'#DCF8C6'}}>
                        {top.has_chat ? "Has ChatStorage.sqlite" : "Empty workspace"}
                        {top.total_bytes > 0 && (
                          <span className="ml-2 tabular-nums">· {formatBytes(top.total_bytes)}</span>
                        )}
                      </p>
                    </>
                  )}
                </div>
              </button>
            )}

            {rest.length > 0 && (
              <div className="space-y-1.5">
                {rest.map(r => {
                  // Bound entries surface device + phone as the primary
                  // label — the bare path isn't actionable when you have
                  // eight workspaces. Unbound entries fall back to the
                  // legacy path + status display.
                  const bound = r.binding;
                  return (
                    <button key={r.path} onClick={() => open(r.path)}
                      className="w-full flex items-center gap-3 rounded-lg bg-white hover:bg-gray-50 border px-4 py-3 text-left transition-colors"
                      style={{borderColor:'#DCF8C6'}}>

                          <>

                                <span className="text-gray-500 font-normal ml-2">{phoneFromJID(bound.owner_jid)}</span>

                            <p className="text-xs text-gray-400 mt-0.5 truncate">
                              {r.path.replace(/^\/Users\/[^/]+/, "~")}
                              {r.total_bytes > 0 && (
                                <span className="ml-2 tabular-nums">{formatBytes(r.total_bytes)}</span>
                              )}
                            </p>
                          </>
                        ) : (
                          <>
                            <p className="text-sm font-medium text-gray-800 truncate">{r.path.replace(/^\/Users\/[^/]+/, "~")}</p>
                            <p className="text-xs text-gray-400 mt-0.5">
                              {r.has_chat ? "Has ChatStorage.sqlite" : "Empty workspace"}
                              {r.total_bytes > 0 && (
                                <span className="ml-2 tabular-nums">· {formatBytes(r.total_bytes)}</span>
                              )}
                            </p>
                          </>

                      </div>
                    </button>
                  );
                })}
              </div>
            )}

            <button onClick={() => setMode("open")}
              className="w-full flex items-center gap-3 rounded-xl px-5 py-4 text-left transition-colors bg-white border hover:bg-gray-50"
              style={{borderColor:'#128C7E',color:'#075E54'}}>
              <FolderOpenIcon />
              <div>
                <p className="font-semibold text-sm">Open existing workspace</p>
                <p className="text-gray-500 text-xs mt-0.5">Browse for a workspace folder</p>
              </div>
            </button>

            <button onClick={() => setMode("create")}
              className={`w-full flex items-center gap-3 rounded-xl px-5 py-4 text-left transition-colors ${newIsPrimary ? "text-white" : "bg-white border hover:bg-gray-50"}`}
              style={newIsPrimary
                ? {background:'#075E54'}
                : {borderColor:'#128C7E',color:'#075E54'}}>
              <FolderPlusIcon />
              <div>
                <p className="font-semibold text-sm">New workspace</p>
                <p className="text-xs mt-0.5" style={newIsPrimary ? {color:'#DCF8C6'} : {color:'#6b7280'}}>
                  Set up a fresh workspace folder
                </p>
              </div>
            </button>
          </div>
        );
      })()}

      {mode === "create" && (
        <div className="w-full max-w-sm">
          <button onClick={() => { setMode(null); setError(""); }}
            className="flex items-center gap-1.5 text-sm mb-5" style={{color:'#128C7E'}}>
            <BackIcon /> Back
          </button>
          <div className="rounded-2xl bg-white border p-6 shadow-xl space-y-4" style={{borderColor:'#DCF8C6'}}>
            <div>
              <h2 className="text-base font-semibold text-gray-900 mb-0.5">New workspace</h2>
              <p className="text-xs text-gray-500">A folder will be created at the path you choose.</p>
            </div>
            <div>
              <label className="text-xs text-gray-500 block mb-1">Workspace path</label>
              <div className="flex gap-2">
                <div className="flex-1 bg-gray-50 border rounded-lg px-3 py-2 text-sm text-gray-800 truncate min-w-0" style={{borderColor:'#128C7E'}}>
                  {path || <span className="text-gray-400">{DEFAULT_WS_PATH}</span>}
                </div>
                <button onClick={() => { setExistsPath(""); setError(""); pickFolder(setPath); }}
                  className="shrink-0 rounded-lg bg-white border px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50" style={{borderColor:'#128C7E'}}>
                  Browse…
                </button>
              </div>
            </div>
            {error && <p className="text-sm text-red-500">{error}</p>}
            {existsPath ? (
              // The chosen path already exists — opening it is almost
              // always what the user wants, so make that the one-click
              // primary action instead of making them back out to Open.
              <button onClick={() => open(existsPath)} disabled={busy}
                className="w-full rounded-lg text-white disabled:opacity-50 py-2.5 text-sm font-semibold" style={{background:'#075E54'}}>
                {busy ? "Opening…" : "Open this workspace instead"}
