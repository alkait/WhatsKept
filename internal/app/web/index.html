<html lang="en">

<script src="/vendor/tailwindcss.js"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { wa: { dark:'#075E54', mid:'#128C7E', green:'#25D366', tea:'#DCF8C6', blue:'#34B7F1', gray:'#ECE5DD' } } } } }</script>
<script src="/vendor/react.production.min.js"></script>

<body>
<div id="root"></div>

<!-- Native bridge shim. The Python build uses pywebview, which exposes
     `window.pywebview.api.*`. Under webview_go we bind a flat function
     `_wkpPickFolder` from Go and adapt it to the same shape so the React
     code below can stay unchanged. -->
<script>
  window.pywebview = {
    api: {
      pick_folder: async () => {
        if (typeof window._wkpPickFolder !== "function") return null;
        const p = await window._wkpPickFolder();
        return p || null;
      },
    },
  };
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ── Icons ─────────────────────────────────────────────────────────────────
const Svg = ({ d, size=16, cls="" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
    className={cls}><path d={d}/></svg>
);
const FolderPlusIcon = () => <Svg size={20} d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2zM12 11v6M9 14h6" />;
const FolderOpenIcon = () => <Svg size={20} d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />;
const RefreshIcon    = () => <Svg d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />;
const TrashIcon      = () => <Svg size={15} d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />;
const CheckIcon      = () => <Svg d="M20 6 9 17l-5-5" />;
const XIcon          = () => <Svg d="M18 6 6 18M6 6l12 12" />;
const BackIcon       = () => <Svg size={15} d="M19 12H5M12 19l-7-7 7-7" />;
const LockIcon       = () => <Svg size={13} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4" />;
const UnlockIcon     = () => <Svg size={13} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 9.9-1" />;

// ── identity helpers ──────────────────────────────────────────────────────
// phoneFromJID turns "971504320432@s.whatsapp.net" into "+971504320432".
// Returns "" for anything that isn't a phone-number JID. Mirrors
// internal/binding.Binding.Phone on the server side.
function phoneFromJID(jid) {
  if (!jid) return "";
  const at = jid.indexOf("@");
  if (at <= 0) return "";
  const digits = jid.slice(0, at);
  if (!/^[0-9]+$/.test(digits)) return "";
  return "+" + digits;
}
// shortUDID compacts a 40-hex-char iOS backup UDID into "XXXXXXXX…XXXX"
// so it can sit in a header line without crowding everything else out.
function shortUDID(u) {
  if (!u || u.length < 12) return u || "";
  return u.slice(0, 8) + "…" + u.slice(-4);
}

// ── API ───────────────────────────────────────────────────────────────────
const api = {
  get:  url => fetch(url).then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail||r.statusText); }); return r.json(); }),
  post: (url, body) => fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) })
    .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail||r.statusText); }); return r.json(); }),
  del:  url => fetch(url, { method:"DELETE" })
    .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail||r.statusText); }); }),
};

// ── ElapsedTimer ──────────────────────────────────────────────────────────
function ElapsedTimer({ isRunning, startedAt }) {
  const calcSecs = () => startedAt
    ? Math.max(0, Math.round((Date.now() - new Date(startedAt).getTime()) / 1000))
    : 0;
  const [secs, setSecs] = useState(() => calcSecs());
  useEffect(() => {
    if (!isRunning) return;
    setSecs(calcSecs());
    const id = setInterval(() => setSecs(s => s + 1), 1000);
    return () => clearInterval(id);
  }, [isRunning, startedAt]);
  const m = String(Math.floor(secs / 60)).padStart(2, "0");
  const s = String(secs % 60).padStart(2, "0");
  return <span className="tabular-nums">{m}:{s}</span>;
}

// formatBytes: human-readable size for the dir-stats line.
function formatBytes(b) {
  if (b == null || isNaN(b)) return null;
  if (b < 1024)            return `${b} B`;
  if (b < 1024 ** 2)       return `${(b / 1024).toFixed(1)} KB`;
  if (b < 1024 ** 3)       return `${(b / 1024 ** 2).toFixed(1)} MB`;
  return `${(b / 1024 ** 3).toFixed(2)} GB`;
}

// parseBackupProgress: idevicebackup2 prints lines like
//   "[01/12] Receiving file Snapshot/AppDomain-com.foo/Library/..."
// once the receive phase starts. We walk `lines` from the end and
// return the first match so the UI shows the freshest progress.
// Earlier phases (negotiation, "Sending '...'") have no [N/M] — we
// return null and the card falls back to the polled dir-stats line.
function parseBackupProgress(lines) {
  for (let i = lines.length - 1; i >= 0; i--) {
    const m = lines[i].match(/^\[(\d+)\/(\d+)\]\s*(.*)$/);
    if (m) {
      const n = parseInt(m[1], 10);
      const total = parseInt(m[2], 10);
      if (!total) continue;
      return { n, total, pct: Math.min(100, (n / total) * 100), detail: (m[3] || "").trim() };
    }
  }
  return null;
}

// ── BackupProgressCard ────────────────────────────────────────────────────
// runningLabel/successLabel/failureLabel let the caller customise
// the headline. The default copy is the Backups-tab wording so
// existing call sites work unchanged; the Database tab passes
// sync-specific strings.
//
// `dirStats` (optional) is the latest /api/backup/{udid}/dir-stats
// response, polled by App. Used only for backup jobs — the database
// sync doesn't have a meaningful dir-size signal.
function BackupProgressCard({ lines, adopted, pid, isRunning, done, startedAt, dirStats,
                              runningLabel = "Backing up…",
                              successLabel = "Backup complete.",
                              failureLabel = "Backup failed." }) {
  const [expanded, setExpanded] = useState(false);
  const bottomRef = useRef(null);
  useEffect(() => { if (expanded) bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [lines, expanded]);

  const progress = isRunning ? parseBackupProgress(lines) : null;

  // Polled dir-stats line: "12,345 files · 287 MB written".
  // Hidden once parsed [N/M] is available because that line is more
  // precise — keeping both would just be noise.
  const writtenLine = (() => {
    if (!dirStats || !dirStats.exists) return null;
    if (progress) return null;
    const parts = [];
    if (dirStats.file_count) parts.push(`${dirStats.file_count.toLocaleString()} files`);
    const sz = formatBytes(dirStats.total_bytes);
    if (sz) parts.push(`${sz} written`);
    return parts.length ? parts.join(" · ") : null;
  })();

  // Subline inside the headline area, in priority order:
  //   1. Parsed "Receiving 1,234 / 5,678" + truncated current file
  //   2. Polled dir-stats summary
  //   3. Last raw stdout line (early-phase backups, after-the-fact log tail)
  const lastLine = [...lines].reverse().find(l => l.trim()) || "";
  const subline = progress
    ? `Receiving ${progress.n.toLocaleString()} / ${progress.total.toLocaleString()} files`
    : (writtenLine || lastLine);

  // Adopted backups never get stdout, so we can't parse [N/M] — but
  // dirStats works the same way. If we have it, render the same rich
  // card the freshly-started branch uses; otherwise fall back to the
  // PID + elapsed minimalist card.
  if (adopted && isRunning && !dirStats?.exists) return (
    <div className="mt-4 rounded-xl p-4" style={{background:'#DCF8C6',border:'1px solid #128C7E'}}>
      <div className="flex items-center gap-3">
        <span className="relative flex h-3 w-3">
          <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style={{background:'#25D366'}}></span>
          <span className="relative inline-flex rounded-full h-3 w-3" style={{background:'#128C7E'}}></span>
        </span>
        <div>
          <p className="text-sm font-medium" style={{color:'#075E54'}}>Backup in progress</p>
          <p className="text-xs mt-0.5 text-gray-500">Detected running process · PID {pid}</p>
        </div>
        <span className="ml-auto text-xs text-gray-500 font-mono">
          <ElapsedTimer isRunning={isRunning} startedAt={startedAt} />
        </span>
      </div>
    </div>
  );

  if (!isRunning && done === null) return null;

  return (
    <div className="mt-4 rounded-xl overflow-hidden border" style={{borderColor:'#128C7E',background:'#fff'}}>
      <div className="flex items-center gap-3 px-4 py-3">
        {isRunning
          ? <span className="relative flex h-3 w-3">
              <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style={{background:'#25D366'}}></span>
              <span className="relative inline-flex rounded-full h-3 w-3" style={{background:'#25D366'}}></span>
            </span>
          : done ? <span className="text-green-600"><CheckIcon /></span>
                 : <span className="text-red-500"><XIcon /></span>
        }
        <div className="min-w-0 flex-1">
          {isRunning
            ? <>
                <p className="text-sm font-medium flex items-center gap-2" style={{color:'#075E54'}}>
                  <span>{runningLabel}</span>
                  {adopted && <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded" style={{background:'#DCF8C6',color:'#075E54'}}>resumed · pid {pid}</span>}
                </p>
                {subline && <p className="text-xs text-gray-500 truncate mt-0.5">{subline}</p>}
                {progress && progress.detail && (
                  <p className="text-[11px] text-gray-400 truncate mt-0.5 font-mono">{progress.detail}</p>
                )}
              </>
            : <p className={`text-sm font-medium ${done ? "text-green-600" : "text-red-500"}`}>
                {done ? successLabel : failureLabel}
              </p>
          }
        </div>
        <div className="flex items-center gap-3 shrink-0">
          {isRunning && <span className="text-xs text-gray-500 font-mono"><ElapsedTimer isRunning={isRunning} startedAt={startedAt} /></span>}
          {lines.length > 0 && (
            <button onClick={() => setExpanded(x => !x)}
              className="text-xs underline underline-offset-2" style={{color:'#128C7E'}}>
              {expanded ? "hide log" : "show log"}
            </button>
          )}
        </div>
      </div>
      {/* Progress bar fills the full card width below the headline,
          cleanly visible whether or not the log is expanded. */}
      {isRunning && progress && (
        <div className="px-4 pb-3 -mt-1">
          <div className="h-1.5 w-full rounded-full overflow-hidden" style={{background:'#ECE5DD'}}>
            <div className="h-full transition-all duration-500 ease-out"
                 style={{width:`${progress.pct}%`,background:'#25D366'}}></div>
          </div>
          <div className="flex justify-between text-[10px] text-gray-400 mt-1 tabular-nums">
            <span>{Math.round(progress.pct)}%</span>
            {writtenLineIfDifferent(dirStats, progress)}
          </div>
        </div>
      )}
      {expanded && lines.length > 0 && (
        <div className="border-t p-3 max-h-48 overflow-y-auto" style={{borderColor:'#DCF8C6',background:'#f9fafb'}}>
          {lines.map((l, i) => <div key={i} className="log-line text-gray-600 leading-5">{l || "\u00a0"}</div>)}
          <div ref={bottomRef} />
        </div>
      )}
    </div>
  );
}

// Render the polled dir-stats below the progress bar as a secondary
// hint (so the user can correlate "1,234 / 5,678 files" with disk
// usage). Returns a span so it slots into the right-aligned flex row.
function writtenLineIfDifferent(dirStats, progress) {
  if (!dirStats || !dirStats.exists) return null;
  const parts = [];
  if (dirStats.file_count) parts.push(`${dirStats.file_count.toLocaleString()} files`);
  const sz = formatBytes(dirStats.total_bytes);
  if (sz) parts.push(sz);
  if (!parts.length) return null;
  return <span>{parts.join(" · ")}</span>;
}

// ── WorkspaceDeleteModal ──────────────────────────────────────────────────
// Confirms an os.RemoveAll of the active workspace directory. The
// language is deliberately concrete ("local copy of WhatsApp data…")
// rather than abstract ("this workspace") because the destruction is
// unrecoverable — the next sync re-downloads from the encrypted iOS
// backup, but anything the user customised in the workspace (notes,
// agent state) is gone. onDeleted fires after the server's 204.
function WorkspaceDeleteModal({ workspace, onClose, onDeleted }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const confirm = async () => {
    setBusy(true);
    try { await api.del("/api/workspace/current"); onDeleted(); }
    catch(e) { setError(e.message); setBusy(false); }
  };
  const bound = workspace.binding;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[460px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-full flex items-center justify-center text-red-500" style={{background:'#fee2e2'}}><TrashIcon /></div>
          <div>
            <h2 className="text-base font-semibold text-gray-900">Delete workspace?</h2>
            <p className="text-xs text-gray-500 mt-0.5">This cannot be undone.</p>
          </div>
        </div>
        <div className="rounded-lg px-4 py-3 mb-4" style={{background:'#ECE5DD'}}>
          {bound && (
            <p className="text-sm font-medium text-gray-900">
              {bound.device_name}
              {bound.owner_jid && <span className="text-gray-500 font-normal ml-2">{phoneFromJID(bound.owner_jid)}</span>}
            </p>
          )}
          <p className={`${bound ? "text-xs text-gray-500 mt-0.5" : "text-sm font-medium text-gray-900"} font-mono break-all`}>
            {workspace.path}
          </p>
        </div>
        <p className="text-sm text-gray-600 leading-relaxed mb-4">
          The entire folder above will be permanently removed, including
          the decrypted <code className="font-mono text-xs bg-gray-100 px-1 rounded">ChatStorage.sqlite</code>,
          any on-disk media, voice notes, profile pictures, and anything
          else you've put in there. The original encrypted iOS backup on
          this Mac is not touched.
        </p>
        {error && <p className="text-sm text-red-500 mb-3">{error}</p>}
        <div className="flex gap-2">
          <button onClick={onClose} disabled={busy}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">Cancel</button>
          <button onClick={confirm} disabled={busy}
            className="flex-1 rounded-lg bg-red-500 hover:bg-red-600 disabled:opacity-50 px-4 py-2 text-sm font-semibold text-white">
            {busy ? "Deleting…" : "Delete workspace"}
          </button>
        </div>
      </div>
    </div>
  );
}

function DeleteConfirmModal({ backup, onClose, onDeleted }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const confirm = async () => {
    setBusy(true);
    try { await api.del(`/api/backups/${backup.udid}`); onDeleted(); }
    catch(e) { setError(e.message); setBusy(false); }
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[420px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-full flex items-center justify-center text-red-500" style={{background:'#fee2e2'}}><TrashIcon /></div>
          <div>
            <h2 className="text-base font-semibold text-gray-900">Delete backup?</h2>
            <p className="text-xs text-gray-500 mt-0.5">This cannot be undone.</p>
          </div>
        </div>
        <div className="rounded-lg px-4 py-3 mb-4" style={{background:'#ECE5DD'}}>
          <p className="text-sm font-medium text-gray-900">{backup.device_name}</p>
          <p className="text-xs text-gray-500 mt-0.5">{backup.product_type} · iOS {backup.product_version}</p>
          <p className="text-xs text-gray-400 mt-0.5">Last backup: {backup.last_backup}</p>
        </div>
        {error && <p className="text-sm text-red-500 mb-3">{error}</p>}
        <div className="flex gap-2">
          <button onClick={onClose} disabled={busy}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">Cancel</button>
          <button onClick={confirm} disabled={busy}
            className="flex-1 rounded-lg bg-red-500 hover:bg-red-600 disabled:opacity-50 px-4 py-2 text-sm font-semibold text-white">
            {busy ? "Deleting…" : "Delete"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── BackupCard ────────────────────────────────────────────────────────────
function BackupCard({ backup, onDelete, isBound }) {
  return (
    <div className="rounded-xl bg-white border px-5 py-4 flex items-center gap-4"
         style={{borderColor: isBound ? '#128C7E' : '#DCF8C6', opacity: isBound ? 1 : 0.7}}>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <p className="font-semibold text-gray-900 truncate">{backup.device_name}</p>
          {isBound && (
            <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded-full font-semibold"
                  style={{background:'#075E54',color:'#fff'}}>
              This workspace
            </span>
          )}
          <span className={`flex items-center gap-1 text-xs px-1.5 py-0.5 rounded-full border`}
            style={backup.is_encrypted
              ? {background:'#DCF8C6',borderColor:'#128C7E',color:'#075E54'}
              : {background:'#f3f4f6',borderColor:'#d1d5db',color:'#6b7280'}}>
            {backup.is_encrypted ? <><LockIcon /> encrypted</> : <><UnlockIcon /> unencrypted</>}
          </span>
        </div>
        <p className="text-xs text-gray-500 mt-0.5">{backup.product_type} · iOS {backup.product_version}</p>
        <p className="text-xs text-gray-500 mt-0.5">Last backup: <span className="text-gray-700">{backup.last_backup}</span></p>
        <p className="text-xs text-gray-300 mt-0.5 font-mono truncate">{backup.udid}</p>
      </div>
      <div className="shrink-0">
        <button onClick={() => onDelete(backup)} title="Delete backup"
          className="p-2 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
          <TrashIcon />
        </button>
      </div>
    </div>
  );
}

// ── PasswordPromptModal ───────────────────────────────────────────────────
// The same iOS-backup password is needed for two different operations:
//   • Running idevicebackup2 (Backups tab) — "Start backup".
//   • Decrypting an existing backup for sync (Database tab) — "Sync now".
// Both reuse this modal; `confirmLabel` lets the caller name the action
// so the button doesn't lie about what's about to happen.
function PasswordPromptModal({ device, onConfirm, onCancel, confirmLabel = "Start backup" }) {
  const [password, setPassword] = useState("");
  const [show, setShow] = useState(false);
  const inputRef = useRef(null);
  useEffect(() => { inputRef.current?.focus(); }, []);
  const submit = () => { if (password) onConfirm(password); };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[380px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <h2 className="text-base font-semibold text-gray-900 mb-1">iPhone backup password</h2>
        <p className="text-xs text-gray-500 mb-4">
          Enter the encryption password for <span className="font-medium text-gray-800">{device.name}</span>.
        </p>
        <div className="relative mb-4">
          <input ref={inputRef} type={show ? "text" : "password"} value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === "Enter" && submit()}
            className="w-full border rounded-lg px-3 py-2 pr-14 text-sm"
            style={{borderColor:'#128C7E'}}
            placeholder="Backup password" />
          <button onClick={() => setShow(x => !x)}
            className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600 px-1">
            {show ? "hide" : "show"}
          </button>
        </div>
        <div className="flex gap-2">
          <button onClick={onCancel}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">
            Cancel
          </button>
          <button onClick={submit} disabled={!password}
            className="flex-1 rounded-lg text-white disabled:opacity-40 px-4 py-2 text-sm font-semibold"
            style={{background:'#128C7E'}}>
            {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MediaIssuesModal — explainer + per-row list for failed/skipped images
// ═══════════════════════════════════════════════════════════════════════════
// Fetches GET /api/database/media-index/issues on mount, then groups
// the error rows by error-message so "11 images failed with 'decrypt:
// EOF'" doesn't render as 11 individual lines the user has to scan.
// Missing rows aren't grouped — they all share the same (non-)reason
// and the row count + sample paths are the useful signal there.
function MediaIssuesModal({ onClose }) {
  const [data, setData] = useState(null);   // null = loading, {} = loaded
  const [error, setError] = useState("");
  const [tab, setTab] = useState("errors"); // "errors" | "missing"

  useEffect(() => {
    api.get("/api/database/media-index/issues?limit=500")
      .then(setData)
      .catch(e => setError(e.message || "Failed to load issues"));
  }, []);

  // Group error rows by message so "decrypt: EOF (x11)" collapses
  // into one folded entry the user can expand to see the rowids.
  const grouped = useMemo(() => {
    if (!data || !data.errors) return [];
    const m = new Map();
    for (const row of data.errors) {
      const key = row.error || "(no error message)";
      if (!m.has(key)) m.set(key, []);
      m.get(key).push(row);
    }
    return Array.from(m.entries())
      .map(([msg, rows]) => ({ msg, rows }))
      .sort((a, b) => b.rows.length - a.rows.length);
  }, [data]);

  const errorsTotal  = data?.errors_total  ?? 0;
  const missingTotal = data?.missing_total ?? 0;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4"
         onClick={onClose}>
      <div className="w-full max-w-2xl max-h-[80vh] rounded-2xl bg-white border shadow-2xl flex flex-col"
           style={{borderColor:'#ECE5DD'}}
           onClick={e => e.stopPropagation()}>

        <header className="px-6 py-4 border-b flex items-center justify-between" style={{borderColor:'#ECE5DD'}}>
          <div>
            <h2 className="text-base font-semibold text-gray-900">Image indexing issues</h2>
            <p className="text-xs text-gray-500 mt-0.5">
              From <code>media_index</code> · most recent first
            </p>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl leading-none px-2">×</button>
        </header>

        {/* Tab strip — only show the row if either kind exists. */}
        {(errorsTotal > 0 || missingTotal > 0) && (
          <div className="px-6 pt-3 flex gap-2">
            <button onClick={() => setTab("errors")}
              className={"text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors " +
                         (tab === "errors" ? "text-white" : "text-gray-600 hover:bg-gray-100")}
              style={tab === "errors" ? {background:'#075E54'} : {}}>
              Errors ({errorsTotal.toLocaleString()})
            </button>
            <button onClick={() => setTab("missing")}
              className={"text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors " +
                         (tab === "missing" ? "text-white" : "text-gray-600 hover:bg-gray-100")}
              style={tab === "missing" ? {background:'#075E54'} : {}}>
              Missing ({missingTotal.toLocaleString()})
            </button>
          </div>
        )}

        <div className="flex-1 overflow-y-auto px-6 py-4">
          {error && <p className="text-sm text-red-500">{error}</p>}
          {!error && !data && <p className="text-sm text-gray-500">Loading…</p>}

          {data && tab === "errors" && (
            errorsTotal === 0 ? (
              <p className="text-sm text-gray-500">
                No errors recorded. Every image that the indexer could read was successfully described.
              </p>
            ) : (
              <>
                <p className="text-[11px] text-gray-500 mb-3">
                  An <strong>error</strong> means the indexer found the file in the backup manifest but
                  couldn't OCR it. Reasons: corrupted/truncated JPEG, decrypt failed, Vision crashed on a
                  specific image, etc. Showing {data.errors.length.toLocaleString()} of {errorsTotal.toLocaleString()}.
                </p>
                <div className="space-y-3">
                  {grouped.map(g => (
                    <ErrorGroup key={g.msg} msg={g.msg} rows={g.rows} />
                  ))}
                </div>
              </>
            )
          )}

          {data && tab === "missing" && (
            missingTotal === 0 ? (
              <p className="text-sm text-gray-500">
                No missing files. Every image referenced by a message exists in the backup.
              </p>
            ) : (
              <>
                <p className="text-[11px] text-gray-500 mb-3">
                  <strong>Missing</strong> means the chat references an image but the file is not present
                  in the iOS backup. This is almost always because the image was never downloaded on the
                  phone (you saw a thumbnail in chat but never tapped to fetch the full image), or WhatsApp's
                  local media cache evicted it before the backup ran. Not an error — there's simply no file
                  to OCR. Showing {data.missing.length.toLocaleString()} of {missingTotal.toLocaleString()}.
                </p>
                <ul className="space-y-1">
                  {data.missing.map(row => (
                    <li key={row.rowid} className="text-[11px] font-mono text-gray-600 truncate" title={row.manifest_path}>
                      <span className="text-gray-400">#{row.rowid}</span> · {row.manifest_path}
                    </li>
                  ))}
                </ul>
              </>
            )
          )}
        </div>

        <footer className="px-6 py-3 border-t flex justify-end" style={{borderColor:'#ECE5DD'}}>
          <button onClick={onClose}
            className="rounded-lg px-4 py-1.5 text-sm font-semibold text-white"
            style={{background:'#075E54'}}>
            Close
          </button>
        </footer>
      </div>
    </div>
  );
}

// ErrorGroup — collapsible folder for N rows that share an error message.
// Default-collapsed; expand to see rowids + manifest paths. Keeps the
// modal scannable even when there are hundreds of errors.
function ErrorGroup({ msg, rows }) {
  const [open, setOpen] = useState(rows.length <= 3); // small groups: expand by default

  return (
    <div className="rounded-lg border" style={{borderColor:'#DCF8C6'}}>
      <button onClick={() => setOpen(o => !o)}
        className="w-full px-3 py-2 flex items-center justify-between hover:bg-gray-50 text-left rounded-lg">
        <div className="min-w-0 flex-1">
          <p className="text-xs font-mono text-gray-900 truncate">{msg}</p>
        </div>
        <div className="flex items-center gap-2 shrink-0 ml-3">
          <span className="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">
            {rows.length} {rows.length === 1 ? "image" : "images"}
          </span>
          <span className="text-gray-400 text-xs">{open ? "▾" : "▸"}</span>
        </div>
      </button>
      {open && (
        <ul className="border-t px-3 py-2 space-y-1" style={{borderColor:'#DCF8C6'}}>
          {rows.map(r => (
            <li key={r.rowid} className="text-[11px] font-mono text-gray-600 truncate" title={r.manifest_path}>
              <span className="text-gray-400">#{r.rowid}</span> · {r.manifest_path}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

// ── DeviceRow ─────────────────────────────────────────────────────────────
function DeviceRow({ device, job, onStart, hasSessionPassword, onForgetPassword }) {
  const j = job || {};
  const isRunning = !!j.running;
  const done = j.done !== undefined ? j.done : null;
  const started = (j.lines || []).length > 0 || isRunning || done !== null;
  const [prompting, setPrompting] = useState(false);
  // When the server already holds a cached password for this session,
  // skip the modal entirely and reuse it. Saves a click per backup
  // after the first one in a session.
  const launch = () => {
    if (hasSessionPassword) onStart(device, "");
    else setPrompting(true);
  };
  const tryDifferentPassword = async () => {
    await onForgetPassword();
    setPrompting(true);
  };
  return (
    <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
      <div className="flex items-center justify-between gap-4">
        <div className="min-w-0">
          <div className="flex items-center gap-2">
            <span className="flex h-2 w-2 rounded-full shrink-0" style={{background:'#25D366'}}></span>
            <p className="font-semibold text-gray-900">{device.name}</p>
          </div>
          <p className="text-xs text-gray-400 mt-0.5 font-mono truncate">{device.udid}</p>
        </div>
        <button onClick={launch} disabled={isRunning}
          className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-50 px-4 py-2 text-sm font-semibold transition-colors"
          style={{background: isRunning ? '#128C7E' : '#075E54'}}>
          <RefreshIcon />
          {isRunning ? "Backing up…" : started ? "Back up again" : "Back up now"}
        </button>
      </div>
      {j.error && <p className="text-sm text-red-400 mt-2">{j.error}</p>}
      {j.error && hasSessionPassword && (
        <button onClick={tryDifferentPassword}
          className="text-xs text-gray-500 hover:text-gray-800 mt-1 underline">
          Use a different password
        </button>
      )}
      <BackupProgressCard
        lines={j.lines || []}
        adopted={!!j.adopted}
        pid={j.pid}
        isRunning={isRunning}
        done={done}
        startedAt={j.startedAt}
        dirStats={j.dirStats}
      />
      {prompting && (
        <PasswordPromptModal
          device={device}
          onConfirm={pw => { setPrompting(false); onStart(device, pw); }}
          onCancel={() => setPrompting(false)}
        />
      )}
    </div>
  );
}

      {mode === "open" && (

            <BackIcon /> Back

          <div className="rounded-2xl bg-white border p-6 shadow-xl space-y-4" style={{borderColor:'#DCF8C6'}}>

                  Browse…

            {error && <p className="text-sm text-red-500">{error}</p>}
            <button onClick={() => open()} disabled={busy}
              className="w-full rounded-lg text-white disabled:opacity-50 py-2.5 text-sm font-semibold" style={{background:'#075E54'}}>
              {busy ? "Opening…" : "Open workspace"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DatabaseTab — Messages sync card
// ═══════════════════════════════════════════════════════════════════════════
// One card. Smart copy off `dbStatus`. Re-uses PasswordPromptModal for
// the backup password (same encryption password as `idevicebackup2`,
// since postprocess.SyncMessages decrypts from the latest backup on
// disk).
function relativeTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const sec = Math.floor((Date.now() - d.getTime()) / 1000);
  if (sec < 60)   return "just now";
  if (sec < 3600) return `${Math.floor(sec/60)} min ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)} h ago`;
  return `${Math.floor(sec/86400)} d ago`;
}

function DatabaseTab({ dbStatus, reloadDbStatus, job, mediaJob, voiceJob, modelJob, onSync, onMediaIndex, onVoiceIndex, onVoiceModelDownload, hasSessionPassword, onForgetPassword, binding, onForgetBinding }) {
  const [prompting, setPrompting] = useState(false);
  // Same UX rule as DeviceRow: if the server already has a cached
  // password for this session, skip the modal.
  const launch = () => {
    if (hasSessionPassword) onSync("");
    else setPrompting(true);
  };
  const tryDifferentPassword = async () => {
    await onForgetPassword();
    setPrompting(true);
  };
  const j = job || {};
  const isRunning = !!j.running;
  const hasDone = j.done !== undefined && j.done !== null;

  // Re-fetch status when a sync finishes so message/fts counts and
  // last_synced_at refresh without the user having to click Refresh.
  useEffect(() => {
    if (hasDone && j.done === true) reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) {
    return <div className="text-sm text-gray-400 py-8 text-center">Loading…</div>;
  }

  // Derive the four states.
  const hasBackups = !!dbStatus.has_backups;
  const dbExists   = !!dbStatus.db_exists;
  const isStale    = !!dbStatus.is_stale;
  const msgCount    = dbStatus.message_count;
  const ftsCount    = dbStatus.fts_count;
  const avatarCount  = dbStatus.avatar_count;
  const contactCount = dbStatus.contact_count;
  const lastSynced  = dbStatus.last_synced_at;
  const latestBkp   = dbStatus.latest_backup_at;

  let title, subtitle, buttonLabel, buttonPrimary, statusDot;
  if (!hasBackups) {
    title         = "No iOS backups found";
    subtitle      = "Run a backup from the Backups tab first.";
    buttonLabel   = "Sync messages";
    buttonPrimary = false;
    statusDot     = "#9ca3af"; // gray
  } else if (!dbExists) {
    title         = "Ready for first sync";
    subtitle      = `Latest backup taken ${relativeTime(latestBkp)}. Click to decrypt and index messages.`;
    buttonLabel   = "Sync messages";
    buttonPrimary = true;
    statusDot     = "#f59e0b"; // amber
  } else if (isStale) {
    title         = "New messages available";
    subtitle      = `Last synced ${relativeTime(lastSynced)} · newer backup taken ${relativeTime(latestBkp)}.`;
    buttonLabel   = "Sync now";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else {
    title         = "Up to date";
    const parts = [];
    if (msgCount != null) parts.push(`${msgCount.toLocaleString()} messages`);
    if (ftsCount != null) parts.push(`${ftsCount.toLocaleString()} in FTS`);
    if (contactCount != null && contactCount > 0) parts.push(`${contactCount.toLocaleString()} contacts`);
    if (avatarCount != null && avatarCount > 0) parts.push(`${avatarCount.toLocaleString()} avatars`);
    parts.push(`synced ${relativeTime(lastSynced)}`);
    subtitle      = parts.join(" · ");
    buttonLabel   = "Sync again";
    buttonPrimary = false;
    statusDot     = "#25D366"; // green
  }

  const buttonDisabled = isRunning || !hasBackups;

  return (
    <>
    <section>
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-xs font-semibold uppercase tracking-wider" style={{color:'#075E54'}}>Messages database</h2>
        <button onClick={reloadDbStatus} className="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">
          <RefreshIcon /> Refresh
        </button>
      </div>

      <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-semibold text-gray-900 text-sm">{title}</p>
              {isStale && !isRunning && (
                <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded animate-pulse"
                      style={{background:'#fef3c7', color:'#92400e'}}>
                  Action needed
                </span>
              )}
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>
            {dbExists && dbStatus.db_path && (
              <p className="text-[11px] text-gray-400 mt-1 font-mono truncate">{dbStatus.db_path}</p>
            )}
          </div>
          <button onClick={launch} disabled={buttonDisabled}
            className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
            style={{background: isRunning ? '#128C7E' : buttonPrimary ? '#075E54' : '#6b7280'}}
            title={!hasBackups ? "No iOS backups available yet" : ""}>
            <RefreshIcon />
            {isRunning ? "Syncing…" : buttonLabel}
          </button>
        </div>

        {j.error && <p className="text-sm text-red-500 mt-3">{j.error}</p>}
        {j.error && hasSessionPassword && (
          <button onClick={tryDifferentPassword}
            className="text-xs text-gray-500 hover:text-gray-800 mt-1 underline mr-3">
            Use a different password
          </button>
        )}
        {j.error && binding && (
          <button onClick={onForgetBinding}
            className="text-xs text-gray-500 hover:text-red-600 mt-1 underline">
            Forget this workspace's identity
          </button>
        )}

        <BackupProgressCard
          lines={j.lines || []}
          adopted={!!j.adopted}
          pid={j.pid}
          isRunning={isRunning}
          done={hasDone ? j.done : null}
          startedAt={j.startedAt}
          runningLabel="Syncing messages…"
          successLabel="Sync complete."
          failureLabel="Sync failed."
        />
      </div>

      <p className="text-[11px] text-gray-400 leading-relaxed mt-3">
        Decrypts the latest backup's ChatStorage.sqlite into your workspace, applies the SQL view layer
        (chats, messages, FTS5 index), syncs iOS Contacts + WhatsApp avatars, and writes <code>AGENTS.md</code>
        plus per-agent ignore files. Voice transcription is a separate, opt-in stage that will land in a
        future update.
      </p>
    </section>

    <MediaIndexCard
      dbStatus={dbStatus}
      job={mediaJob}
      onMediaIndex={onMediaIndex}
      hasSessionPassword={hasSessionPassword}
      reloadDbStatus={reloadDbStatus}
    />

    <VoiceIndexCard
      dbStatus={dbStatus}
      job={voiceJob}
      modelJob={modelJob}
      onVoiceIndex={onVoiceIndex}
      onVoiceModelDownload={onVoiceModelDownload}
      hasSessionPassword={hasSessionPassword}
      reloadDbStatus={reloadDbStatus}
    />

    {prompting && (
      <PasswordPromptModal
        device={{ name: "the latest iPhone backup" }}
        onConfirm={pw => { setPrompting(false); onSync(pw); }}
        onCancel={() => setPrompting(false)}
        confirmLabel="Sync messages"
      />
    )}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MediaIndexCard — "Sync images" section under the Database tab
// ═══════════════════════════════════════════════════════════════════════════
// Lifecycle parallels DatabaseTab's messages card: read counts from
// dbStatus, decide a state ("idle / partial / done / no-db / running"),
// render the button accordingly, and (when running) show a structured
// progress card driven by the "progress" events the media-index job
// emits over SSE.
function MediaIndexCard({ dbStatus, job, onMediaIndex, hasSessionPassword, reloadDbStatus }) {
  const [prompting, setPrompting] = useState(false);
  const [showIssues, setShowIssues] = useState(false);
  const j = job || {};
  const isRunning = !!j.running;
  const hasDone   = j.done !== undefined && j.done !== null;
  const progress  = j.progress || null;

  // Reload counts on every successful finish so the header gauge
  // updates from "5,210 / 31,608" → "5,260 / 31,608" without a
  // manual refresh.
  useEffect(() => {
    if (hasDone && j.done === true) reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) return null;
  const hasDB    = !!dbStatus.db_exists;
  const total    = dbStatus.image_total ?? null;
  const indexed  = dbStatus.image_described ?? 0;
  const remaining = total != null ? Math.max(total - indexed, 0) : null;
  const allDone   = total != null && total > 0 && indexed >= total;

  let title, subtitle, buttonLabel, buttonPrimary, statusDot;
  if (!hasDB) {
    title         = "Run a messages sync first";
    subtitle      = "Image indexing reads the message database — sync that above before scanning images.";
    buttonLabel   = "Sync images";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (total === 0) {
    title         = "No image messages on device";
    subtitle      = "There's nothing to index — your WhatsApp has no JPG images.";
    buttonLabel   = "Sync images";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (allDone) {
    title         = "All images indexed";
    subtitle      = `${indexed.toLocaleString()} of ${total.toLocaleString()} images have OCR text + classification labels in wa_image_text.`;
    buttonLabel   = "Re-scan images";
    buttonPrimary = false;
    statusDot     = "#25D366";
  } else if (indexed === 0) {
    title         = "Images not yet indexed";
    subtitle      = total != null
      ? `${total.toLocaleString()} images on the device. Scanning will OCR + classify each one via Apple Vision (~0.2 s / image).`
      : "Scan will OCR + classify each image via Apple Vision (~0.2 s / image).";
    buttonLabel   = "Sync images";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else {
    title         = "Resume image indexing";
    subtitle      = `${indexed.toLocaleString()} / ${total.toLocaleString()} indexed · ${remaining.toLocaleString()} remaining.`;
    buttonLabel   = "Resume";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  }

  const pct = (total != null && total > 0)
    ? Math.min(100, Math.round((indexed / total) * 100))
    : 0;

  const launch = () => {
    if (hasSessionPassword) onMediaIndex("");
    else setPrompting(true);
  };

  const buttonDisabled = isRunning || !hasDB || total === 0;

  return (
    <section className="mt-6">
      <h2 className="text-xs font-semibold uppercase tracking-wider mb-3" style={{color:'#075E54'}}>Image OCR</h2>

      <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-semibold text-gray-900 text-sm">{title}</p>
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>

            {/* Static (non-running) progress bar, when there's progress to show. */}
            {!isRunning && hasDB && total != null && total > 0 && (
              <div className="mt-3">
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width: `${pct}%`, background:'#25D366'}}></div>
                </div>
                <div className="flex items-center justify-between mt-1">
                  <p className="text-[10px] text-gray-400">{pct}% indexed</p>
                  {/* Idle-state issues link — driven by dbStatus, not the
                      current run (which may not exist yet). Hidden when
                      both counts are zero so the card stays uncluttered
                      in the happy path. */}
                  {((dbStatus.image_errors ?? 0) > 0 || (dbStatus.image_missing ?? 0) > 0) && (
                    <button onClick={() => setShowIssues(true)}
                      className="text-[10px] text-gray-500 hover:text-gray-900 underline decoration-dotted">
                      View {((dbStatus.image_errors ?? 0) + (dbStatus.image_missing ?? 0)).toLocaleString()} issue
                      {((dbStatus.image_errors ?? 0) + (dbStatus.image_missing ?? 0)) === 1 ? "" : "s"}
                    </button>
                  )}
                </div>
              </div>
            )}
          </div>

          <button onClick={launch} disabled={buttonDisabled}
            className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
            style={{background: isRunning ? '#128C7E' : buttonPrimary ? '#075E54' : '#6b7280'}}>
            <RefreshIcon />
            {isRunning ? "Indexing…" : buttonLabel}
          </button>
        </div>

        {j.error && <p className="text-sm text-red-500 mt-3">{j.error}</p>}

        {/* Live progress card while running — driven by the structured
            "progress" SSE event the media-index job emits every ~25 rows. */}
        {isRunning && (
          <div className="mt-4 rounded-lg p-4" style={{background:'#F0F7F0', border:'1px solid #DCF8C6'}}>
            {progress ? (
              <>
                <div className="flex items-baseline justify-between text-xs mb-2">
                  <span className="font-semibold text-gray-900">
                    {progress.done.toLocaleString()} / {(progress.pending || 0).toLocaleString()} images
                  </span>
                  <span className="text-gray-500">
                    {progress.rate_per_sec ? `${progress.rate_per_sec.toFixed(1)}/s` : ""}
                    {progress.eta_seconds > 0 ? ` · ETA ${fmtEta(progress.eta_seconds)}` : ""}
                  </span>
                </div>
                <div className="h-2 w-full bg-white rounded-full overflow-hidden border" style={{borderColor:'#DCF8C6'}}>
                  <div className="h-full rounded-full transition-all duration-500" style={{
                    width: `${Math.min(100, Math.round((progress.done / Math.max(progress.pending, 1)) * 100))}%`,
                    background:'#25D366',
                  }}></div>
                </div>
                <div className="grid grid-cols-4 gap-2 mt-3 text-[11px] text-gray-600">
                  <div title="Images where Vision found readable text (OCR returned a non-empty string).">
                    <span className="font-semibold text-gray-900">{progress.with_ocr.toLocaleString()}</span> with OCR
                  </div>
                  <div title="Images where Vision returned at least one classification label above the confidence floor.">
                    <span className="font-semibold text-gray-900">{progress.with_labels.toLocaleString()}</span> labelled
                  </div>
                  <div title="Chat references an image whose file isn't in the backup — typically never downloaded on device. Not an error.">
                    <span className="font-semibold text-gray-900">{progress.missing.toLocaleString()}</span> missing
                  </div>
                  <div title="Indexer found the file but couldn't OCR it (corrupted/truncated JPEG, decrypt failed, Vision crashed, etc).">
                    <span className="font-semibold text-gray-900">{progress.errors.toLocaleString()}</span> errors
                  </div>
                </div>
                {(progress.errors > 0 || progress.missing > 0) && (
                  <div className="mt-2">
                    <button onClick={() => setShowIssues(true)}
                      className="text-[11px] text-gray-500 hover:text-gray-900 underline decoration-dotted">
                      View {(progress.errors + progress.missing).toLocaleString()} issue
                      {(progress.errors + progress.missing) === 1 ? "" : "s"}
                    </button>
                  </div>
                )}
              </>
            ) : (
              <p className="text-xs text-gray-500">Preparing…</p>
            )}
            {/* Tail of the log lines for transparency. */}
            {j.lines && j.lines.length > 0 && (
              <p className="text-[10px] text-gray-400 mt-3 font-mono truncate">
                {j.lines[j.lines.length - 1]}
              </p>
            )}
          </div>
        )}

        {hasDone && j.done === true && !isRunning && (
          <p className="text-xs text-gray-500 mt-3">✓ Indexing complete. Agent queries can now MATCH on image content.</p>
        )}
      </div>

      <p className="text-[11px] text-gray-400 leading-relaxed mt-3">
        Decrypts each WhatsApp image from the iOS backup to <code>./media/&lt;rowid&gt;.jpg</code>, then runs
        Apple Vision (OCR + classification) and stores results in <code>wa_image_text</code>. Resumable: cancel
        anytime and re-run to pick up where you left off. Orphan JPEGs from deleted messages are pruned on the
        next message sync, so this folder mirrors device state.
      </p>

      {prompting && (
        <PasswordPromptModal
          device={{ name: "the latest iPhone backup" }}
          onConfirm={pw => { setPrompting(false); onMediaIndex(pw); }}
          onCancel={() => setPrompting(false)}
          confirmLabel="Sync images"
        />
      )}

      {showIssues && <MediaIssuesModal onClose={() => setShowIssues(false)} />}
    </section>
  );
}

// fmtEta formats a duration in seconds for the live progress card.
function fmtEta(secs) {
  if (!secs || secs < 0) return "—";
  if (secs < 60)   return `${Math.round(secs)}s`;
  if (secs < 3600) return `${(secs/60).toFixed(1)}m`;
  return `${(secs/3600).toFixed(1)}h`;
}

// fmtMB formats a byte count to a "X MB" string. Used by the
// voice-model download modal's progress line.
function fmtMB(bytes) {
  if (!bytes && bytes !== 0) return "—";
  return `${(bytes / (1024*1024)).toFixed(0)} MB`;
}

// ═══════════════════════════════════════════════════════════════════════════
// VoiceIndexCard — "Sync voice notes" section under the Database tab
// ═══════════════════════════════════════════════════════════════════════════
// Mirrors MediaIndexCard exactly except:
//   - Reads dbStatus.voice_total / voice_transcribed counts.
//   - Pre-flights /api/database/voice-index/model-status on mount;
//     if the speech model isn't installed yet, the button opens the
//     download modal instead of jumping into a transcription job.
//   - Live progress driven by VoiceIndexProgress (transcribed,
//     missing, errors, current_label).
function VoiceIndexCard({ dbStatus, job, modelJob, onVoiceIndex, onVoiceModelDownload, hasSessionPassword, reloadDbStatus }) {
  const [prompting, setPrompting]       = useState(false); // password modal
  const [showDownload, setShowDownload] = useState(false); // model-download modal
  const [modelInstalled, setModelInstalled] = useState(null); // null = unknown
  const [modelInfo, setModelInfo]       = useState(null);

  const j  = job      || {};
  const mj = modelJob || {};
  const isRunning   = !!j.running;
  const isDownloading = !!mj.running;
  const hasDone     = j.done !== undefined && j.done !== null;
  const progress    = j.progress || null;

  // Check model presence on mount, and again after every successful
  // download (so the button label flips from "Set up voice…" → "Sync
  // voice notes" without a page reload).
  const reloadModelStatus = async () => {
    try {
      const m = await api.get("/api/database/voice-index/model-status");
      setModelInfo(m);
      setModelInstalled(!!m.installed);
    } catch { /* leave modelInstalled as null — button will be a no-op */ }
  };
  useEffect(() => { reloadModelStatus(); }, []);

  // After the download job finishes, refresh status + auto-close modal.
  useEffect(() => {
    if (mj.done === true) {
      reloadModelStatus();
      setShowDownload(false);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [mj.done]);

  // Same DB-counts refresh dance as MediaIndexCard.
  useEffect(() => {
    if (hasDone && j.done === true) reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) return null;
  const hasDB       = !!dbStatus.db_exists;
  const total       = dbStatus.voice_total ?? null;
  const transcribed = dbStatus.voice_transcribed ?? 0;
  const remaining   = total != null ? Math.max(total - transcribed, 0) : null;
  const allDone     = total != null && total > 0 && transcribed >= total;

  let title, subtitle, buttonLabel, buttonPrimary, statusDot;
  if (!hasDB) {
    title         = "Run a messages sync first";
    subtitle      = "Voice transcription reads the message database — sync that above before transcribing voice notes.";
    buttonLabel   = "Sync voice notes";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (total === 0) {
    title         = "No voice notes on device";
    subtitle      = "There's nothing to transcribe — your WhatsApp has no .opus voice messages.";
    buttonLabel   = "Sync voice notes";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (modelInstalled === false) {
    title         = "Set up voice transcription";
    subtitle      = total != null
      ? `${total.toLocaleString()} voice notes on the device. One-time 574 MB speech-model download required.`
      : "One-time 574 MB speech-model download required before transcribing.";
    buttonLabel   = "Set up";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else if (allDone) {
    title         = "All voice notes transcribed";
    subtitle      = `${transcribed.toLocaleString()} of ${total.toLocaleString()} voice notes transcribed and indexed in wa_voice_text.`;
    buttonLabel   = "Re-transcribe";
    buttonPrimary = false;
    statusDot     = "#25D366";
  } else if (transcribed === 0) {
    title         = "Voice notes not yet transcribed";
    subtitle      = total != null
      ? `${total.toLocaleString()} voice notes on the device. whisper.cpp runs at ~14× realtime on Apple Silicon (Metal-accelerated).`
      : "whisper.cpp transcribes each clip on-device with auto language detection.";
    buttonLabel   = "Sync voice notes";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else {
    title         = "Resume voice transcription";
    subtitle      = `${transcribed.toLocaleString()} / ${total.toLocaleString()} transcribed · ${remaining.toLocaleString()} remaining.`;
    buttonLabel   = "Resume";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  }

  const pct = (total != null && total > 0)
    ? Math.min(100, Math.round((transcribed / total) * 100))
    : 0;

  const launch = () => {
    if (modelInstalled === false) {
      setShowDownload(true);
      return;
    }
    if (hasSessionPassword) onVoiceIndex("");
    else setPrompting(true);
  };

  const buttonDisabled = isRunning || isDownloading || !hasDB || total === 0 || modelInstalled === null;

  return (
    <section className="mt-6">
      <h2 className="text-xs font-semibold uppercase tracking-wider mb-3" style={{color:'#075E54'}}>Voice transcription</h2>

      <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-semibold text-gray-900 text-sm">{title}</p>
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>

            {/* Static (non-running) progress bar. */}
            {!isRunning && hasDB && total != null && total > 0 && modelInstalled && (
              <div className="mt-3">
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width: `${pct}%`, background:'#25D366'}}></div>
                </div>
                <p className="text-[10px] text-gray-400 mt-1">{pct}% transcribed</p>
              </div>
            )}
          </div>

          <button onClick={launch} disabled={buttonDisabled}
            className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
            style={{background: isRunning ? '#128C7E' : buttonPrimary ? '#075E54' : '#6b7280'}}>
            <RefreshIcon />
            {isRunning ? "Transcribing…" : isDownloading ? "Downloading…" : buttonLabel}
          </button>
        </div>

        {j.error && j.error !== "model_required" && (
          <p className="text-sm text-red-500 mt-3">{j.error}</p>
        )}

        {/* Live progress card while transcribing. */}
        {isRunning && (
          <div className="mt-4 rounded-lg p-4" style={{background:'#F0F7F0', border:'1px solid #DCF8C6'}}>
            {progress ? (
              <>
                <div className="flex items-baseline justify-between text-xs mb-2">
                  <span className="font-semibold text-gray-900">
                    {progress.done.toLocaleString()} / {(progress.pending || 0).toLocaleString()} clips
                  </span>
                  <span className="text-gray-500">
                    {progress.rate_per_sec ? `${progress.rate_per_sec.toFixed(1)} clips/s` : ""}
                    {progress.eta_seconds > 0 ? ` · ETA ${fmtEta(progress.eta_seconds)}` : ""}
                  </span>
                </div>
                <div className="h-2 w-full bg-white rounded-full overflow-hidden border" style={{borderColor:'#DCF8C6'}}>
                  <div className="h-full rounded-full transition-all duration-500" style={{
                    width: `${Math.min(100, Math.round((progress.done / Math.max(progress.pending, 1)) * 100))}%`,
                    background:'#25D366',
                  }}></div>
                </div>
                <div className="grid grid-cols-3 gap-2 mt-3 text-[11px] text-gray-600">
                  <div title="Clips successfully transcribed and persisted to wa_voice_text.">
                    <span className="font-semibold text-gray-900">{progress.transcribed.toLocaleString()}</span> transcribed
                  </div>
                  <div title="Chat references a voice note whose .opus file isn't in the backup. Not an error.">
                    <span className="font-semibold text-gray-900">{progress.missing.toLocaleString()}</span> missing
                  </div>
                  <div title="Indexer found the file but couldn't transcribe (corrupted opus, decrypt failed, whisper crashed, etc).">
                    <span className="font-semibold text-gray-900">{progress.errors.toLocaleString()}</span> errors
                  </div>
                </div>
                {progress.current_label && (
                  <p className="text-[10px] text-gray-400 mt-2 font-mono truncate">
                    Now: {progress.current_label}
                  </p>
                )}
              </>
            ) : (
              <p className="text-xs text-gray-500">Preparing…</p>
            )}
            {j.lines && j.lines.length > 0 && (
              <p className="text-[10px] text-gray-400 mt-3 font-mono truncate">
                {j.lines[j.lines.length - 1]}
              </p>
            )}
          </div>
        )}

        {hasDone && j.done === true && !isRunning && (
          <p className="text-xs text-gray-500 mt-3">✓ Transcription complete. Agent queries can now MATCH on voice-note transcripts.</p>
        )}
      </div>

      <p className="text-[11px] text-gray-400 leading-relaxed mt-3">
        Decrypts each <code>.opus</code> voice note from the iOS backup to <code>./voice/&lt;rowid&gt;.opus</code>,
        then transcribes via the bundled <code>whisper-cli</code> (Metal-accelerated, large-v3-turbo) and stores
        the result in <code>wa_voice_text</code>. Auto-detects language per clip — handles Arabic / English /
        code-switching out of the box. Resumable: cancel anytime and re-run.
      </p>

      {prompting && (
        <PasswordPromptModal
          device={{ name: "the latest iPhone backup" }}
          onConfirm={pw => { setPrompting(false); onVoiceIndex(pw); }}
          onCancel={() => setPrompting(false)}
          confirmLabel="Sync voice notes"
        />
      )}

      {showDownload && (
        <VoiceModelDownloadModal
          modelInfo={modelInfo}
          modelJob={modelJob}
          onStart={onVoiceModelDownload}
          onClose={() => setShowDownload(false)}
        />
      )}
    </section>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// VoiceModelDownloadModal — first-run speech-model installer
// ═══════════════════════════════════════════════════════════════════════════
// Two visual states gated by modelJob.running:
//   1. Idle (pre-click)        — shows model name, size, source URL,
//                                cache path, and a [Cancel] / [Download]
//                                button pair.
//   2. In-progress (post-click) — shows MB / total · MB/s · ETA, with
//                                a progress bar and a Close button. The
//                                actual cancel-the-download mechanism
//                                is deferred (would require sending
//                                DELETE /api/jobs/{id}).
function VoiceModelDownloadModal({ modelInfo, modelJob, onStart, onClose }) {
  const mj = modelJob || {};
  const running = !!mj.running;
  const done    = mj.done === true;
  const failed  = mj.done === false && !!mj.error;
  const p       = mj.progress || null;
  const stage   = p?.stage || (failed ? "error" : "idle");

  const total   = modelInfo?.bytes_total ?? 0;
  const got     = p?.bytes_read ?? 0;
  const pct     = total > 0 ? Math.min(100, (got / total) * 100) : 0;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.45)'}}>
      <div className="rounded-xl bg-white shadow-xl w-full max-w-md p-6" style={{border:'1px solid #DCF8C6'}}>
        <h3 className="font-semibold text-gray-900 text-base mb-2">
          {done ? "Speech model installed" : "Set up voice transcription"}
        </h3>

        {!running && !done && !failed && (
          <>
            <p className="text-sm text-gray-600 leading-relaxed mb-4">
              WhatsKept needs to download a speech model before it can transcribe voice notes.
              This is a one-time download — the model persists across all future app updates.
            </p>
            <dl className="text-xs text-gray-700 space-y-1.5 mb-5 rounded-lg p-3" style={{background:'#F8FAFC', border:'1px solid #E5E7EB'}}>
              <div className="flex justify-between"><dt className="text-gray-500">Model</dt><dd className="font-medium">{modelInfo?.display || "Whisper Large-v3-Turbo"}</dd></div>
              <div className="flex justify-between"><dt className="text-gray-500">Size</dt><dd className="font-medium">{fmtMB(total)}</dd></div>
              <div className="flex justify-between"><dt className="text-gray-500">Source</dt><dd className="font-medium">HuggingFace</dd></div>
              <div className="flex justify-between gap-3 min-w-0"><dt className="text-gray-500 shrink-0">Cache</dt><dd className="font-mono text-[10px] truncate text-right" title={modelInfo?.path}>~/Library/Application Support/whatskept/models/</dd></div>
            </dl>
            <div className="flex justify-end gap-2">
              <button onClick={onClose}
                className="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg">Cancel</button>
              <button onClick={onStart}
                className="px-4 py-2 text-sm font-semibold text-white rounded-lg" style={{background:'#075E54'}}>
                Download &amp; install
              </button>
            </div>
          </>
        )}

        {running && (
          <>
            <p className="text-xs text-gray-500 mb-3">
              {stage === "verifying"
                ? "Verifying integrity (sha256)…"
                : `${fmtMB(got)} of ${fmtMB(total)}`}
            </p>
            <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all" style={{width:`${pct}%`, background:'#25D366'}}></div>
            </div>
            {stage === "downloading" && p && (
              <div className="flex justify-between text-[11px] text-gray-500 mt-2">
                <span>{p.rate_bps ? `${(p.rate_bps / (1024*1024)).toFixed(1)} MB/s` : ""}</span>
                <span>{p.eta_seconds > 0 ? `ETA ${fmtEta(p.eta_seconds)}` : ""}</span>
              </div>
            )}
            <p className="text-[10px] text-gray-400 mt-4">
              Downloading from HuggingFace · this window can stay open in the background.
            </p>
          </>
        )}

        {done && (
          <>
            <p className="text-sm text-gray-600 leading-relaxed mb-4">
              ✓ The speech model is installed at <code className="font-mono text-[11px]">~/Library/Application Support/whatskept/models/</code>.
              You can now transcribe your voice notes.
            </p>
            <div className="flex justify-end">
              <button onClick={onClose}
                className="px-4 py-2 text-sm font-semibold text-white rounded-lg" style={{background:'#075E54'}}>
                Continue
              </button>
            </div>
          </>
        )}

        {failed && (
          <>
            <p className="text-sm text-red-600 leading-relaxed mb-3">
              Download failed: {mj.error}
            </p>
            <p className="text-xs text-gray-500 mb-4">
              The partial file is preserved — clicking <strong>Retry</strong> resumes from where it stopped (HTTP Range).
            </p>
            <div className="flex justify-end gap-2">
              <button onClick={onClose}
                className="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg">Close</button>
              <button onClick={onStart}
                className="px-4 py-2 text-sm font-semibold text-white rounded-lg" style={{background:'#075E54'}}>
                Retry
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// AgentsPanel — Agents tab content

function AgentsPanel({ workspace }) {
  const [agents, setAgents] = useState(null); // null = loading
  const [openingId, setOpeningId] = useState(null);

  useEffect(() => { api.get("/api/agents").then(setAgents).catch(e => setError(e.message)); }, []);

  const launch = async (agent) => {
    setOpeningId(agent.id); setError("");
    try { await api.post(`/api/agents/${agent.id}/open`, { path: workspace.path }); }
    catch(e) { setError(e.message); }
    finally { setOpeningId(null); }
  };

  const openTerminal = async () => {
    setOpeningId("__terminal__"); setError("");
    try { await api.post(`/api/open-terminal`, { path: workspace.path }); }
    catch(e) { setError(e.message); }
    finally { setOpeningId(null); }

    <section className="space-y-4">
      {!workspace.has_chat && (
        <div className="rounded-xl border p-4 text-sm" style={{borderColor:'#f4c542',background:'#FFF8E1',color:'#7a5b00'}}>

          <div className="text-xs leading-relaxed">

            Run a backup from the <span className="font-medium">Backups</span> tab, then come back —
            the agent will have a documented database to query.

        </div>

      <div>
        <h2 className="text-xs font-semibold uppercase tracking-wider mb-3" style={{color:'#075E54'}}>Open in agent</h2>
        <div className="space-y-3">
          {agents.map(a => (
            <div key={a.id} className="rounded-xl border bg-white p-4 flex items-center gap-4" style={{borderColor:'#DCF8C6'}}>
              <div className="w-10 h-10 rounded-lg flex items-center justify-center shrink-0" style={{background:'#DCF8C6',border:'1px solid #128C7E'}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#075E54" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                </svg>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <p className="text-sm font-semibold" style={{color:'#075E54'}}>{a.name}</p>
                  {a.installed
                    ? <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded" style={{background:'#DCF8C6',color:'#075E54'}}>Installed</span>
                    : <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">Not installed</span>}
                </div>
                <p className="text-xs text-gray-500 mt-0.5">{a.description}</p>
                {a.installed && a.app_path && (
                  <p className="text-[11px] text-gray-400 mt-0.5 font-mono truncate">{a.app_path}</p>
                )}
              </div>
              <button onClick={() => launch(a)} disabled={!a.installed || openingId === a.id}
                className="shrink-0 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold"
                style={{background:'#075E54'}}
                title={a.installed ? `Open this workspace in ${a.name}` : `${a.name} is not installed in /Applications`}>
                {openingId === a.id ? "Opening…" : `Open in ${a.name}`}
              </button>
            </div>
          ))}

          {/* Escape hatch — opens the workspace in Terminal so the user can
              run any CLI agent (claude, codex, gemini-cli, …) we don't yet
              detect natively. */}
          <div className="rounded-xl border bg-white p-4 flex items-center gap-4" style={{borderColor:'#DCF8C6'}}>
            <div className="w-10 h-10 rounded-lg flex items-center justify-center shrink-0" style={{background:'#DCF8C6',border:'1px solid #128C7E'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#075E54" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2">
                <p className="text-sm font-semibold" style={{color:'#075E54'}}>Terminal</p>
                <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded" style={{background:'#DCF8C6',color:'#075E54'}}>Built-in</span>
              </div>
              <p className="text-xs text-gray-500 mt-0.5">Open the workspace in macOS Terminal — pick any CLI agent (Claude Code, Codex CLI, …) yourself.</p>
            </div>
            <button onClick={openTerminal} disabled={openingId === "__terminal__"}
              className="shrink-0 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold"

              title="Open this workspace in a new Terminal window">

      </div>

      {error && <p className="text-sm text-red-500">{error}</p>}
