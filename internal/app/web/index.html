<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WhatsKept</title>
<script src="/vendor/tailwindcss.js"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { wa: { dark:'#075E54', mid:'#128C7E', green:'#25D366', tea:'#DCF8C6', blue:'#34B7F1', gray:'#ECE5DD' } } } } }</script>
<script src="/vendor/react.production.min.js"></script>
<script src="/vendor/react-dom.production.min.js"></script>
<script src="/vendor/babel.min.js"></script>
<style>
  :root { --wa-dark:#075E54; --wa-mid:#128C7E; --wa-green:#25D366; --wa-tea:#DCF8C6; --wa-blue:#34B7F1; --wa-gray:#ECE5DD; }
  body { background:#ECE5DD; color:#111827; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; margin:0; }
  .log-line { font-family:'SF Mono',Monaco,monospace; font-size:11px; white-space:pre-wrap; word-break:break-all; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#128C7E; border-radius:3px; }
  input[type=text],input[type=password] { outline:none; background:#fff; color:#111827; }
  input[type=text]:focus,input[type=password]:focus { box-shadow:0 0 0 2px #128C7E; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Native bridge shim. The Python build uses pywebview, which exposes
     `window.pywebview.api.*`. Under webview_go we bind a flat function
     `_wkpPickFolder` from Go and adapt it to the same shape so the React
     code below can stay unchanged. -->
<script>
  window.pywebview = {
    api: {
      pick_folder: async () => {
        if (typeof window._wkpPickFolder !== "function") return null;
        const p = await window._wkpPickFolder();
        return p || null;
      },
    },
  };
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Icons ─────────────────────────────────────────────────────────────────
const Svg = ({ d, size=16, cls="" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
    className={cls}><path d={d}/></svg>
);
const FolderPlusIcon = () => <Svg size={20} d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2zM12 11v6M9 14h6" />;
const FolderOpenIcon = () => <Svg size={20} d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />;
const RefreshIcon    = () => <Svg d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />;
const TrashIcon      = () => <Svg size={15} d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />;
const CheckIcon      = () => <Svg d="M20 6 9 17l-5-5" />;
const XIcon          = () => <Svg d="M18 6 6 18M6 6l12 12" />;
const BackIcon       = () => <Svg size={15} d="M19 12H5M12 19l-7-7 7-7" />;
const LockIcon       = () => <Svg size={13} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4" />;
const UnlockIcon     = () => <Svg size={13} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 9.9-1" />;

// ── API ───────────────────────────────────────────────────────────────────
const api = {
  get:  url => fetch(url).then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail||r.statusText); }); return r.json(); }),
  post: (url, body) => fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) })
    .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail||r.statusText); }); return r.json(); }),
  del:  url => fetch(url, { method:"DELETE" })
    .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail||r.statusText); }); }),
};

// ── ElapsedTimer ──────────────────────────────────────────────────────────
function ElapsedTimer({ isRunning, startedAt }) {
  const calcSecs = () => startedAt
    ? Math.max(0, Math.round((Date.now() - new Date(startedAt).getTime()) / 1000))
    : 0;
  const [secs, setSecs] = useState(() => calcSecs());
  useEffect(() => {
    if (!isRunning) return;
    setSecs(calcSecs());
    const id = setInterval(() => setSecs(s => s + 1), 1000);
    return () => clearInterval(id);
  }, [isRunning, startedAt]);
  const m = String(Math.floor(secs / 60)).padStart(2, "0");
  const s = String(secs % 60).padStart(2, "0");
  return <span className="tabular-nums">{m}:{s}</span>;
}

// ── BackupProgressCard ────────────────────────────────────────────────────
// runningLabel/successLabel/failureLabel let the caller customise
// the headline. The default copy is the Backups-tab wording so
// existing call sites work unchanged; the Database tab passes
// sync-specific strings.
function BackupProgressCard({ lines, adopted, pid, isRunning, done, startedAt,
                              runningLabel = "Backing up…",
                              successLabel = "Backup complete.",
                              failureLabel = "Backup failed." }) {
  const [expanded, setExpanded] = useState(false);
  const bottomRef = useRef(null);
  useEffect(() => { if (expanded) bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [lines, expanded]);
  const lastLine = [...lines].reverse().find(l => l.trim()) || "";

  if (adopted && isRunning) return (
    <div className="mt-4 rounded-xl p-4" style={{background:'#DCF8C6',border:'1px solid #128C7E'}}>
      <div className="flex items-center gap-3">
        <span className="relative flex h-3 w-3">
          <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style={{background:'#25D366'}}></span>
          <span className="relative inline-flex rounded-full h-3 w-3" style={{background:'#128C7E'}}></span>
        </span>
        <div>
          <p className="text-sm font-medium" style={{color:'#075E54'}}>Backup in progress</p>
          <p className="text-xs mt-0.5 text-gray-500">Detected running process · PID {pid}</p>
        </div>
        <span className="ml-auto text-xs text-gray-500 font-mono">
          <ElapsedTimer isRunning={isRunning} startedAt={startedAt} />
        </span>
      </div>
    </div>
  );

  if (!isRunning && done === null) return null;

  return (
    <div className="mt-4 rounded-xl overflow-hidden border" style={{borderColor:'#128C7E',background:'#fff'}}>
      <div className="flex items-center gap-3 px-4 py-3">
        {isRunning
          ? <span className="relative flex h-3 w-3">
              <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style={{background:'#25D366'}}></span>
              <span className="relative inline-flex rounded-full h-3 w-3" style={{background:'#25D366'}}></span>
            </span>
          : done ? <span className="text-green-600"><CheckIcon /></span>
                 : <span className="text-red-500"><XIcon /></span>
        }
        <div className="min-w-0 flex-1">
          {isRunning
            ? <><p className="text-sm font-medium" style={{color:'#075E54'}}>{runningLabel}</p>
                {lastLine && <p className="text-xs text-gray-500 truncate mt-0.5">{lastLine}</p>}</>
            : <p className={`text-sm font-medium ${done ? "text-green-600" : "text-red-500"}`}>
                {done ? successLabel : failureLabel}
              </p>
          }
        </div>
        <div className="flex items-center gap-3 shrink-0">
          {isRunning && <span className="text-xs text-gray-500 font-mono"><ElapsedTimer isRunning={isRunning} startedAt={startedAt} /></span>}
          {lines.length > 0 && (
            <button onClick={() => setExpanded(x => !x)}
              className="text-xs underline underline-offset-2" style={{color:'#128C7E'}}>
              {expanded ? "hide log" : "show log"}
            </button>
          )}
        </div>
      </div>
      {expanded && lines.length > 0 && (
        <div className="border-t p-3 max-h-48 overflow-y-auto" style={{borderColor:'#DCF8C6',background:'#f9fafb'}}>
          {lines.map((l, i) => <div key={i} className="log-line text-gray-600 leading-5">{l || "\u00a0"}</div>)}
          <div ref={bottomRef} />
        </div>
      )}
    </div>
  );
}

// ── DeleteConfirmModal ────────────────────────────────────────────────────
function DeleteConfirmModal({ backup, onClose, onDeleted }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const confirm = async () => {
    setBusy(true);
    try { await api.del(`/api/backups/${backup.udid}`); onDeleted(); }
    catch(e) { setError(e.message); setBusy(false); }
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[420px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-full flex items-center justify-center text-red-500" style={{background:'#fee2e2'}}><TrashIcon /></div>
          <div>
            <h2 className="text-base font-semibold text-gray-900">Delete backup?</h2>
            <p className="text-xs text-gray-500 mt-0.5">This cannot be undone.</p>
          </div>
        </div>
        <div className="rounded-lg px-4 py-3 mb-4" style={{background:'#ECE5DD'}}>
          <p className="text-sm font-medium text-gray-900">{backup.device_name}</p>
          <p className="text-xs text-gray-500 mt-0.5">{backup.product_type} · iOS {backup.product_version}</p>
          <p className="text-xs text-gray-400 mt-0.5">Last backup: {backup.last_backup}</p>
        </div>
        {error && <p className="text-sm text-red-500 mb-3">{error}</p>}
        <div className="flex gap-2">
          <button onClick={onClose} disabled={busy}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">Cancel</button>
          <button onClick={confirm} disabled={busy}
            className="flex-1 rounded-lg bg-red-500 hover:bg-red-600 disabled:opacity-50 px-4 py-2 text-sm font-semibold text-white">
            {busy ? "Deleting…" : "Delete"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── BackupCard ────────────────────────────────────────────────────────────
function BackupCard({ backup, onDelete }) {
  return (
    <div className="rounded-xl bg-white border px-5 py-4 flex items-center gap-4" style={{borderColor:'#DCF8C6'}}>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <p className="font-semibold text-gray-900 truncate">{backup.device_name}</p>
          <span className={`flex items-center gap-1 text-xs px-1.5 py-0.5 rounded-full border`}
            style={backup.is_encrypted
              ? {background:'#DCF8C6',borderColor:'#128C7E',color:'#075E54'}
              : {background:'#f3f4f6',borderColor:'#d1d5db',color:'#6b7280'}}>
            {backup.is_encrypted ? <><LockIcon /> encrypted</> : <><UnlockIcon /> unencrypted</>}
          </span>
        </div>
        <p className="text-xs text-gray-500 mt-0.5">{backup.product_type} · iOS {backup.product_version}</p>
        <p className="text-xs text-gray-500 mt-0.5">Last backup: <span className="text-gray-700">{backup.last_backup}</span></p>
        <p className="text-xs text-gray-300 mt-0.5 font-mono truncate">{backup.udid}</p>
      </div>
      <div className="shrink-0">
        <button onClick={() => onDelete(backup)} title="Delete backup"
          className="p-2 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
          <TrashIcon />
        </button>
      </div>
    </div>
  );
}

// ── PasswordPromptModal ───────────────────────────────────────────────────
// The same iOS-backup password is needed for two different operations:
//   • Running idevicebackup2 (Backups tab) — "Start backup".
//   • Decrypting an existing backup for sync (Database tab) — "Sync now".
// Both reuse this modal; `confirmLabel` lets the caller name the action
// so the button doesn't lie about what's about to happen.
function PasswordPromptModal({ device, onConfirm, onCancel, confirmLabel = "Start backup" }) {
  const [password, setPassword] = useState("");
  const [show, setShow] = useState(false);
  const inputRef = useRef(null);
  useEffect(() => { inputRef.current?.focus(); }, []);
  const submit = () => { if (password) onConfirm(password); };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[380px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <h2 className="text-base font-semibold text-gray-900 mb-1">iPhone backup password</h2>
        <p className="text-xs text-gray-500 mb-4">
          Enter the encryption password for <span className="font-medium text-gray-800">{device.name}</span>.
        </p>
        <div className="relative mb-4">
          <input ref={inputRef} type={show ? "text" : "password"} value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === "Enter" && submit()}
            className="w-full border rounded-lg px-3 py-2 pr-14 text-sm"
            style={{borderColor:'#128C7E'}}
            placeholder="Backup password" />
          <button onClick={() => setShow(x => !x)}
            className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600 px-1">
            {show ? "hide" : "show"}
          </button>
        </div>
        <div className="flex gap-2">
          <button onClick={onCancel}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">
            Cancel
          </button>
          <button onClick={submit} disabled={!password}
            className="flex-1 rounded-lg text-white disabled:opacity-40 px-4 py-2 text-sm font-semibold"
            style={{background:'#128C7E'}}>
            {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── DeviceRow ─────────────────────────────────────────────────────────────
function DeviceRow({ device, job, onStart }) {
  const j = job || {};
  const isRunning = !!j.running;
  const done = j.done !== undefined ? j.done : null;
  const started = (j.lines || []).length > 0 || isRunning || done !== null;
  const [prompting, setPrompting] = useState(false);
  return (
    <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
      <div className="flex items-center justify-between gap-4">
        <div className="min-w-0">
          <div className="flex items-center gap-2">
            <span className="flex h-2 w-2 rounded-full shrink-0" style={{background:'#25D366'}}></span>
            <p className="font-semibold text-gray-900">{device.name}</p>
          </div>
          <p className="text-xs text-gray-400 mt-0.5 font-mono truncate">{device.udid}</p>
        </div>
        <button onClick={() => setPrompting(true)} disabled={isRunning}
          className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-50 px-4 py-2 text-sm font-semibold transition-colors"
          style={{background: isRunning ? '#128C7E' : '#075E54'}}>
          <RefreshIcon />
          {isRunning ? "Backing up…" : started ? "Back up again" : "Back up now"}
        </button>
      </div>
      {j.error && <p className="text-sm text-red-400 mt-2">{j.error}</p>}
      <BackupProgressCard
        lines={j.lines || []}
        adopted={!!j.adopted}
        pid={j.pid}
        isRunning={isRunning}
        done={done}
        startedAt={j.startedAt}
      />
      {prompting && (
        <PasswordPromptModal
          device={device}
          onConfirm={pw => { setPrompting(false); onStart(device, pw); }}
          onCancel={() => setPrompting(false)}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// SCREEN 1 — Workspace Picker
// ═══════════════════════════════════════════════════════════════════════════
const DEFAULT_WS_PATH = "~/Documents/my-whatsapp-chat";

function WorkspaceScreen({ onOpen }) {
  const [mode, setMode]         = useState(null);
  const [path, setPath]         = useState(DEFAULT_WS_PATH);
  const [openPath, setOpenPath] = useState("");
  const [busy, setBusy]         = useState(false);
  const [error, setError]       = useState("");
  const [recent, setRecent]     = useState([]);

  useEffect(() => { api.get("/api/workspace/recent").then(setRecent).catch(() => {}); }, []);

  const pickFolder = async (setter) => {
    const pyapi = window.pywebview && window.pywebview.api;
    if (!pyapi) return;
    try { const p = await pyapi.pick_folder(); if (p) setter(p); } catch(e) {}
  };

  const create = async () => {
    if (!path.trim()) { setError("Enter a workspace path."); return; }
    setBusy(true); setError("");
    try { onOpen(await api.post("/api/workspace/create", { path: path.trim() })); }
    catch(e) { setError(e.message); setBusy(false); }
  };

  const open = async (p) => {
    const target = (p || openPath).trim();
    if (!target) { setError("Enter a workspace path."); return; }
    setBusy(true); setError("");
    try { onOpen(await api.post("/api/workspace/open", { path: target })); }
    catch(e) { setError(e.message); setBusy(false); }
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-8" style={{background:'#ECE5DD'}}>
      <div className="mb-10 text-center">
        <div className="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style={{background:'#DCF8C6',border:'1.5px solid #128C7E'}}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#075E54" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h1 className="text-3xl font-bold tracking-tight" style={{color:'#075E54'}}>WhatsKept</h1>
        <p className="text-gray-500 mt-1 text-sm">A searchable copy of your WhatsApp history</p>
      </div>

      {mode === null && (
        <div className="w-full max-w-sm space-y-3">
          <button onClick={() => setMode("create")}
            className="w-full flex items-center gap-3 rounded-xl px-5 py-4 text-left transition-colors text-white"
            style={{background:'#075E54'}}>
            <FolderPlusIcon />
            <div>
              <p className="font-semibold text-sm">New workspace</p>
              <p className="text-xs mt-0.5" style={{color:'#DCF8C6'}}>Set up a fresh workspace folder</p>
            </div>
          </button>
          <button onClick={() => setMode("open")}
            className="w-full flex items-center gap-3 rounded-xl px-5 py-4 text-left transition-colors bg-white border hover:bg-gray-50"
            style={{borderColor:'#128C7E',color:'#075E54'}}>
            <FolderOpenIcon />
            <div>
              <p className="font-semibold text-sm">Open existing workspace</p>
              <p className="text-gray-500 text-xs mt-0.5">Continue from a previous session</p>
            </div>
          </button>
          {recent.filter(r => r.exists).length > 0 && (
            <div className="mt-6">
              <p className="text-xs text-gray-400 uppercase tracking-wider mb-2 px-1">Recent</p>
              <div className="space-y-1.5">
                {recent.filter(r => r.exists).map(r => (
                  <button key={r.path} onClick={() => open(r.path)}
                    className="w-full flex items-center gap-3 rounded-lg bg-white hover:bg-gray-50 border px-4 py-3 text-left transition-colors"
                    style={{borderColor:'#DCF8C6'}}>
                    <div style={{color:'#128C7E'}}><FolderOpenIcon /></div>
                    <div className="min-w-0">
                      <p className="text-sm font-medium text-gray-800 truncate">{r.path.replace(/^\/Users\/[^/]+/, "~")}</p>
                      <p className="text-xs text-gray-400 mt-0.5">{r.has_chat ? "Has ChatStorage.sqlite" : "Empty workspace"}</p>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {mode === "create" && (
        <div className="w-full max-w-sm">
          <button onClick={() => { setMode(null); setError(""); }}
            className="flex items-center gap-1.5 text-sm mb-5" style={{color:'#128C7E'}}>
            <BackIcon /> Back
          </button>
          <div className="rounded-2xl bg-white border p-6 shadow-xl space-y-4" style={{borderColor:'#DCF8C6'}}>
            <div>
              <h2 className="text-base font-semibold text-gray-900 mb-0.5">New workspace</h2>
              <p className="text-xs text-gray-500">A folder will be created at the path you choose.</p>
            </div>
            <div>
              <label className="text-xs text-gray-500 block mb-1">Workspace path</label>
              <div className="flex gap-2">
                <div className="flex-1 bg-gray-50 border rounded-lg px-3 py-2 text-sm text-gray-800 truncate min-w-0" style={{borderColor:'#128C7E'}}>
                  {path || <span className="text-gray-400">{DEFAULT_WS_PATH}</span>}
                </div>
                <button onClick={() => pickFolder(setPath)}
                  className="shrink-0 rounded-lg bg-white border px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50" style={{borderColor:'#128C7E'}}>
                  Browse…
                </button>
              </div>
            </div>
            {error && <p className="text-sm text-red-500">{error}</p>}
            <button onClick={create} disabled={busy}
              className="w-full rounded-lg text-white disabled:opacity-50 py-2.5 text-sm font-semibold" style={{background:'#075E54'}}>
              {busy ? "Creating…" : "Create workspace"}
            </button>
          </div>
        </div>
      )}

      {mode === "open" && (
        <div className="w-full max-w-sm">
          <button onClick={() => { setMode(null); setError(""); }}
            className="flex items-center gap-1.5 text-sm mb-5" style={{color:'#128C7E'}}>
            <BackIcon /> Back
          </button>
          <div className="rounded-2xl bg-white border p-6 shadow-xl space-y-4" style={{borderColor:'#DCF8C6'}}>
            <div>
              <h2 className="text-base font-semibold text-gray-900 mb-0.5">Open workspace</h2>
              <p className="text-xs text-gray-500">Choose an existing workspace folder.</p>
            </div>
            <div>
              <label className="text-xs text-gray-500 block mb-1">Workspace path</label>
              <div className="flex gap-2">
                <div className="flex-1 bg-gray-50 border rounded-lg px-3 py-2 text-sm truncate min-w-0" style={{borderColor:'#128C7E',color: openPath ? '#111827' : '#9ca3af'}}>
                  {openPath || "Click Browse to choose a folder"}
                </div>
                <button onClick={() => pickFolder(setOpenPath)}
                  className="shrink-0 rounded-lg bg-white border px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50" style={{borderColor:'#128C7E'}}>
                  Browse…
                </button>
              </div>
            </div>
            {error && <p className="text-sm text-red-500">{error}</p>}
            <button onClick={() => open()} disabled={busy}
              className="w-full rounded-lg text-white disabled:opacity-50 py-2.5 text-sm font-semibold" style={{background:'#075E54'}}>
              {busy ? "Opening…" : "Open workspace"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DatabaseTab — Messages sync card
// ═══════════════════════════════════════════════════════════════════════════
// One card. Smart copy off `dbStatus`. Re-uses PasswordPromptModal for
// the backup password (same encryption password as `idevicebackup2`,
// since postprocess.SyncMessages decrypts from the latest backup on
// disk).
function relativeTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const sec = Math.floor((Date.now() - d.getTime()) / 1000);
  if (sec < 60)   return "just now";
  if (sec < 3600) return `${Math.floor(sec/60)} min ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)} h ago`;
  return `${Math.floor(sec/86400)} d ago`;
}

function DatabaseTab({ dbStatus, reloadDbStatus, job, onSync }) {
  const [prompting, setPrompting] = useState(false);
  const j = job || {};
  const isRunning = !!j.running;
  const hasDone = j.done !== undefined && j.done !== null;

  // Re-fetch status when a sync finishes so message/fts counts and
  // last_synced_at refresh without the user having to click Refresh.
  useEffect(() => {
    if (hasDone && j.done === true) reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) {
    return <div className="text-sm text-gray-400 py-8 text-center">Loading…</div>;
  }

  // Derive the four states.
  const hasBackups = !!dbStatus.has_backups;
  const dbExists   = !!dbStatus.db_exists;
  const isStale    = !!dbStatus.is_stale;
  const msgCount   = dbStatus.message_count;
  const ftsCount   = dbStatus.fts_count;
  const lastSynced = dbStatus.last_synced_at;
  const latestBkp  = dbStatus.latest_backup_at;

  let title, subtitle, buttonLabel, buttonPrimary, statusDot;
  if (!hasBackups) {
    title         = "No iOS backups found";
    subtitle      = "Run a backup from the Backups tab first.";
    buttonLabel   = "Sync messages";
    buttonPrimary = false;
    statusDot     = "#9ca3af"; // gray
  } else if (!dbExists) {
    title         = "Ready for first sync";
    subtitle      = `Latest backup taken ${relativeTime(latestBkp)}. Click to decrypt and index messages.`;
    buttonLabel   = "Sync messages";
    buttonPrimary = true;
    statusDot     = "#f59e0b"; // amber
  } else if (isStale) {
    title         = "New messages available";
    subtitle      = `Last synced ${relativeTime(lastSynced)} · newer backup taken ${relativeTime(latestBkp)}.`;
    buttonLabel   = "Sync now";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else {
    title         = "Up to date";
    const parts = [];
    if (msgCount != null) parts.push(`${msgCount.toLocaleString()} messages`);
    if (ftsCount != null) parts.push(`${ftsCount.toLocaleString()} in FTS`);
    parts.push(`synced ${relativeTime(lastSynced)}`);
    subtitle      = parts.join(" · ");
    buttonLabel   = "Sync again";
    buttonPrimary = false;
    statusDot     = "#25D366"; // green
  }

  const buttonDisabled = isRunning || !hasBackups;

  return (
    <section>
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-xs font-semibold uppercase tracking-wider" style={{color:'#075E54'}}>Messages database</h2>
        <button onClick={reloadDbStatus} className="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">
          <RefreshIcon /> Refresh
        </button>
      </div>

      <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-semibold text-gray-900 text-sm">{title}</p>
              {isStale && !isRunning && (
                <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded animate-pulse"
                      style={{background:'#fef3c7', color:'#92400e'}}>
                  Action needed
                </span>
              )}
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>
            {dbExists && dbStatus.db_path && (
              <p className="text-[11px] text-gray-400 mt-1 font-mono truncate">{dbStatus.db_path}</p>
            )}
          </div>
          <button onClick={() => setPrompting(true)} disabled={buttonDisabled}
            className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
            style={{background: isRunning ? '#128C7E' : buttonPrimary ? '#075E54' : '#6b7280'}}
            title={!hasBackups ? "No iOS backups available yet" : ""}>
            <RefreshIcon />
            {isRunning ? "Syncing…" : buttonLabel}
          </button>
        </div>

        {j.error && <p className="text-sm text-red-500 mt-3">{j.error}</p>}

        <BackupProgressCard
          lines={j.lines || []}
          adopted={!!j.adopted}
          pid={j.pid}
          isRunning={isRunning}
          done={hasDone ? j.done : null}
          startedAt={j.startedAt}
          runningLabel="Syncing messages…"
          successLabel="Sync complete."
          failureLabel="Sync failed."
        />
      </div>

      <p className="text-[11px] text-gray-400 leading-relaxed mt-3">
        Decrypts the latest backup's ChatStorage.sqlite into your workspace, applies the SQL view layer
        (chats, messages, FTS5 index), and writes <code>AGENTS.md</code> plus per-agent ignore files.
        Voice transcription and image OCR are separate, opt-in stages that will land in a future update.
      </p>

      {prompting && (
        <PasswordPromptModal
          device={{ name: "the latest iPhone backup" }}
          onConfirm={pw => { setPrompting(false); onSync(pw); }}
          onCancel={() => setPrompting(false)}
          confirmLabel="Sync messages"
        />
      )}
    </section>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// AgentsPanel — Agents tab content
// ═══════════════════════════════════════════════════════════════════════════
function AgentsPanel({ workspace }) {
  const [agents, setAgents] = useState(null); // null = loading
  const [openingId, setOpeningId] = useState(null);
  const [error, setError] = useState("");

  useEffect(() => { api.get("/api/agents").then(setAgents).catch(e => setError(e.message)); }, []);

  const launch = async (agent) => {
    setOpeningId(agent.id); setError("");
    try { await api.post(`/api/agents/${agent.id}/open`, { path: workspace.path }); }
    catch(e) { setError(e.message); }
    finally { setOpeningId(null); }
  };

  if (agents === null) return <div className="text-sm text-gray-400 py-8 text-center">Loading…</div>;

  return (
    <section className="space-y-4">
      {!workspace.has_chat && (
        <div className="rounded-xl border p-4 text-sm" style={{borderColor:'#f4c542',background:'#FFF8E1',color:'#7a5b00'}}>
          <div className="font-medium mb-1">Workspace is empty</div>
          <div className="text-xs leading-relaxed">
            <code>ChatStorage.sqlite</code> and <code>AGENTS.md</code> haven't been generated yet.
            Run a backup from the <span className="font-medium">Backups</span> tab, then come back —
            the agent will have a documented database to query.
          </div>
        </div>
      )}

      <div>
        <h2 className="text-xs font-semibold uppercase tracking-wider mb-3" style={{color:'#075E54'}}>Open in agent</h2>
        <div className="space-y-3">
          {agents.map(a => (
            <div key={a.id} className="rounded-xl border bg-white p-4 flex items-center gap-4" style={{borderColor:'#DCF8C6'}}>
              <div className="w-10 h-10 rounded-lg flex items-center justify-center shrink-0" style={{background:'#DCF8C6',border:'1px solid #128C7E'}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#075E54" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                </svg>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <p className="text-sm font-semibold" style={{color:'#075E54'}}>{a.name}</p>
                  {a.installed
                    ? <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded" style={{background:'#DCF8C6',color:'#075E54'}}>Installed</span>
                    : <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">Not installed</span>}
                </div>
                <p className="text-xs text-gray-500 mt-0.5">{a.description}</p>
                {a.installed && a.app_path && (
                  <p className="text-[11px] text-gray-400 mt-0.5 font-mono truncate">{a.app_path}</p>
                )}
              </div>
              <button onClick={() => launch(a)} disabled={!a.installed || openingId === a.id}
                className="shrink-0 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold"
                style={{background:'#075E54'}}
                title={a.installed ? `Open this workspace in ${a.name}` : `${a.name} is not installed in /Applications`}>
                {openingId === a.id ? "Opening…" : `Open in ${a.name}`}
              </button>
            </div>
          ))}
        </div>
      </div>

      {error && <p className="text-sm text-red-500">{error}</p>}

      <p className="text-[11px] text-gray-400 leading-relaxed">
        Agents are launched detached via <code>open -a</code>; closing WhatsKept doesn't affect them.
        Support for more agents (Cursor, Claude Code, Codex CLI) lands as we test each integration.
      </p>
    </section>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// SCREEN 2 — Backup Manager
// ═══════════════════════════════════════════════════════════════════════════
function BackupManagerScreen({ workspace, onSwitchWorkspace }) {
  const [tab, setTab]               = useState("backups");
  const [devices, setDevices]       = useState([]);
  const [backups, setBackups]       = useState([]);
  const [backupsKey, setBackupsKey] = useState(0);
  const [loading, setLoading]       = useState(true);
  const [deleteTarget, setDeleteTarget] = useState(null);

  // jobs: { [key]: { running, done, lines, adopted, pid, startedAt, error } }
  // key = udid for backup jobs, "db:sync" for the messages sync job
  const [jobs, setJobs] = useState({});

  const patchJob = (key, patch) =>
    setJobs(prev => ({ ...prev, [key]: { ...(prev[key] || {}), ...patch } }));

  // ── database status ───────────────────────────────────────────────────
  const [dbStatus, setDbStatus] = useState(null);
  const reloadDbStatus = () => api.get("/api/database/status").then(setDbStatus).catch(() => {});
  useEffect(() => { reloadDbStatus(); }, []);

  // ── load backups ──────────────────────────────────────────────────────
  const [backupsError, setBackupsError] = useState(null);
  const reloadBackups = useCallback(async () => {
    setLoading(true);
    setBackupsError(null);
    try {
      const data = await api.get("/api/backups");
      setBackups(data);
    } catch(e) {
      setBackupsError(e.message || "Failed to read backup directory.");
      setBackups([]);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { reloadBackups(); }, [backupsKey]);

  // ── poll devices every 3 s ────────────────────────────────────────────
  useEffect(() => {
    let alive = true;
    const poll = () => api.get("/api/devices").then(devs => { if (alive) setDevices(devs); }).catch(() => {});
    poll();
    const id = setInterval(poll, 3000);
    return () => { alive = false; clearInterval(id); };
  }, []);

  // ── on mount: reconnect to adopted/active job ─────────────────────────
  useEffect(() => {
    api.get("/api/jobs/active").then(active => {
      if (!active || !active.job_id) return;
      const isDbTask = !!active.task;
      const key = isDbTask ? `db:${active.task}` : (active.udid || "__adopted__");
      patchJob(key, { running: true, done: null, lines: [], adopted: active.adopted, pid: active.pid, startedAt: active.started_at, error: "" });
      streamJob(active.job_id, key, isDbTask);
      if (isDbTask) setTab("database");
    }).catch(() => {});
  }, []);

  // ── SSE streaming ─────────────────────────────────────────────────────
  const streamJob = (jobId, key, isDbTask) => {
    const es = new EventSource(`/api/stream/${jobId}`);
    es.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === "adopted") patchJob(key, { adopted: true, pid: msg.pid });
      if (msg.type === "line")    setJobs(prev => ({
        ...prev,
        [key]: { ...(prev[key]||{}), lines: [...((prev[key]||{}).lines||[]), msg.data] }
      }));
      if (msg.type === "done") {
        const ok = msg.status === "ok";
        // Plumb the server-side error string through to j.error so the
        // card can render WHY a sync failed instead of just "Sync failed."
        // with no context. msg.error is set by jobManager.startInProcess
        // for in-process job errors, and by pumpProcess for non-zero
        // subprocess exits.
        patchJob(key, {
          running: false,
          done: ok,
          error: ok ? "" : (msg.error || "")
        });
        es.close();
        if (ok && isDbTask) setTimeout(reloadDbStatus, 1000);
        if (ok && !isDbTask) setTimeout(() => setBackupsKey(k => k + 1), 1500);
      }
    };
    es.onerror = () => {
      // Distinct from a real "done:error". A transport drop here means
      // we lost the connection without ever seeing a terminal event —
      // the goroutine MAY still be running and MAY still write the DB
      // successfully. Mark indeterminate and ask the user to refresh
      // rather than slam "Sync failed."
      patchJob(key, {
        running: false,
        done: false,
        error: "Lost connection to the sync stream. Click Refresh to verify whether it actually completed."
      });
      es.close();
    };
  };

  // ── start backup ──────────────────────────────────────────────────────
  const startBackup = async (device, password) => {
    const key = device.udid;
    patchJob(key, { running: true, done: null, lines: [], adopted: false, pid: null, startedAt: new Date().toISOString(), error: "" });
    try {
      const { job_id } = await api.post("/api/backup/run", { udid: key, password: password || null });
      streamJob(job_id, key, false);
    } catch(ex) {
      patchJob(key, { running: false, done: false, error: ex.message });
    }
  };

  // ── start messages sync ────────────────────────────────────────────────
  const startSync = async (password) => {
    const key = "db:sync";
    patchJob(key, { running: true, done: null, lines: [], adopted: false, pid: null, startedAt: new Date().toISOString(), error: "" });
    try {
      const { job_id } = await api.post("/api/database/sync", { password });
      streamJob(job_id, key, true);
    } catch(ex) {
      patchJob(key, { running: false, done: false, error: ex.message });
    }
  };

  const tabs = [
    { id: "backups",  label: "Backups"  },
    { id: "database", label: "Database" },
    { id: "agents",   label: "Agents"   },
  ];

  return (
    <div className="min-h-screen flex flex-col">
      {/* Header */}
      <header className="px-6 pt-5 pb-4 border-b flex items-center gap-3" style={{borderColor:'#c8e6c0',background:'#ECE5DD'}}>
        <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{background:'#DCF8C6',border:'1px solid #128C7E'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#075E54" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div className="flex-1 min-w-0">
          <p className="text-xs font-semibold leading-none" style={{color:'#075E54'}}>WhatsKept</p>
          <p className="text-xs text-gray-400 truncate mt-0.5">{workspace.path.replace(/^\/Users\/[^/]+/, "~")}</p>
        </div>
        <button onClick={onSwitchWorkspace} className="text-xs text-gray-400 hover:text-gray-600 ml-2">
          Switch workspace
        </button>
      </header>

      {/* Tab bar */}
      <div className="px-6 pt-4 flex gap-1 border-b" style={{borderColor:'#c8e6c0',background:'#ECE5DD'}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className="px-4 py-2 text-sm font-medium rounded-t-lg transition-colors border-b-2 -mb-px"
            style={tab === t.id
              ? {borderColor:'#075E54', color:'#075E54', background:'#DCF8C6', border:'1px solid #128C7E', borderBottom:'2px solid #075E54'}
              : {borderColor:'transparent', color:'#6b7280'}}>
            {t.label}
          </button>
        ))}
      </div>

      <main className="flex-1 overflow-y-auto p-6 space-y-6" style={{background:'#ECE5DD'}}>

        {/* ══ BACKUPS TAB ══ */}
        {tab === "backups" && (<>
          {/* ── Available Backups ── */}
          <section>
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-xs font-semibold uppercase tracking-wider" style={{color:'#075E54'}}>Available Backups</h2>
              <button onClick={() => setBackupsKey(k => k + 1)}
                className="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">
                <RefreshIcon /> Refresh
              </button>
            </div>
            {loading ? (
              <div className="text-sm text-gray-400 py-8 text-center">Loading…</div>
            ) : backupsError ? (
              <div className="rounded-xl border p-5 text-sm" style={{borderColor:'#128C7E',background:'#fff'}}>
                <div className="font-medium mb-2" style={{color:'#075E54'}}>Cannot read backup directory</div>
                <div className="text-gray-600 mb-3">{backupsError}</div>
                <div className="text-xs text-gray-500 leading-relaxed">
                  On macOS, iOS backups live in a protected directory. Grant
                  <span className="font-medium"> Full Disk Access</span> to WhatsKept:
                  System Settings → Privacy &amp; Security → Full Disk Access → add
                  this app (or your terminal if you launched from the command line),
                  then quit and reopen WhatsKept.
                </div>
              </div>
            ) : backups.length === 0 ? (
              <div className="rounded-xl border border-dashed p-8 text-center text-sm text-gray-400" style={{borderColor:'#128C7E'}}>
                No backups found in ~/Library/Application Support/MobileSync/Backup
              </div>
            ) : (
              <div className="space-y-3">
                {backups.map(b => (
                  <BackupCard key={b.udid} backup={b} onDelete={setDeleteTarget} />
                ))}
              </div>
            )}
          </section>

          {/* ── Run Backup ── */}
          <section>
            <h2 className="text-xs font-semibold uppercase tracking-wider mb-3" style={{color:'#075E54'}}>Run Backup</h2>
            {devices.length === 0 ? (
              <div className="rounded-xl border border-dashed p-4 text-sm flex items-center gap-3" style={{borderColor:'#128C7E',background:'#fff',color:'#128C7E'}}>
                <span>📱</span>
                <span>No device detected. Plug in your iPhone or iPad via USB, unlock it, and trust this Mac.</span>
              </div>
            ) : (
              <div className="space-y-3">
                {devices.map(d => (
                  <DeviceRow key={d.udid} device={d} job={jobs[d.udid]} onStart={startBackup} />
                ))}
              </div>
            )}
          </section>
        </>)}

        {/* ══ AGENTS TAB ══ */}
        {tab === "agents" && <AgentsPanel workspace={workspace} />}

        {/* ══ DATABASE TAB ══ */}
        {tab === "database" && (
          <DatabaseTab
            dbStatus={dbStatus}
            reloadDbStatus={reloadDbStatus}
            job={jobs["db:sync"]}
            onSync={startSync}
          />
        )}

      </main>

      {deleteTarget && (
        <DeleteConfirmModal
          backup={deleteTarget}
          onClose={() => setDeleteTarget(null)}
          onDeleted={() => { setDeleteTarget(null); setBackupsKey(k => k + 1); }}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// Root App
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [workspace, setWorkspace] = useState(null);
  const [checking, setChecking]   = useState(true);

  useEffect(() => {
    api.get("/api/workspace/current")
      .then(ws => { if (ws) setWorkspace(ws); })
      .catch(() => {})
      .finally(() => setChecking(false));
  }, []);

  if (checking) return (
    <div className="min-h-screen flex items-center justify-center text-sm" style={{background:'#ECE5DD',color:'#128C7E'}}>Loading…</div>
  );
  if (!workspace) return <WorkspaceScreen onOpen={setWorkspace} />;
  return <BackupManagerScreen workspace={workspace} onSwitchWorkspace={() => setWorkspace(null)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
