            ) : (
              <button onClick={create} disabled={busy}
                className="w-full rounded-lg text-white disabled:opacity-50 py-2.5 text-sm font-semibold" style={{background:'#075E54'}}>
                {busy ? "Creating…" : "Create workspace"}
              </button>
            )}
          </div>
        </div>
      )}

      {mode === "open" && (
        <div className="w-full max-w-sm">
          <button onClick={() => { setMode(null); setError(""); }}
            className="flex items-center gap-1.5 text-sm mb-5" style={{color:'#128C7E'}}>
            <BackIcon /> Back
          </button>
          <div className="rounded-2xl bg-white border p-6 shadow-xl space-y-4" style={{borderColor:'#DCF8C6'}}>
            <div>
              <h2 className="text-base font-semibold text-gray-900 mb-0.5">Open workspace</h2>
              <p className="text-xs text-gray-500">Choose an existing workspace folder.</p>
            </div>
            <div>
              <label className="text-xs text-gray-500 block mb-1">Workspace path</label>
              <div className="flex gap-2">
                <div className="flex-1 bg-gray-50 border rounded-lg px-3 py-2 text-sm truncate min-w-0" style={{borderColor:'#128C7E',color: openPath ? '#111827' : '#9ca3af'}}>
                  {openPath || "Click Browse to choose a folder"}
                </div>
                <button onClick={() => pickFolder(setOpenPath)}
                  className="shrink-0 rounded-lg bg-white border px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50" style={{borderColor:'#128C7E'}}>
                  Browse…
                </button>
              </div>
            </div>
            {error && <p className="text-sm text-red-500">{error}</p>}
            <button onClick={() => open()} disabled={busy}
              className="w-full rounded-lg text-white disabled:opacity-50 py-2.5 text-sm font-semibold" style={{background:'#075E54'}}>
              {busy ? "Opening…" : "Open workspace"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DatabaseTab — Messages sync card
// ═══════════════════════════════════════════════════════════════════════════
// One card. Smart copy off `dbStatus`. Re-uses PasswordPromptModal for
// the backup password (same encryption password as `idevicebackup2`,
// since postprocess.SyncMessages decrypts from the latest backup on
// disk).
function relativeTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const sec = Math.floor((Date.now() - d.getTime()) / 1000);
  if (sec < 60)   return "just now";
  if (sec < 3600) return `${Math.floor(sec/60)} min ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)} h ago`;
  return `${Math.floor(sec/86400)} d ago`;
}

function DatabaseTab({ dbStatus, reloadDbStatus, job, mediaJob, cloudJob, voiceJob, modelJob, documentJob, onSync, onMediaIndex, onMediaDescribe, onVoiceIndex, onVoiceModelDownload, onDocumentIndex, hasSessionPassword, onForgetPassword, binding, onForgetBinding, onOpenAgents }) {
  const [prompting, setPrompting] = useState(false);
  // Same UX rule as DeviceRow: if the server already has a cached
  // password for this session, skip the modal.
  const launch = () => {
    if (hasSessionPassword) onSync("");
    else setPrompting(true);
  };
  const tryDifferentPassword = async () => {
    await onForgetPassword();
    setPrompting(true);
  };
  const j = job || {};
  const isRunning = !!j.running;
  const hasDone = j.done !== undefined && j.done !== null;

  // Re-fetch status when a sync finishes so message/fts counts and
  // last_synced_at refresh without the user having to click Refresh.
  useEffect(() => {
    if (hasDone && j.done === true) reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) {
    return <div className="text-sm text-gray-400 py-8 text-center">Loading…</div>;
  }

  // Derive the four states.
  const hasBackups = !!dbStatus.has_backups;
  const dbExists   = !!dbStatus.db_exists;
  const isStale    = !!dbStatus.is_stale;
  const msgCount    = dbStatus.message_count;
  const ftsCount    = dbStatus.fts_count;
  const avatarCount  = dbStatus.avatar_count;
  const contactCount = dbStatus.contact_count;
  const lastSynced  = dbStatus.last_synced_at;
  const latestBkp   = dbStatus.latest_backup_at;

  let title, subtitle, buttonLabel, buttonPrimary, statusDot;
  if (!hasBackups) {
    title         = "No iOS backups found";
    subtitle      = "Run a backup from the Backups tab first.";
    buttonLabel   = "Sync messages";
    buttonPrimary = false;
    statusDot     = "#9ca3af"; // gray
  } else if (!dbExists) {
    title         = "Ready for first sync";
    subtitle      = `Latest backup taken ${relativeTime(latestBkp)}. Click to decrypt and index messages.`;
    buttonLabel   = "Sync messages";
    buttonPrimary = true;
    statusDot     = "#f59e0b"; // amber
  } else if (isStale) {
    title         = "New messages available";
    subtitle      = `Last synced ${relativeTime(lastSynced)} · newer backup taken ${relativeTime(latestBkp)}.`;
    buttonLabel   = "Sync now";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else {
    title         = "Up to date";
    const parts = [];
    if (msgCount != null) parts.push(`${msgCount.toLocaleString()} messages`);
    if (ftsCount != null) parts.push(`${ftsCount.toLocaleString()} in FTS`);
    if (contactCount != null && contactCount > 0) parts.push(`${contactCount.toLocaleString()} contacts`);
    if (avatarCount != null && avatarCount > 0) parts.push(`${avatarCount.toLocaleString()} avatars`);
    parts.push(`synced ${relativeTime(lastSynced)}`);
    subtitle      = parts.join(" · ");
    buttonLabel   = "Sync again";
    buttonPrimary = false;
    statusDot     = "#25D366"; // green
  }

  const buttonDisabled = isRunning || !hasBackups;
  const isUpToDate = hasBackups && dbExists && !isStale;

  return (
    <>
    <section>
      <div className="mb-3">
        <div className="flex items-center gap-2">
          <h2 className="text-xs font-semibold uppercase tracking-wider" style={{color:'#075E54'}}>Core database</h2>
          <span className="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">Required</span>
        </div>
        <p className="text-[11px] text-gray-400 mt-1">Setup database and foundational files, text messages, iOS contacts and WhatsApp avatars</p>
      </div>

      <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-semibold text-gray-900 text-sm">{title}</p>
              {isStale && !isRunning && (
                <span className="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded animate-pulse"
                      style={{background:'#fef3c7', color:'#92400e'}}>
                  Action needed
                </span>
              )}
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>
          </div>
          <button onClick={launch} disabled={buttonDisabled}
            className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
            style={{background: isRunning ? '#128C7E' : buttonPrimary ? '#075E54' : '#6b7280'}}
            title={!hasBackups ? "No iOS backups available yet" : ""}>
            <RefreshIcon />
            {isRunning ? "Syncing…" : buttonLabel}
          </button>
        </div>

        {j.error && <p className="text-sm text-red-500 mt-3">{j.error}</p>}
        {j.error && hasSessionPassword && (
          <button onClick={tryDifferentPassword}
            className="text-xs text-gray-500 hover:text-gray-800 mt-1 underline mr-3">
            Use a different password
          </button>
        )}
        {j.error && binding && (
          <button onClick={onForgetBinding}
            className="text-xs text-gray-500 hover:text-red-600 mt-1 underline">
            Forget this workspace's identity
          </button>
        )}

        <BackupProgressCard
          lines={j.lines || []}
          adopted={!!j.adopted}
          pid={j.pid}
          isRunning={isRunning}
          done={hasDone ? j.done : null}
          startedAt={j.startedAt}
          runningLabel="Syncing messages…"
          successLabel="Sync complete."
          failureLabel="Sync failed."
        />

        {isUpToDate && !isRunning && !j.error && (
          <p className="text-xs text-gray-600 mt-4 pt-4 border-t flex items-center gap-1.5" style={{borderColor:'#F0F0F0'}}>
            <span style={{color:'#25D366'}}>✓</span>
            You're all set to query your WhatsApp.
            <button onClick={onOpenAgents} className="text-xs font-semibold rounded-lg text-white px-3 py-1.5 hover:opacity-90 transition-opacity" style={{background:'#075E54'}}>
              Open an agent →
            </button>
          </p>
        )}
      </div>

    </section>

    {/* Enrichment is meaningless without a synced database to enrich, so
        the optional image/voice/document sections only appear once the
        first sync has produced ChatStorage.sqlite. */}
    {dbExists && (<>
    <section className="mt-6">
      <div className="flex items-center gap-2">
        <h2 className="text-xs font-semibold uppercase tracking-wider" style={{color:'#075E54'}}>Image enrichment</h2>
        <span className="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">Optional</span>
      </div>
      <p className="text-[11px] text-gray-400 mb-3 mt-1">Enrich database with image descriptions so agents can see the description of the images too</p>
      <div className="rounded-xl bg-white border overflow-hidden" style={{borderColor:'#DCF8C6'}}>
        <MediaIndexCard
          dbStatus={dbStatus}
          job={mediaJob}
          onMediaIndex={onMediaIndex}
          hasSessionPassword={hasSessionPassword}
          reloadDbStatus={reloadDbStatus}
        />
        <CloudDescribeCard
          dbStatus={dbStatus}
          job={cloudJob}
          onMediaDescribe={onMediaDescribe}
          hasSessionPassword={hasSessionPassword}
          reloadDbStatus={reloadDbStatus}
        />
      </div>
    </section>

    <VoiceIndexCard
      dbStatus={dbStatus}
      job={voiceJob}
      modelJob={modelJob}
      onVoiceIndex={onVoiceIndex}
      onVoiceModelDownload={onVoiceModelDownload}
      hasSessionPassword={hasSessionPassword}
      reloadDbStatus={reloadDbStatus}
    />

    <DocumentIndexCard
      dbStatus={dbStatus}
      job={documentJob}
      onDocumentIndex={onDocumentIndex}
      hasSessionPassword={hasSessionPassword}
      reloadDbStatus={reloadDbStatus}
    />
    </>)}

    {prompting && (
      <PasswordPromptModal
        device={{ name: "the latest iPhone backup" }}
        onConfirm={pw => { setPrompting(false); onSync(pw); }}
        onCancel={() => setPrompting(false)}
        confirmLabel="Sync messages"
      />
    )}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MediaIndexCard — "Sync images" section under the Database tab
// ═══════════════════════════════════════════════════════════════════════════
// Lifecycle parallels DatabaseTab's messages card: read counts from
// dbStatus, decide a state ("idle / partial / done / no-db / running"),
// render the button accordingly, and (when running) show a structured
// progress card driven by the "progress" events the media-index job
// emits over SSE.
function MediaIndexCard({ dbStatus, job, onMediaIndex, hasSessionPassword, reloadDbStatus }) {
  const [prompting, setPrompting] = useState(false);
  const [showIssues, setShowIssues] = useState(false);
  const [showInfo, setShowInfo] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [pendingForce, setPendingForce] = useState(false);
  const j = job || {};
  const isRunning = !!j.running;
  const hasDone   = j.done !== undefined && j.done !== null;
  const progress  = j.progress || null;

  // Reload counts on every successful finish so the header gauge
  // updates from "5,210 / 31,608" → "5,260 / 31,608" without a
  // manual refresh.
  useEffect(() => {
    if (hasDone && j.done === true) reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) return null;
  const hasDB    = !!dbStatus.db_exists;
  const total    = dbStatus.image_total ?? null;
  const indexed  = dbStatus.image_described ?? 0;
  const missing  = dbStatus.image_missing ?? 0;
  // Missing files (referenced but not in the backup) can't be indexed,
  // so measure completion against the *describable* set — otherwise the
  // card is stuck on "N remaining / Resume" forever.
  const describable = total != null ? Math.max(total - missing, 0) : null;
  const remaining = describable != null ? Math.max(describable - indexed, 0) : null;
  const allDone   = describable != null && describable > 0 && indexed >= describable;

  let title, subtitle, buttonLabel, buttonPrimary, statusDot;
  if (!hasDB) {
    title         = "Run a messages sync first";
    subtitle      = "Image indexing reads the message database — sync that above before scanning images.";
    buttonLabel   = "Sync images";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (total === 0) {
    title         = "No image messages on device";
    subtitle      = "There's nothing to index — your WhatsApp has no JPG images.";
    buttonLabel   = "Sync images";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (allDone) {
    title         = "All images indexed";
    subtitle      = (
      <span>
        <button onClick={() => setShowInfo(true)} className="underline decoration-dotted hover:text-gray-700">{indexed.toLocaleString()} indexed</button>
        {missing > 0 && <> · <button onClick={() => setShowInfo(true)} className="underline decoration-dotted hover:text-gray-700">{missing.toLocaleString()} not in backup</button></>}
      </span>
    );
    buttonLabel   = "Re-scan images";
    buttonPrimary = false;
    statusDot     = "#25D366";
  } else if (indexed === 0) {
    title         = "Images not yet indexed";
    subtitle      = total != null
      ? `${total.toLocaleString()} images on the device. Scanning will OCR + classify each one via Apple Vision (~0.2 s / image).`
      : "Scan will OCR + classify each image via Apple Vision (~0.2 s / image).";
    buttonLabel   = "Sync images";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else {
    title         = "Resume image indexing";
    subtitle      = (
      <span>
        <button onClick={() => setShowInfo(true)} className="underline decoration-dotted hover:text-gray-700">{indexed.toLocaleString()} indexed</button>
        {" · "}
        <button onClick={() => setShowInfo(true)} className="underline decoration-dotted hover:text-gray-700">{remaining.toLocaleString()} remaining</button>
        {missing > 0 && <> · <button onClick={() => setShowInfo(true)} className="underline decoration-dotted hover:text-gray-700">{missing.toLocaleString()} not in backup</button></>}.
      </span>
    );
    buttonLabel   = "Resume";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  }
  // Unify the verb with the cloud card, but only relabel as a *re*-run
  // once at least one image has actually been indexed. A fresh, no-DB, or
  // not-yet-indexed workspace keeps its per-state call-to-action ("Sync
  // images") so the button never claims to redo work that never happened.
  if (indexed > 0) buttonLabel = "Re-describe images";

  const pct = (describable != null && describable > 0)
    ? Math.min(100, Math.round((indexed / describable) * 100))
    : 0;

  // run flow: password gate (if not cached) → start. `force` re-scans
  // everything with Apple Vision, overwriting existing rows.
  const run = (force) => {
    if (hasSessionPassword) onMediaIndex("", { force });
    else { setPendingForce(force); setPrompting(true); }
  };
  // The button: when everything's already enriched, the only action is
  // a full Apple re-scan — which overwrites other enrichment (incl.
  // paid cloud descriptions), so confirm first. Otherwise just run.
  const launch = () => {
    if (allDone) { setShowConfirm(true); return; }
    run(false);
  };

  const buttonDisabled = isRunning || !hasDB || total === 0;

  return (
    <div className="p-5">
      <h3 className="text-sm font-semibold text-gray-900">Apple Vision · local</h3>
      <p className="text-[11px] text-gray-400 mb-3">Reads any text and tags what's in each photo, right on your Mac — free and private.</p>

        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-medium text-gray-700 text-sm">{title}</p>
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>

            {/* Static (non-running) progress bar, when there's progress to show. */}
            {!isRunning && hasDB && total != null && total > 0 && (
              <div className="mt-3">
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width: `${pct}%`, background:'#25D366'}}></div>
                </div>
                <div className="flex items-center justify-between mt-1">
                  <p className="text-[10px] text-gray-400">{pct}% indexed</p>
                  {/* Idle-state issues link — driven by dbStatus, not the
                      current run (which may not exist yet). Hidden when
                      both counts are zero so the card stays uncluttered
                      in the happy path. */}
                  {((dbStatus.image_errors ?? 0) > 0 || (dbStatus.image_missing ?? 0) > 0) && (
                    <button onClick={() => setShowIssues(true)}
                      className="text-[10px] text-gray-500 hover:text-gray-900 underline decoration-dotted">
                      View {((dbStatus.image_errors ?? 0) + (dbStatus.image_missing ?? 0)).toLocaleString()} issue
                      {((dbStatus.image_errors ?? 0) + (dbStatus.image_missing ?? 0)) === 1 ? "" : "s"}
                    </button>
                  )}
                </div>
              </div>
            )}
          </div>

          <button onClick={launch} disabled={buttonDisabled}
            className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
            style={{background: isRunning ? '#128C7E' : buttonPrimary ? '#075E54' : '#6b7280'}}>
            <RefreshIcon />
            {isRunning ? "Indexing…" : buttonLabel}
          </button>
        </div>

        {j.error && <p className="text-sm text-red-500 mt-3">{j.error}</p>}

        {/* Live progress card while running — driven by the structured
            "progress" SSE event the media-index job emits every ~25 rows. */}
        {isRunning && (
          <div className="mt-4 rounded-lg p-4" style={{background:'#F0F7F0', border:'1px solid #DCF8C6'}}>
            {progress ? (
              <>
                <div className="flex items-baseline justify-between text-xs mb-2">
                  <span className="font-semibold text-gray-900">
                    {progress.done.toLocaleString()} / {(progress.pending || 0).toLocaleString()} images
                  </span>
                  <span className="text-gray-500">
                    {progress.rate_per_sec ? `${progress.rate_per_sec.toFixed(1)}/s` : ""}
                    {progress.eta_seconds > 0 ? ` · ETA ${fmtEta(progress.eta_seconds)}` : ""}
                  </span>
                </div>
                <div className="h-2 w-full bg-white rounded-full overflow-hidden border" style={{borderColor:'#DCF8C6'}}>
                  <div className="h-full rounded-full transition-all duration-500" style={{
                    width: `${Math.min(100, Math.round((progress.done / Math.max(progress.pending, 1)) * 100))}%`,
                    background:'#25D366',
                  }}></div>
                </div>
                <div className="grid grid-cols-4 gap-2 mt-3 text-[11px] text-gray-600">
                  <div title="Images where Vision found readable text (OCR returned a non-empty string).">
                    <span className="font-semibold text-gray-900">{progress.with_ocr.toLocaleString()}</span> with OCR
                  </div>
                  <div title="Images where Vision returned at least one classification label above the confidence floor.">
                    <span className="font-semibold text-gray-900">{progress.with_labels.toLocaleString()}</span> labelled
                  </div>
                  <div title="Chat references an image whose file isn't in the backup — typically never downloaded on device. Not an error.">
                    <span className="font-semibold text-gray-900">{progress.missing.toLocaleString()}</span> missing
                  </div>
                  <div title="Indexer found the file but couldn't OCR it (corrupted/truncated JPEG, decrypt failed, Vision crashed, etc).">
                    <span className="font-semibold text-gray-900">{progress.errors.toLocaleString()}</span> errors
                  </div>
                </div>
                {(progress.errors > 0 || progress.missing > 0) && (
                  <div className="mt-2">
                    <button onClick={() => setShowIssues(true)}
                      className="text-[11px] text-gray-500 hover:text-gray-900 underline decoration-dotted">
                      View {(progress.errors + progress.missing).toLocaleString()} issue
                      {(progress.errors + progress.missing) === 1 ? "" : "s"}
                    </button>
                  </div>
                )}
              </>
            ) : (
              <p className="text-xs text-gray-500">Preparing…</p>
            )}
            {/* Tail of the log lines for transparency. */}
            {j.lines && j.lines.length > 0 && (
              <p className="text-[10px] text-gray-400 mt-3 font-mono truncate">
                {j.lines[j.lines.length - 1]}
              </p>
            )}
          </div>
        )}

        {hasDone && j.done === true && !isRunning && (
          <p className="text-xs text-gray-500 mt-3">✓ Done. Your images are now searchable by their text and contents.</p>
        )}

      {prompting && (
        <PasswordPromptModal
          device={{ name: "the latest iPhone backup" }}
          onConfirm={pw => { setPrompting(false); onMediaIndex(pw, { force: pendingForce }); }}
          onCancel={() => setPrompting(false)}
          confirmLabel="Sync images"
        />
      )}

      {showConfirm && (
        <ConfirmModal
          title="Re-scan with Apple Vision?"
          body={`This re-runs on-device Apple Vision over all ${describable.toLocaleString()} describable images and OVERWRITES their current enrichment — including any AI (cloud) descriptions you've already paid for. Apple Vision is free and private but more basic. Only do this if you want to revert to on-device results.`}
          confirmLabel="Re-scan & overwrite"
          onConfirm={() => { setShowConfirm(false); run(true); }}
          onCancel={() => setShowConfirm(false)}
        />
      )}

      {showIssues && <MediaIssuesModal onClose={() => setShowIssues(false)} />}
      {showInfo && <ImageOcrTermsModal onClose={() => setShowInfo(false)} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// CloudDescribeCard — "Cloud descriptions" section under Image OCR
// ═══════════════════════════════════════════════════════════════════════════
// Opt-in cloud describer (OpenRouter). Needs (1) a session API key —
// prompted via OpenRouterKeyModal, held in RAM by the server, never on
// disk — and (2) the backup password (reused from the session like the
// other indexers). Shows coverage (cloud vs on-device), a cost estimate,
// and a live cost meter while running.
const CLOUD_COST_PER_IMAGE = 0.0002; // measured ~$ / image, for estimates

function CloudDescribeCard({ dbStatus, job, onMediaDescribe, hasSessionPassword, reloadDbStatus }) {
  const [status, setStatus]       = useState(null);
  const [showKey, setShowKey]     = useState(false);
  const [prompting, setPrompting] = useState(false);
  const [stopping, setStopping] = useState(false);
  const [showInfo, setShowInfo] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [pendingForce, setPendingForce] = useState(false);
  const CONCURRENCY = 48; // fixed — empirically the fast, stable operating point

  const j = job || {};
  const isRunning = !!j.running;
  const hasDone   = j.done !== undefined && j.done !== null;
  const progress  = j.progress || null;

  const reloadStatus = () =>
    api.get("/api/database/media-describe/status").then(setStatus).catch(() => {});
  useEffect(() => { reloadStatus(); }, []);
  useEffect(() => {
    if (hasDone && j.done === true) { reloadStatus(); reloadDbStatus(); }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) return null;
  const hasDB      = !!dbStatus.db_exists;
  const total      = (status && status.total_images) || 0;
  const described  = (status && status.described) || 0;
  const cloudCount = (status && status.cloud_count) || 0;
  const appleCount = (status && status.apple_count) || 0;
  const hasKey     = !!(status && status.has_key);
  const model      = (status && status.default_model) || "";

  const missing = (status && status.missing) || 0;
  // Images that CAN be described = total minus those absent from the
  // backup (no file → undescribable). "done" and coverage are measured
  // against this, so the 100%/done state is actually reachable.
  const describable = Math.max(total - missing, 0);
  const toProcess = Math.max(describable - cloudCount, 0); // still need cloud
  const estCost = toProcess * CLOUD_COST_PER_IMAGE;
  const coveragePct = describable > 0 ? Math.min(100, Math.round((cloudCount / describable) * 100)) : 0;
  const allDone = cloudCount >= describable && describable > 0;

  // The run flow chains through up-to-three just-in-time gates:
  // confirm (force only) → API key (if none) → backup password (if not
  // cached) → start. `force` re-describes everything (overwriting cloud
  // rows); it's carried through the gates via pendingForce.
  const proceed = (force) => {
    if (hasSessionPassword) onMediaDescribe("", { model: "", concurrency: CONCURRENCY, force });
    else { setPendingForce(force); setPrompting(true); }
  };
  const beginRun = (force) => {
    if (!hasKey) { setPendingForce(force); setShowKey(true); return; }
    proceed(force);
  };
  // launch is the single button action. When everything's already
  // described, the only meaningful action is a full re-describe — which
  // costs money, so it goes through a confirmation first.
  const launch = () => {
    if (allDone) { setShowConfirm(true); return; }
    beginRun(false);
  };

  const stop = async () => {
    if (!j.jobId) return;
    setStopping(true);
    try { await api.del(`/api/jobs/${j.jobId}`); } catch {}
  };

  const forgetKey = async () => {
    try { await api.del("/api/session/openrouter-key"); } catch {}
    reloadStatus();
  };

  // Reset the optimistic "stopping" flag once the run actually ends.
  useEffect(() => { if (!isRunning) setStopping(false); }, [isRunning]);

  let statusDot = "#9ca3af", title, subtitle, buttonLabel, buttonPrimary = true, buttonDisabled = isRunning;
  if (!hasDB) {
    title = "Run a messages sync first";
    subtitle = "Cloud descriptions read the message database — sync that above first.";
    buttonLabel = "Describe with cloud"; buttonPrimary = false; buttonDisabled = true;
  } else if (total === 0) {
    title = "No image messages on device";
    subtitle = "There's nothing to describe."; buttonLabel = "Describe with cloud";
    buttonPrimary = false; buttonDisabled = true;
  } else {
    // Always surface coverage — independent of whether a key is loaded
    // this session (the key is just the action; the status is real).
    const term = (n, label) => (
      <button onClick={() => setShowInfo(true)}
        className="underline decoration-dotted hover:text-gray-700">{n.toLocaleString()} {label}</button>
    );
    subtitle = (
      <span>
        {term(cloudCount, "described")} · {term(toProcess, "remaining")}
        {missing > 0 && <> · {term(missing, "not in backup")}</>}
        {" · "}Model: {model}.
      </span>
    );
    if (allDone)          { statusDot = "#25D366"; title = "All available images described in the cloud"; }
    else if (cloudCount)  { statusDot = "#25D366"; title = "Cloud descriptions partially done"; }
    else                  { statusDot = "#f59e0b"; title = "Not yet described with cloud"; }

    if (allDone) { buttonPrimary = false; }
    else         { buttonPrimary = true; }
    // Only call it a *re*-run once something has actually been described
    // in the cloud; otherwise the first-run call-to-action is "Describe".
    buttonLabel = cloudCount > 0 ? "Re-describe images" : "Describe with cloud";
  }

  // While running, the status snapshot above is stale — show live
  // cumulative coverage in the subtitle so it agrees with the bar.
  if (isRunning && progress) {
    const liveCloud = (progress.baseline || 0) + (progress.described || 0);
    title = "Cloud descriptions in progress";
    subtitle = `${liveCloud.toLocaleString()} of ${(progress.total || total).toLocaleString()} described in cloud. Model: ${model || (status && status.default_model) || ""}.`;
  }

  return (
    <div className="p-5 border-t" style={{borderColor:'#DCF8C6'}}>
      <h3 className="text-sm font-semibold text-gray-900">AI image descriptions · cloud</h3>
      <p className="text-[11px] text-gray-400 mb-3">Sends each photo to a cloud AI for a fuller description and more accurate text reading, in any language. Costs a little per image.</p>

        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-medium text-gray-700 text-sm">{title}</p>
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>

            {/* Static cloud-coverage bar — always shown (independent of
                key) so opening the app reflects real progress. */}
            {hasDB && total > 0 && !isRunning && (
              <div className="mt-3">
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width: `${coveragePct}%`, background:'#25D366'}}></div>
                </div>
                <p className="text-[10px] text-gray-400 mt-1">{coveragePct}% described in cloud</p>
              </div>
            )}

            {hasKey && hasDB && total > 0 && !isRunning && (
              <div className="mt-3">
                <p className="text-[11px] text-gray-400">
                  Upgrades all on-device images to cloud and retries any failures automatically.
                  {toProcess > 0 && <> {toProcess.toLocaleString()} image{toProcess === 1 ? "" : "s"} remaining · est. <span className="font-medium text-gray-600">≈ ${estCost.toFixed(2)}</span>.</>}
                  <span className="mx-1.5">·</span>
                  <button onClick={forgetKey} className="underline decoration-dotted hover:text-gray-700">use a different key</button>
                </p>
              </div>
            )}
          </div>

          {isRunning ? (
            <button onClick={stop} disabled={stopping || !j.jobId}
              className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
              style={{background: '#b91c1c'}}>
              {stopping ? "Stopping…" : "Stop"}
            </button>
          ) : (
            <button onClick={launch} disabled={buttonDisabled}
              className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
              style={{background: buttonPrimary ? '#075E54' : '#6b7280'}}>
              <RefreshIcon />
              {buttonLabel}
            </button>
          )}
        </div>

        {j.error && <p className="text-sm text-red-500 mt-3">{j.error}</p>}

        {isRunning && (
          <div className="mt-4 rounded-lg p-4" style={{background:'#F0F7F0', border:'1px solid #DCF8C6'}}>
            {progress ? (() => {
              // Cumulative cloud coverage = already-cloud at run start
              // (baseline) + described this run, over all images on device.
              const cloudTotal = (progress.baseline || 0) + (progress.described || 0);
              const grandTotal = progress.total || 0;
              const pct = grandTotal > 0 ? Math.min(100, Math.round((cloudTotal / grandTotal) * 100)) : 0;
              return (
              <>
                <div className="flex items-baseline justify-between text-xs mb-2">
                  <span className="font-semibold text-gray-900">
                    {cloudTotal.toLocaleString()} / {grandTotal.toLocaleString()} described in cloud
                  </span>
                  <span className="text-gray-500">
                    {progress.rate_per_sec ? `${progress.rate_per_sec.toFixed(1)}/s` : ""}
                    {progress.eta_seconds > 0 ? ` · ETA ${fmtEta(progress.eta_seconds)}` : ""}
                  </span>
                </div>
                <div className="h-2 w-full bg-white rounded-full overflow-hidden border" style={{borderColor:'#DCF8C6'}}>
                  <div className="h-full rounded-full transition-all duration-500" style={{
                    width: `${pct}%`,
                    background:'#25D366',
                  }}></div>
                </div>
                <div className="grid grid-cols-4 gap-2 mt-3 text-[11px] text-gray-600">
                  <div title="Described this run (this session).">
                    <span className="font-semibold text-gray-900">{(progress.described||0).toLocaleString()}</span> this run
                  </div>
                  <div title="Images where the model transcribed readable text (OCR).">
                    <span className="font-semibold text-gray-900">{progress.with_ocr.toLocaleString()}</span> with OCR
                  </div>
                  <div title="Spend so far this run, reported by OpenRouter.">
                    <span className="font-semibold text-gray-900">${(progress.cost_usd||0).toFixed(4)}</span> spent
                  </div>
                  <div title="Images that failed this run (auto-retried next run; almost always transient).">
                    <span className="font-semibold text-gray-900">{progress.errors.toLocaleString()}</span> errors
                  </div>
                </div>
              </>
              );
            })() : (
              <p className="text-xs text-gray-500">Preparing…</p>
            )}
            {j.lines && j.lines.length > 0 && (
              <p className="text-[10px] text-gray-400 mt-3 font-mono truncate">
                {j.lines[j.lines.length - 1]}
              </p>
            )}
          </div>
        )}

        {hasDone && j.done === true && !isRunning && (
          <p className="text-xs text-gray-500 mt-3">✓ Done. Your images are now searchable by their descriptions.</p>
        )}

      {showKey && (
        <OpenRouterKeyModal
          onClose={() => setShowKey(false)}
          onSaved={() => { setShowKey(false); reloadStatus(); proceed(pendingForce); }}
        />
      )}

      {prompting && (
        <PasswordPromptModal
          device={{ name: "the latest iPhone backup" }}
          onConfirm={pw => { setPrompting(false); onMediaDescribe(pw, { model: "", concurrency: CONCURRENCY, force: pendingForce }); }}
          onCancel={() => setPrompting(false)}
          confirmLabel="Describe with cloud"
        />
      )}

      {showConfirm && (
        <ConfirmModal
          title="Re-describe all images?"
          body={`This re-runs the model on all ${describable.toLocaleString()} describable images, overwriting the existing cloud descriptions — useful after improving the prompt or switching models. Estimated cost ≈ $${(describable * CLOUD_COST_PER_IMAGE).toFixed(2)}.`}
          confirmLabel="Re-describe all"
          onConfirm={() => { setShowConfirm(false); beginRun(true); }}
          onCancel={() => setShowConfirm(false)}
        />
      )}

      {showInfo && <CloudTermsModal onClose={() => setShowInfo(false)} />}
    </div>
  );
}

// OpenRouterKeyModal — paste + validate an OpenRouter API key. On save
// the server validates it (token-free auth check) and caches it for the
// session; we never persist it client-side.
function OpenRouterKeyModal({ onClose, onSaved }) {
  const [key, setKey]   = useState("");
  const [show, setShow] = useState(false);
  const [busy, setBusy] = useState(false);
  const [err, setErr]   = useState("");
  const inputRef = useRef(null);
  useEffect(() => { inputRef.current?.focus(); }, []);

  const save = async () => {
    if (!key.trim() || busy) return;
    setBusy(true); setErr("");
    try {
      await api.post("/api/session/openrouter-key", { key: key.trim() });
      onSaved();
      onClose();
    } catch (ex) {
      setErr(ex.message || "Could not validate key");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div className="w-[420px] rounded-2xl bg-white border shadow-2xl p-6" style={{borderColor:'#ECE5DD'}}>
        <h2 className="text-base font-semibold text-gray-900 mb-1">OpenRouter API key</h2>
        <p className="text-xs text-gray-500 mb-4">
          Paste your key (starts with <code>sk-or-</code>). It's validated now and kept only for this app
          session — never written to disk. Get one at <span className="font-medium text-gray-700">openrouter.ai/keys</span>.
        </p>
        <div className="relative mb-3">
          <input ref={inputRef} type={show ? "text" : "password"} value={key}
            onChange={e => setKey(e.target.value)}
            onKeyDown={e => {
              if (e.key === "Enter") { save(); return; }
              // WKWebView (the webview lib) doesn't wire ⌘/Ctrl+V to the
              // input, so handle paste ourselves via the Clipboard API
              // (localhost is a secure context; keydown is a user gesture).
              if ((e.metaKey || e.ctrlKey) && (e.key === "v" || e.key === "V")) {
                e.preventDefault();
                navigator.clipboard.readText().then(t => setKey(t.trim())).catch(() => {});
              }
            }}
            className="w-full border rounded-lg px-3 py-2 pr-14 text-sm font-mono"
            style={{borderColor:'#128C7E'}}
            placeholder="sk-or-v1-…" />
          <button onClick={() => setShow(x => !x)}
            className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600 px-1">
            {show ? "hide" : "show"}
          </button>
        </div>
        {err && <p className="text-xs text-red-500 mb-3">{err}</p>}
        <div className="flex gap-2">
          <button onClick={onClose}
            className="flex-1 rounded-lg bg-gray-100 hover:bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700">
            Cancel
          </button>
          <button onClick={save} disabled={!key.trim() || busy}
            className="flex-1 rounded-lg text-white disabled:opacity-40 px-4 py-2 text-sm font-semibold"
            style={{background:'#128C7E'}}>
            {busy ? "Validating…" : "Validate & save"}
          </button>
        </div>
      </div>
    </div>
  );
}

// fmtEta formats a duration in seconds for the live progress card.
function fmtEta(secs) {
  if (!secs || secs < 0) return "—";
  if (secs < 60)   return `${Math.round(secs)}s`;
  if (secs < 3600) return `${(secs/60).toFixed(1)}m`;
  return `${(secs/3600).toFixed(1)}h`;
}

// fmtMB formats a byte count to a "X MB" string. Used by the
// voice-model download modal's progress line.
function fmtMB(bytes) {
  if (!bytes && bytes !== 0) return "—";
  return `${(bytes / (1024*1024)).toFixed(0)} MB`;
}

// ═══════════════════════════════════════════════════════════════════════════
// VoiceIndexCard — "Sync voice notes" section under the Database tab
// ═══════════════════════════════════════════════════════════════════════════
// Mirrors MediaIndexCard exactly except:
//   - Reads dbStatus.voice_total / voice_transcribed counts.
//   - Pre-flights /api/database/voice-index/model-status on mount;
//     if the speech model isn't installed yet, the button opens the
//     download modal instead of jumping into a transcription job.
//   - Live progress driven by VoiceIndexProgress (transcribed,
//     missing, errors, current_label).
function VoiceIndexCard({ dbStatus, job, modelJob, onVoiceIndex, onVoiceModelDownload, hasSessionPassword, reloadDbStatus }) {
  const [prompting, setPrompting]       = useState(false); // password modal
  const [showDownload, setShowDownload] = useState(false); // model-download modal
  const [modelInstalled, setModelInstalled] = useState(null); // null = unknown
  const [modelInfo, setModelInfo]       = useState(null);

  const j  = job      || {};
  const mj = modelJob || {};
  const isRunning   = !!j.running;
  const isDownloading = !!mj.running;
  const hasDone     = j.done !== undefined && j.done !== null;
  const progress    = j.progress || null;

  // Check model presence on mount, and again after every successful
  // download (so the button label flips from "Set up voice…" → "Sync
  // voice notes" without a page reload).
  const reloadModelStatus = async () => {
    try {
      const m = await api.get("/api/database/voice-index/model-status");
      setModelInfo(m);
      setModelInstalled(!!m.installed);
    } catch { /* leave modelInstalled as null — button will be a no-op */ }
  };
  useEffect(() => { reloadModelStatus(); }, []);

  // After the download job finishes, refresh status + auto-close modal.
  useEffect(() => {
    if (mj.done === true) {
      reloadModelStatus();
      setShowDownload(false);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [mj.done]);

  // Same DB-counts refresh dance as MediaIndexCard.
  useEffect(() => {
    if (hasDone && j.done === true) reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) return null;
  const hasDB       = !!dbStatus.db_exists;
  const total       = dbStatus.voice_total ?? null;
  const transcribed = dbStatus.voice_transcribed ?? 0;
  const remaining   = total != null ? Math.max(total - transcribed, 0) : null;
  const allDone     = total != null && total > 0 && transcribed >= total;

  let title, subtitle, buttonLabel, buttonPrimary, statusDot;
  if (!hasDB) {
    title         = "Run a messages sync first";
    subtitle      = "Voice transcription reads the message database — sync that above before transcribing voice notes.";
    buttonLabel   = "Sync voice notes";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (total === 0) {
    title         = "No voice notes on device";
    subtitle      = "There's nothing to transcribe — your WhatsApp has no .opus voice messages.";
    buttonLabel   = "Sync voice notes";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (modelInstalled === false) {
    title         = "Set up voice transcription";
    subtitle      = total != null
      ? `${total.toLocaleString()} voice notes on the device. One-time 574 MB speech-model download required.`
      : "One-time 574 MB speech-model download required before transcribing.";
    buttonLabel   = "Set up";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else if (allDone) {
    title         = "All voice notes transcribed";
    subtitle      = `${transcribed.toLocaleString()} of ${total.toLocaleString()} voice notes transcribed and indexed in wa_voice_text.`;
    buttonLabel   = "Re-transcribe";
    buttonPrimary = false;
    statusDot     = "#25D366";
  } else if (transcribed === 0) {
    title         = "Voice notes not yet transcribed";
    subtitle      = total != null
      ? `${total.toLocaleString()} voice notes on the device. whisper.cpp runs at ~14× realtime on Apple Silicon (Metal-accelerated).`
      : "whisper.cpp transcribes each clip on-device with auto language detection.";
    buttonLabel   = "Sync voice notes";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else {
    title         = "Resume voice transcription";
    subtitle      = `${transcribed.toLocaleString()} / ${total.toLocaleString()} transcribed · ${remaining.toLocaleString()} remaining.`;
    buttonLabel   = "Resume";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  }

  const pct = (total != null && total > 0)
    ? Math.min(100, Math.round((transcribed / total) * 100))
    : 0;

  const launch = () => {
    if (modelInstalled === false) {
      setShowDownload(true);
      return;
    }
    if (hasSessionPassword) onVoiceIndex("");
    else setPrompting(true);
  };

  const buttonDisabled = isRunning || isDownloading || !hasDB || total === 0 || modelInstalled === null;

  return (
    <section className="mt-6">
      <div className="flex items-center gap-2">
        <h2 className="text-xs font-semibold uppercase tracking-wider" style={{color:'#075E54'}}>Voice messages enrichment</h2>
        <span className="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">Optional</span>
      </div>
      <p className="text-[11px] text-gray-400 mb-3 mt-1">Enrich database with voice transcriptions so the agents can read the voice messages</p>

      <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
        <h3 className="text-sm font-semibold text-gray-900">Whisper · local</h3>
        <p className="text-[11px] text-gray-400 mb-3">Transcribes each voice note on your Mac — auto-detects language (Arabic / English / mixed), free and private.</p>

        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-medium text-gray-700 text-sm">{title}</p>
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>

            {/* Static (non-running) progress bar. */}
            {!isRunning && hasDB && total != null && total > 0 && modelInstalled && (
              <div className="mt-3">
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width: `${pct}%`, background:'#25D366'}}></div>
                </div>
                <p className="text-[10px] text-gray-400 mt-1">{pct}% transcribed</p>
              </div>
            )}
          </div>

          <button onClick={launch} disabled={buttonDisabled}
            className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
            style={{background: isRunning ? '#128C7E' : buttonPrimary ? '#075E54' : '#6b7280'}}>
            <RefreshIcon />
            {isRunning ? "Transcribing…" : isDownloading ? "Downloading…" : buttonLabel}
          </button>
        </div>

        {j.error && j.error !== "model_required" && (
          <p className="text-sm text-red-500 mt-3">{j.error}</p>
        )}

        {/* Live progress card while transcribing. */}
        {isRunning && (
          <div className="mt-4 rounded-lg p-4" style={{background:'#F0F7F0', border:'1px solid #DCF8C6'}}>
            {progress ? (
              <>
                <div className="flex items-baseline justify-between text-xs mb-2">
                  <span className="font-semibold text-gray-900">
                    {progress.done.toLocaleString()} / {(progress.pending || 0).toLocaleString()} clips
                  </span>
                  <span className="text-gray-500">
                    {progress.rate_per_sec ? `${progress.rate_per_sec.toFixed(1)} clips/s` : ""}
                    {progress.eta_seconds > 0 ? ` · ETA ${fmtEta(progress.eta_seconds)}` : ""}
                  </span>
                </div>
                <div className="h-2 w-full bg-white rounded-full overflow-hidden border" style={{borderColor:'#DCF8C6'}}>
                  <div className="h-full rounded-full transition-all duration-500" style={{
                    width: `${Math.min(100, Math.round((progress.done / Math.max(progress.pending, 1)) * 100))}%`,
                    background:'#25D366',
                  }}></div>
                </div>
                <div className="grid grid-cols-3 gap-2 mt-3 text-[11px] text-gray-600">
                  <div title="Clips successfully transcribed and persisted to wa_voice_text.">
                    <span className="font-semibold text-gray-900">{progress.transcribed.toLocaleString()}</span> transcribed
                  </div>
                  <div title="Chat references a voice note whose .opus file isn't in the backup. Not an error.">
                    <span className="font-semibold text-gray-900">{progress.missing.toLocaleString()}</span> missing
                  </div>
                  <div title="Indexer found the file but couldn't transcribe (corrupted opus, decrypt failed, whisper crashed, etc).">
                    <span className="font-semibold text-gray-900">{progress.errors.toLocaleString()}</span> errors
                  </div>
                </div>
                {progress.current_label && (
                  <p className="text-[10px] text-gray-400 mt-2 font-mono truncate">
                    Now: {progress.current_label}
                  </p>
                )}
              </>
            ) : (
              <p className="text-xs text-gray-500">Preparing…</p>
            )}
            {j.lines && j.lines.length > 0 && (
              <p className="text-[10px] text-gray-400 mt-3 font-mono truncate">
                {j.lines[j.lines.length - 1]}
              </p>
            )}
          </div>
        )}

        {hasDone && j.done === true && !isRunning && (
          <p className="text-xs text-gray-500 mt-3">✓ Transcription complete. Agent queries can now MATCH on voice-note transcripts.</p>
        )}
      </div>


      {prompting && (
        <PasswordPromptModal
          device={{ name: "the latest iPhone backup" }}
          onConfirm={pw => { setPrompting(false); onVoiceIndex(pw); }}
          onCancel={() => setPrompting(false)}
          confirmLabel="Sync voice notes"
        />
      )}

      {showDownload && (
        <VoiceModelDownloadModal
          modelInfo={modelInfo}
          modelJob={modelJob}
          onStart={onVoiceModelDownload}
          onClose={() => setShowDownload(false)}
        />
      )}
    </section>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DocumentIndexCard — "Sync documents" section under the Database tab
// ═══════════════════════════════════════════════════════════════════════════
// Mirrors VoiceIndexCard / MediaIndexCard but without a model-download
// step — Apple PDFKit + Vision are first-party macOS frameworks always
// available on supported OS versions.
//
// Counts come from dbStatus:
//   document_pdf_total   — denominator for the gauge (PDFs only).
//   document_total       — full document-message count, surfaced in
//                          the subtitle so the user understands the
//                          long tail of xlsx/docx is visible-but-skipped.
//   document_extracted   — rows with body text persisted to wa_document_text.
//   document_empty       — rows where PDFKit + OCR found nothing
//                          (image-only PDFs that resisted OCR). Counted
//                          as done for the gauge.
//   document_unsupported — non-PDF docs we don't extract today.
function DocumentIndexCard({ dbStatus, job, onDocumentIndex, hasSessionPassword, reloadDbStatus }) {
  const [prompting, setPrompting] = useState(false);
  const j = job || {};
  const isRunning = !!j.running;
  const hasDone   = j.done !== undefined && j.done !== null;
  const progress  = j.progress || null;

  useEffect(() => {
    if (hasDone && j.done === true) reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [hasDone, j.done]);

  if (!dbStatus) return null;
  const hasDB        = !!dbStatus.db_exists;
  const totalAll     = dbStatus.document_total ?? null;
  const total        = dbStatus.document_pdf_total ?? null;
  const extracted    = dbStatus.document_extracted ?? 0;
  const empty        = dbStatus.document_empty ?? 0;
  const unsupported  = dbStatus.document_unsupported ?? 0;
  // "Done" for the gauge = extracted + empty. Empty rows ran the
  // pipeline cleanly; counting them as remaining would mean a
  // re-run that does nothing every time.
  const done         = extracted + empty;
  const remaining    = total != null ? Math.max(total - done, 0) : null;
  const allDone      = total != null && total > 0 && done >= total;

  let title, subtitle, buttonLabel, buttonPrimary, statusDot;
  if (!hasDB) {
    title         = "Run a messages sync first";
    subtitle      = "Document indexing reads the message database — sync that above before extracting documents.";
    buttonLabel   = "Sync documents";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (totalAll === 0) {
    title         = "No documents on device";
    subtitle      = "There's nothing to extract — your WhatsApp has no document messages.";
    buttonLabel   = "Sync documents";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (total === 0) {
    title         = "No PDF attachments";
    subtitle      = totalAll != null
      ? `${totalAll.toLocaleString()} document messages on the device, but no PDFs. Non-PDF formats (xlsx, docx, …) aren't extracted yet — filenames remain searchable via wa_document.`
      : "No PDF attachments on the device. Non-PDF formats aren't extracted yet — filenames remain searchable via wa_document.";
    buttonLabel   = "Sync documents";
    buttonPrimary = false;
    statusDot     = "#9ca3af";
  } else if (allDone) {
    title         = "All PDFs extracted";
    subtitle      = `${done.toLocaleString()} of ${total.toLocaleString()} PDFs processed${empty > 0 ? ` (${empty.toLocaleString()} image-only without recoverable text)` : ""}${unsupported > 0 ? ` · ${unsupported.toLocaleString()} non-PDF skipped` : ""}.`;
    buttonLabel   = "Re-extract";
    buttonPrimary = false;
    statusDot     = "#25D366";
  } else if (done === 0) {
    title         = "PDFs not yet extracted";
    subtitle      = total != null
      ? `${total.toLocaleString()} PDFs on the device${totalAll != null && totalAll > total ? ` (out of ${totalAll.toLocaleString()} document messages — non-PDF formats aren't extracted yet)` : ""}. PDFKit handles native text; Apple Vision OCR is the fallback for scanned pages.`
      : "PDFKit + Apple Vision OCR extract every PDF's text and persist it to wa_document_text.";
    buttonLabel   = "Sync documents";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  } else {
    title         = "Resume document extraction";
    subtitle      = `${done.toLocaleString()} / ${total.toLocaleString()} PDFs processed · ${remaining.toLocaleString()} remaining.`;
    buttonLabel   = "Resume";
    buttonPrimary = true;
    statusDot     = "#f59e0b";
  }

  const pct = (total != null && total > 0)
    ? Math.min(100, Math.round((done / total) * 100))
    : 0;

  const launch = () => {
    if (hasSessionPassword) onDocumentIndex("");
    else setPrompting(true);
  };
  const buttonDisabled = isRunning || !hasDB || total === 0;

  return (
    <section className="mt-6">
      <div className="flex items-center gap-2">
        <h2 className="text-xs font-semibold uppercase tracking-wider" style={{color:'#075E54'}}>Document enrichment</h2>
        <span className="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">Optional</span>
      </div>
      <p className="text-[11px] text-gray-400 mb-3 mt-1">Enrich database with document text so the agents can read the documents too</p>

      <div className="rounded-xl bg-white border p-5" style={{borderColor:'#DCF8C6'}}>
        <h3 className="text-sm font-semibold text-gray-900">Apple PDFKit · local</h3>
        <p className="text-[11px] text-gray-400 mb-3">Extracts text from each PDF on your Mac, with Vision OCR for scanned pages — free and private.</p>

        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="flex h-2 w-2 rounded-full shrink-0" style={{background: statusDot}}></span>
              <p className="font-medium text-gray-700 text-sm">{title}</p>
            </div>
            <p className="text-xs text-gray-500 mt-1">{subtitle}</p>

            {!isRunning && hasDB && total != null && total > 0 && (
              <div className="mt-3">
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width: `${pct}%`, background:'#25D366'}}></div>
                </div>
                <p className="text-[10px] text-gray-400 mt-1">{pct}% extracted</p>
              </div>
            )}
          </div>

          <button onClick={launch} disabled={buttonDisabled}
            className="shrink-0 flex items-center gap-2 rounded-lg text-white disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 text-sm font-semibold transition-colors"
            style={{background: isRunning ? '#128C7E' : buttonPrimary ? '#075E54' : '#6b7280'}}>
            <RefreshIcon />
            {isRunning ? "Extracting…" : buttonLabel}
          </button>
        </div>

        {j.error && (
          <p className="text-sm text-red-500 mt-3">{j.error}</p>
        )}

        {isRunning && (
          <div className="mt-4 rounded-lg p-4" style={{background:'#F0F7F0', border:'1px solid #DCF8C6'}}>
            {progress ? (
              <>
                <div className="flex items-baseline justify-between text-xs mb-2">
                  <span className="font-semibold text-gray-900">
                    {progress.done.toLocaleString()} / {(progress.pending || 0).toLocaleString()} documents
                  </span>
                  <span className="text-gray-500">
                    {progress.rate_per_sec ? `${progress.rate_per_sec.toFixed(1)} docs/s` : ""}
                    {progress.eta_seconds > 0 ? ` · ETA ${fmtEta(progress.eta_seconds)}` : ""}
                  </span>
                </div>
                <div className="h-2 w-full bg-white rounded-full overflow-hidden border" style={{borderColor:'#DCF8C6'}}>
                  <div className="h-full rounded-full transition-all duration-500" style={{
                    width: `${Math.min(100, Math.round((progress.done / Math.max(progress.pending, 1)) * 100))}%`,
                    background:'#25D366',
                  }}></div>
                </div>
                <div className="grid grid-cols-4 gap-2 mt-3 text-[11px] text-gray-600">
                  <div title="PDFs whose text was extracted (PDFKit native and/or Vision OCR) and persisted to wa_document_text.">
                    <span className="font-semibold text-gray-900">{progress.extracted.toLocaleString()}</span> extracted
                  </div>
                  <div title="PDFs that opened but had no recoverable text — image-only PDFs whose OCR also returned blank.">
                    <span className="font-semibold text-gray-900">{(progress.empty || 0).toLocaleString()}</span> empty
                  </div>
                  <div title="Document referenced in DB but the file isn't in the iOS backup.">
                    <span className="font-semibold text-gray-900">{progress.missing.toLocaleString()}</span> missing
                  </div>
                  <div title="Decrypt / write / PDFKit failure. Run with --retry-errors to re-attempt.">
                    <span className="font-semibold text-gray-900">{progress.errors.toLocaleString()}</span> errors
                  </div>
                </div>
                {progress.unsupported > 0 && (
                  <p className="text-[10px] text-gray-400 mt-2">
                    {progress.unsupported.toLocaleString()} non-PDF skipped (xlsx/docx/etc. — filenames remain searchable via wa_document).
                  </p>
                )}
                {progress.current_label && (
                  <p className="text-[10px] text-gray-400 mt-1 font-mono truncate">
                    Now: {progress.current_label}
                  </p>
                )}
              </>
            ) : (
              <p className="text-xs text-gray-500">Preparing…</p>
            )}
            {j.lines && j.lines.length > 0 && (
              <p className="text-[10px] text-gray-400 mt-3 font-mono truncate">
                {j.lines[j.lines.length - 1]}
              </p>
            )}
          </div>
        )}

        {hasDone && j.done === true && !isRunning && (
          <p className="text-xs text-gray-500 mt-3">✓ Extraction complete. Agent queries can now MATCH on document body text.</p>
        )}
      </div>


      {prompting && (
        <PasswordPromptModal
          device={{ name: "the latest iPhone backup" }}
          onConfirm={pw => { setPrompting(false); onDocumentIndex(pw); }}
          onCancel={() => setPrompting(false)}
          confirmLabel="Sync documents"
        />
      )}
    </section>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// VoiceModelDownloadModal — first-run speech-model installer
// ═══════════════════════════════════════════════════════════════════════════
// Two visual states gated by modelJob.running:
//   1. Idle (pre-click)        — shows model name, size, source URL,
//                                cache path, and a [Cancel] / [Download]
//                                button pair.
//   2. In-progress (post-click) — shows MB / total · MB/s · ETA, with
//                                a progress bar and a Close button. The
//                                actual cancel-the-download mechanism
//                                is deferred (would require sending
//                                DELETE /api/jobs/{id}).
function VoiceModelDownloadModal({ modelInfo, modelJob, onStart, onClose }) {
  const mj = modelJob || {};
  const running = !!mj.running;
  const done    = mj.done === true;
  const failed  = mj.done === false && !!mj.error;
  const p       = mj.progress || null;
  const stage   = p?.stage || (failed ? "error" : "idle");

  const total   = modelInfo?.bytes_total ?? 0;
  const got     = p?.bytes_read ?? 0;
  const pct     = total > 0 ? Math.min(100, (got / total) * 100) : 0;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.45)'}}>
      <div className="rounded-xl bg-white shadow-xl w-full max-w-md p-6" style={{border:'1px solid #DCF8C6'}}>
        <h3 className="font-semibold text-gray-900 text-base mb-2">
          {done ? "Speech model installed" : "Set up voice transcription"}
        </h3>

        {!running && !done && !failed && (
          <>
            <p className="text-sm text-gray-600 leading-relaxed mb-4">
              WhatsKept needs to download a speech model before it can transcribe voice notes.
              This is a one-time download — the model persists across all future app updates.
            </p>
            <dl className="text-xs text-gray-700 space-y-1.5 mb-5 rounded-lg p-3" style={{background:'#F8FAFC', border:'1px solid #E5E7EB'}}>
              <div className="flex justify-between"><dt className="text-gray-500">Model</dt><dd className="font-medium">{modelInfo?.display || "Whisper Large-v3-Turbo"}</dd></div>
              <div className="flex justify-between"><dt className="text-gray-500">Size</dt><dd className="font-medium">{fmtMB(total)}</dd></div>
              <div className="flex justify-between"><dt className="text-gray-500">Source</dt><dd className="font-medium">HuggingFace</dd></div>
              <div className="flex justify-between gap-3 min-w-0"><dt className="text-gray-500 shrink-0">Cache</dt><dd className="font-mono text-[10px] truncate text-right" title={modelInfo?.path}>~/Library/Application Support/whatskept/models/</dd></div>
            </dl>
            <div className="flex justify-end gap-2">
              <button onClick={onClose}
                className="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg">Cancel</button>
              <button onClick={onStart}
                className="px-4 py-2 text-sm font-semibold text-white rounded-lg" style={{background:'#075E54'}}>
                Download &amp; install
              </button>
            </div>
          </>
        )}

        {running && (
          <>
            <p className="text-xs text-gray-500 mb-3">
              {stage === "verifying"
                ? "Verifying integrity (sha256)…"
                : `${fmtMB(got)} of ${fmtMB(total)}`}
            </p>
            <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all" style={{width:`${pct}%`, background:'#25D366'}}></div>
            </div>
            {stage === "downloading" && p && (
              <div className="flex justify-between text-[11px] text-gray-500 mt-2">
                <span>{p.rate_bps ? `${(p.rate_bps / (1024*1024)).toFixed(1)} MB/s` : ""}</span>
                <span>{p.eta_seconds > 0 ? `ETA ${fmtEta(p.eta_seconds)}` : ""}</span>
              </div>
            )}
            <p className="text-[10px] text-gray-400 mt-4">
              Downloading from HuggingFace · this window can stay open in the background.
            </p>
          </>
        )}

        {done && (
          <>
            <p className="text-sm text-gray-600 leading-relaxed mb-4">
              ✓ The speech model is installed at <code className="font-mono text-[11px]">~/Library/Application Support/whatskept/models/</code>.
              You can now transcribe your voice notes.
            </p>
            <div className="flex justify-end">
              <button onClick={onClose}
                className="px-4 py-2 text-sm font-semibold text-white rounded-lg" style={{background:'#075E54'}}>
                Continue
              </button>
            </div>
          </>
        )}

        {failed && (
          <>
            <p className="text-sm text-red-600 leading-relaxed mb-3">
              Download failed: {mj.error}
            </p>
            <p className="text-xs text-gray-500 mb-4">
              The partial file is preserved — clicking <strong>Retry</strong> resumes from where it stopped (HTTP Range).
            </p>
            <div className="flex justify-end gap-2">
              <button onClick={onClose}
                className="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg">Close</button>
              <button onClick={onStart}
                className="px-4 py-2 text-sm font-semibold text-white rounded-lg" style={{background:'#075E54'}}>
                Retry
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// WorkspaceSizes — per-section disk-size breakdown shown above the
// "Open in agent" list. Helps the user reason about what's actually
// in the workspace they're about to hand to a model — and which subdirs
// are large enough to be worth ignoring (media/, voice/) vs. small
// enough to leave in (the SQLite db, the profile thumbnails).
//
// Sections always render even when missing/empty: an absent section is
// still useful information ("voice notes haven't been transcribed yet"),
// and a stable row count avoids layout jitter on first sync.
//
// State is shared via WorkspaceSizesContext so the Agents-tab card, the
// header total, and any future consumer all see the same numbers and
// don't each hit /api/workspace/sizes on a different schedule. The
// provider polls every WORKSPACE_SIZES_REFRESH_MS to catch changes
// produced by sync jobs (media-index, voice-index, etc.) without us
// having to wire change events from every job.
// ═══════════════════════════════════════════════════════════════════════════
const WORKSPACE_SIZE_ROWS = [
  { key: "database",  label: "Database",  hint: "ChatStorage.sqlite",                missing: "Not generated yet — run a backup." },
  { key: "profiles",  label: "Profiles",  hint: "profiles/whatsapp + profiles/ios",  missing: "No profile pictures yet." },
  { key: "media",     label: "Media",     hint: "photos & videos",                   missing: "No media indexed yet." },
  { key: "voice",     label: "Voice",     hint: "voice-note audio & transcripts",    missing: "No voice notes indexed yet." },
  { key: "documents", label: "Documents", hint: "PDFs & other documents",            missing: "No documents indexed yet." },
];

const WORKSPACE_SIZES_REFRESH_MS = 10 * 60 * 1000; // 10 minutes

const WorkspaceSizesContext = createContext({
  sizes: null,
  error: "",
  refresh: () => {},
});

// WorkspaceSizesProvider fetches /api/workspace/sizes once on mount
// and then on a 10-minute interval, exposing the latest snapshot to
// any descendant that calls useWorkspaceSizes. Visibility-aware: we
// also re-fetch when the window regains focus so the user always sees
// fresh numbers right after they tab back from another app (e.g.
// after running a manual sync in Finder/Terminal).
function WorkspaceSizesProvider({ children }) {
  const [sizes, setSizes] = useState(null); // null = loading
  const [error, setError] = useState("");
  const mountedRef = useRef(true);

  const refresh = useCallback(() => {
    return api.get("/api/workspace/sizes")
      .then(data => { if (mountedRef.current) { setSizes(data || {}); setError(""); } })
      .catch(e => { if (mountedRef.current) setError(e.message); });
  }, []);

  useEffect(() => {
    mountedRef.current = true;
    refresh();
    const id = setInterval(refresh, WORKSPACE_SIZES_REFRESH_MS);
    const onFocus = () => refresh();
    window.addEventListener("focus", onFocus);
    return () => {
      mountedRef.current = false;
      clearInterval(id);
      window.removeEventListener("focus", onFocus);
    };
  }, [refresh]);

  const value = useMemo(() => ({ sizes, error, refresh }), [sizes, error, refresh]);
  return <WorkspaceSizesContext.Provider value={value}>{children}</WorkspaceSizesContext.Provider>;
}

const useWorkspaceSizes = () => useContext(WorkspaceSizesContext);

// revealInFinder opens a workspace section in macOS Finder. Failures
// are swallowed — the click is a "show me" affordance, not a critical
// action; surfacing an alert for a transient `open` glitch would be
// more annoying than useful.
const revealInFinder = (key) =>
  api.post("/api/workspace/reveal", { key }).catch(() => {});

// WorkspaceTotalBadge — compact "12.4 MB" inline tag for the header's
// secondary line. Consumes the same WorkspaceSizesContext as the
// Agents-tab breakdown so both numbers always agree. Renders nothing
// while the first fetch is in flight to avoid layout jitter, and
// nothing on error — the Agents tab is the right place to surface
// detailed size failures.
function WorkspaceTotalBadge() {
  const { sizes } = useWorkspaceSizes();
  if (!sizes || typeof sizes.total !== "number" || sizes.total <= 0) return null;
  return (
    <button onClick={() => revealInFinder("root")}
      title="Show workspace in Finder"
      className="ml-2 inline-flex items-center text-[11px] tabular-nums text-gray-400 hover:text-gray-600 hover:underline">
      {formatBytes(sizes.total)}
    </button>
  );
}

// WorkspaceSizes renders the size breakdown as a grid of clickable
// metric boxes — one per workspace section plus a highlighted Workspace
// total. Each box reveals its folder in macOS Finder on click; the hover
// state (border tint + ↗ glyph) signals that the box is actionable.
// Sections that don't exist yet are skipped so every visible box opens
// something real.
function WorkspaceSizes() {
  const { sizes, error } = useWorkspaceSizes();

  if (error && sizes === null) {
    return <p className="text-xs text-gray-500">Could not read workspace sizes: {error}</p>;
  }
  if (sizes === null) {
    return <p className="text-xs text-gray-400">Measuring workspace…</p>;
  }

  const total = sizes.total || WORKSPACE_SIZE_ROWS.reduce((sum, r) => {
    const e = sizes[r.key];
    return sum + (e && e.exists ? (e.bytes || 0) : 0);
  }, 0);

  const segments = WORKSPACE_SIZE_ROWS
    .filter(row => sizes[row.key] && sizes[row.key].exists)
    .map(row => ({ key: row.key, label: row.label, bytes: sizes[row.key].bytes || 0 }));

  // OpenArrow — appears on hover to reinforce "this opens a folder".
  const OpenArrow = ({ light }) => (
    <span className={`ml-auto shrink-0 opacity-0 group-hover:opacity-100 transition-opacity ${light ? "text-white" : ""}`}
      style={light ? undefined : {color:'#075E54'}} aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 17 17 7M9 7h8v8"/>
      </svg>
    </span>
  );

  return (
    // Outer card = the Workspace folder; the section boxes are nested
    // inside it so the containment (sections live within the workspace)
    // reads visually, not as siblings sitting next to it.
    <div className="rounded-xl border overflow-hidden" style={{borderColor:'#075E54'}}>
      {/* Header — the workspace total, clickable to open the root folder. */}
      <button onClick={() => revealInFinder("root")}
        title="Open workspace folder in Finder"
        className="group w-full flex items-center gap-3 p-3 text-left transition"
        style={{background:'#075E54'}}>
        <span className="flex h-9 w-9 items-center justify-center rounded-lg shrink-0 text-white" style={{background:'rgba(255,255,255,0.18)'}}>
          <FolderOpenIcon />
        </span>
        <span className="min-w-0">
          <span className="block text-[10px] uppercase tracking-wider" style={{color:'rgba(255,255,255,0.7)'}}>Workspace</span>
          <span className="block text-sm font-semibold tabular-nums text-white">{total > 0 ? formatBytes(total) : "0 B"}</span>
        </span>
        <OpenArrow light />
      </button>

      {/* Nested section boxes, on a tinted inset so they read as contents. */}
      {segments.length > 0 && (
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 p-3" style={{background:'#F2FBF5'}}>
          {segments.map(seg => (
            <button key={seg.key} onClick={() => revealInFinder(seg.key)}
              title={`Open ${seg.label} folder in Finder`}
              className="group flex items-center gap-3 rounded-xl border border-[#DCF8C6] bg-white p-3 text-left transition hover:border-[#128C7E] hover:shadow-sm">
              <span className="flex h-9 w-9 items-center justify-center rounded-lg shrink-0" style={{background:'#DCF8C6', color:'#075E54'}}>
                <FolderOpenIcon />
              </span>
              <span className="min-w-0">
                <span className="block text-[10px] uppercase tracking-wider text-gray-400">{seg.label}</span>
                <span className="block text-sm font-semibold tabular-nums" style={{color:'#075E54'}}>{formatBytes(seg.bytes)}</span>
              </span>
              <OpenArrow />
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// NiceSelect — a styled dropdown replacing the native <select>. Options
// are { value, label, tag? }. Closes on outside-click / Escape, supports
// keyboard (↑/↓/Enter), and themes to the WhatsApp palette.
// ═══════════════════════════════════════════════════════════════════════════
function NiceSelect({ value, onChange, options, className, ariaLabel }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const selected = options.find(o => o.value === value) || null;

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [open]);

  const pick = (v) => { onChange(v); setOpen(false); };

  return (
    <div ref={ref} className={`relative ${className || ""}`}>
      <button type="button" aria-label={ariaLabel} aria-haspopup="listbox" aria-expanded={open}
        onClick={() => setOpen(o => !o)}
        className="w-full flex items-center gap-2 rounded-lg border bg-white px-3 py-2 text-sm font-semibold text-left transition hover:border-[#128C7E]"
        style={{borderColor: open ? '#128C7E' : '#8FCBA6', color:'#075E54'}}>
        <span className="flex-1 min-w-0 truncate">
          {selected ? selected.label : "Select…"}
          {selected && selected.tag && (
            <span className="ml-2 text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-gray-100 text-gray-500 font-medium">{selected.tag}</span>
          )}
        </span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
          strokeLinecap="round" strokeLinejoin="round"
          className={`shrink-0 transition-transform ${open ? "rotate-180" : ""}`} style={{color:'#128C7E'}}>
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>

      {open && (
        <div role="listbox"
