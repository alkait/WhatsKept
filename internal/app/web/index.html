        Support for more agents (Cursor, Claude Code, Codex CLI) lands as we test each integration.
      </p>
    </section>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// SCREEN 2 — Backup Manager
// ═══════════════════════════════════════════════════════════════════════════
function BackupManagerScreen({ workspace, onSwitchWorkspace, reloadWorkspace }) {
  const [tab, setTab]               = useState("backups");
  const [devices, setDevices]       = useState([]);
  const [backups, setBackups]       = useState([]);
  const [backupsKey, setBackupsKey] = useState(0);
  const [loading, setLoading]       = useState(true);
  const [deleteTarget, setDeleteTarget] = useState(null);
  // Header workspace-menu state. menuOpen toggles the dropdown,
  // deletingWs gates the confirm modal. The menu auto-closes on any
  // click that lands outside its container (see effect below) so it
  // behaves like a native popover rather than an always-on UI element.
  const [menuOpen, setMenuOpen]     = useState(false);
  const [deletingWs, setDeletingWs] = useState(false);
  const menuRef = useRef(null);
  useEffect(() => {
    if (!menuOpen) return;
    const onDown = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);
    };
    document.addEventListener("mousedown", onDown);
    return () => document.removeEventListener("mousedown", onDown);
  }, [menuOpen]);

  // jobs: { [key]: { running, done, lines, adopted, pid, startedAt, error,
  //                   dirStats: { exists, file_count, total_bytes } } }
  // key = udid for backup jobs, "db:sync" for the messages sync job
  const [jobs, setJobs] = useState({});

  const patchJob = (key, patch) =>
    setJobs(prev => ({ ...prev, [key]: { ...(prev[key] || {}), ...patch } }));

  // ── backup directory polling ──────────────────────────────────────────
  // Single interval that re-reads from a ref so we don't tear down/rebuild
  // it every time `jobs` mutates (which happens on every streamed log
  // line). For each running backup job we GET /api/backup/{udid}/dir-stats
  // every two seconds and stash the result on the job. The Backups card
  // renders this so adopted backups (where stdout was already lost) and
  // freshly-started backups both show "N files · X MB written" even
  // before idevicebackup2's stdout starts emitting [N/M] progress lines.
  const jobsRef = useRef(jobs);
  useEffect(() => { jobsRef.current = jobs; }, [jobs]);
  useEffect(() => {
    const tick = () => {
      const cur = jobsRef.current || {};
      Object.entries(cur).forEach(([key, j]) => {
        if (key === "db:sync") return;
        if (!j || !j.running) return;
        api.get(`/api/backup/${key}/dir-stats`)
           .then(stats => patchJob(key, { dirStats: stats }))
           .catch(() => {});
      });
    };
    tick();
    const id = setInterval(tick, 2000);
    return () => clearInterval(id);
  }, []);

  // ── database status ───────────────────────────────────────────────────
  const [dbStatus, setDbStatus] = useState(null);
  const reloadDbStatus = () => api.get("/api/database/status").then(setDbStatus).catch(() => {});
  useEffect(() => { reloadDbStatus(); }, []);
  // Re-fetch every time the user lands on the Database tab. Without this,
  // a backup deleted/created from the Backups tab leaves the Database tab
  // showing stale state (button still enabled though no backup exists,
  // or "No backups found" though the user just made one) until the next
  // explicit Refresh click or app restart.
  useEffect(() => {
    if (tab === "database") reloadDbStatus();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [tab]);

  // ── session-cached backup password ────────────────────────────────────
  // The server caches the iOS-backup password in RAM for the lifetime
  // of the process (cleared on workspace switch). Knowing whether one
  // is cached lets the UI skip the modal on subsequent runs.
  const [hasSessionPassword, setHasSessionPassword] = useState(false);
  const reloadSessionPassword = () =>
    api.get("/api/session/password").then(r => setHasSessionPassword(!!(r && r.has))).catch(() => {});
  useEffect(() => { reloadSessionPassword(); }, []);
  const forgetSessionPassword = async () => {
    try { await api.del("/api/session/password"); } catch(e) {}
    setHasSessionPassword(false);
  };

  // ── forget workspace binding (the escape hatch behind the ────────────
  // "Forget this workspace's identity" link in the Database card).
  // Deletes .whatskept.json so the next sync re-binds from whatever
  // the latest backup says. Refreshes workspace + dbStatus so the
  // header and Sync card both reflect the unbound state.
  const forgetBinding = async () => {
    if (!window.confirm(
      "Forget this workspace's identity?\n\n" +
      "The .whatskept.json file will be deleted. The next sync will rebind " +
      "the workspace to whichever backup it decrypts \u2014 use this only when you " +
      "genuinely intend to repoint the workspace at a different WhatsApp account."
    )) return;
    try { await api.del("/api/binding"); } catch(e) {}
    await reloadWorkspace();
    await reloadDbStatus();
  };

  // ── load backups ──────────────────────────────────────────────────────
  const [backupsError, setBackupsError] = useState(null);
  const reloadBackups = useCallback(async () => {
    setLoading(true);
    setBackupsError(null);
    try {
      const data = await api.get("/api/backups");
      setBackups(data);
    } catch(e) {
      setBackupsError(e.message || "Failed to read backup directory.");
      setBackups([]);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { reloadBackups(); }, [backupsKey]);

  // ── poll devices every 3 s ────────────────────────────────────────────
  useEffect(() => {
    let alive = true;
    const poll = () => api.get("/api/devices").then(devs => { if (alive) setDevices(devs); }).catch(() => {});
    poll();
    const id = setInterval(poll, 3000);
    return () => { alive = false; clearInterval(id); };
  }, []);

  // ── on mount: reconnect to adopted/active job ─────────────────────────
  useEffect(() => {
    api.get("/api/jobs/active").then(active => {
      if (!active || !active.job_id) return;
      const isDbTask = !!active.task;
      const key = isDbTask ? `db:${active.task}` : (active.udid || "__adopted__");
      patchJob(key, { running: true, done: null, lines: [], adopted: active.adopted, pid: active.pid, startedAt: active.started_at, error: "" });
      streamJob(active.job_id, key, isDbTask);
      if (isDbTask) setTab("database");
    }).catch(() => {});
  }, []);

  // ── SSE streaming ─────────────────────────────────────────────────────
  const streamJob = (jobId, key, isDbTask) => {
    const es = new EventSource(`/api/stream/${jobId}`);
    es.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === "adopted") patchJob(key, { adopted: true, pid: msg.pid });
      if (msg.type === "line")    setJobs(prev => ({
        ...prev,
        [key]: { ...(prev[key]||{}), lines: [...((prev[key]||{}).lines||[]), msg.data] }
      }));
      // "progress" events carry a JSON payload whose shape depends on
      // the job's task (currently only media-index emits these — see
      // postprocess.MediaIndexProgress). We just stash the parsed
      // payload on the job and let the per-task card render it.
      if (msg.type === "progress") {
        try {
          const p = JSON.parse(msg.data);
          setJobs(prev => ({
            ...prev,
            [key]: { ...(prev[key]||{}), progress: p }
          }));
        } catch { /* ignore malformed payload */ }
      }
      if (msg.type === "done") {
        const ok = msg.status === "ok";
        // Every completed messages-sync may have written a fresh
        // .whatskept.json (first sync) or refreshed LastSyncedAt
        // (subsequent). Pull the new binding so the header label
        // updates without the user having to switch workspaces.
        if (isDbTask) setTimeout(reloadWorkspace, 500);
        // Reconcile with the server's session-password truth. The
        // server only commits a password to its cache AFTER the job
        // succeeds, so on success `has` flips to true and on failure
        // it stays whatever it was before (typically false). This is
        // what fixes the "wrong password gets stuck" bug: a failed
        // attempt leaves hasSessionPassword=false on the client, so
        // the next button click re-opens the password modal instead
        // of silently retrying with the same bad password.
        reloadSessionPassword();
        // Plumb the server-side error string through to j.error so the
        // card can render WHY a sync failed instead of just "Sync failed."
        // with no context. msg.error is set by jobManager.startInProcess
        // for in-process job errors, and by pumpProcess for non-zero
        // subprocess exits.
        patchJob(key, {
          running: false,
          done: ok,
          error: ok ? "" : (msg.error || "")
        });
        es.close();
        if (ok && isDbTask) setTimeout(reloadDbStatus, 1000);
        if (ok && !isDbTask) setTimeout(() => setBackupsKey(k => k + 1), 1500);
      }
    };
    es.onerror = () => {
      // Distinct from a real "done:error". A transport drop here means
      // we lost the connection without ever seeing a terminal event —
      // the goroutine MAY still be running and MAY still write the DB
      // successfully. Mark indeterminate and ask the user to refresh
      // rather than slam "Sync failed."
      patchJob(key, {
        running: false,
        done: false,
        error: "Lost connection to the sync stream. Click Refresh to verify whether it actually completed."
      });
      es.close();
    };
  };

  // ── start backup ──────────────────────────────────────────────────────
  // `password` may be "" when the caller knows the server already has
  // one cached for this session. The server falls back to its cache
  // and, if a fresh non-empty password is provided, replaces it.
  const startBackup = async (device, password) => {
    const key = device.udid;
    patchJob(key, { running: true, done: null, lines: [], adopted: false, pid: null, startedAt: new Date().toISOString(), error: "" });
    try {
      const { job_id } = await api.post("/api/backup/run", { udid: key, password: password || null });
      // Don't flip hasSessionPassword=true here — the server hasn't
      // verified the password yet. The streamJob "done" handler will
      // reconcile from /api/session/password once the backup either
      // succeeds (server commits the cache) or fails (server leaves
      // it untouched, so the modal re-opens on retry).
      streamJob(job_id, key, false);
    } catch(ex) {
      patchJob(key, { running: false, done: false, error: ex.message });
    }
  };

  // ── start messages sync ────────────────────────────────────────────────
  const startSync = async (password) => {
    const key = "db:sync";
    patchJob(key, { running: true, done: null, lines: [], adopted: false, pid: null, startedAt: new Date().toISOString(), error: "" });
    try {
      const { job_id } = await api.post("/api/database/sync", { password });
      // See startBackup: server-side cache commit is deferred to the
      // job's success, so we read it back from /api/session/password
      // on "done" rather than assuming it took.
      streamJob(job_id, key, true);
    } catch(ex) {
      patchJob(key, { running: false, done: false, error: ex.message });
    }
  };

  // ── start image-OCR (media-index) ─────────────────────────────────────
  // Uses key "db:media-index" so it matches what the server reports as
  // the active job's task on /api/jobs/active — that way a page reload
  // mid-run reconnects to the same in-memory job state.
  const startMediaIndex = async (password) => {
    const key = "db:media-index";
    patchJob(key, {
      running: true, done: null,
      lines: [], progress: null,
      adopted: false, pid: null,
      startedAt: new Date().toISOString(), error: "",
    });
    try {
      const { job_id } = await api.post("/api/database/media-index", { password });
      streamJob(job_id, key, true);
    } catch(ex) {
      patchJob(key, { running: false, done: false, error: ex.message });
    }
  };

  // ── start voice transcription (voice-index) ───────────────────────────
  // Same shape as startMediaIndex. The server returns 412 with
  // {error: "model_required"} if the speech model isn't installed —
  // we surface that as an error string so the card can render a
  // distinguishable "Download model first" affordance.
  const startVoiceIndex = async (password) => {
    const key = "db:voice-index";
    patchJob(key, {
      running: true, done: null,
      lines: [], progress: null,
      adopted: false, pid: null,
      startedAt: new Date().toISOString(), error: "",
    });
    try {
      const { job_id } = await api.post("/api/database/voice-index", { password });
      streamJob(job_id, key, true);
    } catch(ex) {
      // If the server rejected with 412/model_required, normalise the
      // error string so the card knows to open the download modal
      // instead of showing a generic failure.
      const isModelRequired = (ex.message || "").includes("model_required");
      patchJob(key, {
        running: false,
        done: false,
        error: isModelRequired ? "model_required" : ex.message,
      });
    }
  };

  // ── start voice-model download (one-time, ~574 MB) ────────────────────
  // Tracked under its own job key so the UI can show progress simultaneously
  // with whatever the user was about to do (voice-index, in practice).
  const startVoiceModelDownload = async () => {
    const key = "db:voice-model-download";
    patchJob(key, {
      running: true, done: null,
      lines: [], progress: null,
      adopted: false, pid: null,
      startedAt: new Date().toISOString(), error: "",
    });
    try {
      const { job_id } = await api.post("/api/database/voice-index/model-download", {});
      streamJob(job_id, key, true);
    } catch(ex) {
      patchJob(key, { running: false, done: false, error: ex.message });
    }
  };

  const tabs = [
    { id: "backups",  label: "Backups"  },
    { id: "database", label: "Database" },
    { id: "agents",   label: "Agents"   },
  ];

  return (
    <div className="min-h-screen flex flex-col">
      {/* Header */}
      <header className="px-6 pt-5 pb-4 border-b flex items-center gap-3" style={{borderColor:'#c8e6c0',background:'#ECE5DD'}}>
        <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{background:'#DCF8C6',border:'1px solid #128C7E'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#075E54" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div className="flex-1 min-w-0">
          {workspace.binding ? (
            <>
              <p className="text-sm font-semibold leading-tight text-gray-900 truncate">
                {workspace.binding.device_name || "iPhone"}
                {workspace.binding.owner_jid && (
                  <span className="text-gray-500 font-normal ml-2">
                    {phoneFromJID(workspace.binding.owner_jid)}
                  </span>
                )}
              </p>
              <p className="text-[11px] text-gray-400 truncate mt-0.5">
                {workspace.path.replace(/^\/Users\/[^/]+/, "~")}
                <span className="font-mono ml-2">{shortUDID(workspace.binding.udid)}</span>
              </p>
            </>
          ) : (
            <>
              <p className="text-xs font-semibold leading-none" style={{color:'#075E54'}}>WhatsKept</p>
              <p className="text-xs text-gray-400 truncate mt-0.5">{workspace.path.replace(/^\/Users\/[^/]+/, "~")}</p>
            </>
          )}
        </div>
        <div className="relative ml-2" ref={menuRef}>
          <button onClick={() => setMenuOpen(o => !o)} aria-haspopup="menu" aria-expanded={menuOpen}
            className="text-xs text-gray-400 hover:text-gray-600 px-1.5 py-1 rounded inline-flex items-center gap-1">
            Workspace
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          {menuOpen && (
            <div role="menu"
              className="absolute right-0 top-full mt-1 w-48 rounded-lg bg-white border shadow-lg py-1 z-40"
              style={{borderColor:'#DCF8C6'}}>
              <button role="menuitem"
                onClick={() => { setMenuOpen(false); onSwitchWorkspace(); }}
                className="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">
                Switch workspace
              </button>
              <button role="menuitem"
                onClick={() => { setMenuOpen(false); setDeletingWs(true); }}
                className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50">
                Delete workspace…
              </button>
            </div>
          )}
        </div>
      </header>

      {/* Tab bar */}
      <div className="px-6 pt-4 flex gap-1 border-b" style={{borderColor:'#c8e6c0',background:'#ECE5DD'}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className="px-4 py-2 text-sm font-medium rounded-t-lg transition-colors border-b-2 -mb-px"
            style={tab === t.id
              ? {borderColor:'#075E54', color:'#075E54', background:'#DCF8C6', border:'1px solid #128C7E', borderBottom:'2px solid #075E54'}
              : {borderColor:'transparent', color:'#6b7280'}}>
            {t.label}
          </button>
        ))}
      </div>

      <main className="flex-1 overflow-y-auto p-6 space-y-6" style={{background:'#ECE5DD'}}>

        {/* ══ BACKUPS TAB ══ */}
        {tab === "backups" && (<>
          {/* ── Available Backups ── */}
          <section>
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-xs font-semibold uppercase tracking-wider" style={{color:'#075E54'}}>Available Backups</h2>
              <button onClick={() => setBackupsKey(k => k + 1)}
                className="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">
                <RefreshIcon /> Refresh
              </button>
            </div>
            {loading ? (
              <div className="text-sm text-gray-400 py-8 text-center">Loading…</div>
            ) : backupsError ? (
              <div className="rounded-xl border p-5 text-sm" style={{borderColor:'#128C7E',background:'#fff'}}>
                <div className="font-medium mb-2" style={{color:'#075E54'}}>Cannot read backup directory</div>
                <div className="text-gray-600 mb-3">{backupsError}</div>
                <div className="text-xs text-gray-500 leading-relaxed">
                  On macOS, iOS backups live in a protected directory. Grant
                  <span className="font-medium"> Full Disk Access</span> to WhatsKept:
                  System Settings → Privacy &amp; Security → Full Disk Access → add
                  this app (or your terminal if you launched from the command line),
                  then quit and reopen WhatsKept.
                </div>
              </div>
            ) : backups.length === 0 ? (
              <div className="rounded-xl border border-dashed p-8 text-center text-sm text-gray-400" style={{borderColor:'#128C7E'}}>
                No backups found in ~/Library/Application Support/MobileSync/Backup
              </div>
            ) : (
              <div className="space-y-3">
                {backups.map(b => (
                  <BackupCard key={b.udid} backup={b} onDelete={setDeleteTarget}
                    isBound={!!(workspace.binding && workspace.binding.udid === b.udid)} />
                ))}
              </div>
            )}
          </section>

          {/* ── Run Backup ── */}
          <section>
            <h2 className="text-xs font-semibold uppercase tracking-wider mb-3" style={{color:'#075E54'}}>Run Backup</h2>
            {devices.length === 0 ? (
              <div className="rounded-xl border border-dashed p-4 text-sm flex items-center gap-3" style={{borderColor:'#128C7E',background:'#fff',color:'#128C7E'}}>
                <span>📱</span>
                <span>No device detected. Plug in your iPhone or iPad via USB, unlock it, and trust this Mac.</span>
              </div>
            ) : (() => {
              // Once the workspace is bound, the Run Backup picker is
              // scoped to that one device. Plugging in someone else's
              // iPhone shouldn't offer to back it up into this workspace.
              const allowed = workspace.binding
                ? devices.filter(d => d.udid === workspace.binding.udid)
                : devices;
              if (workspace.binding && allowed.length === 0) {
                return (
                  <div className="rounded-xl border border-dashed p-4 text-sm flex items-center gap-3"
                       style={{borderColor:'#128C7E',background:'#fff',color:'#128C7E'}}>
                    <span>🔌</span>
                    <span>Connect <span className="font-semibold">{workspace.binding.device_name}</span> via USB and unlock it to run a backup.</span>
                  </div>
                );
              }
              return (
                <div className="space-y-3">
                  {allowed.map(d => (
                    <DeviceRow key={d.udid} device={d} job={jobs[d.udid]} onStart={startBackup}
                      hasSessionPassword={hasSessionPassword} onForgetPassword={forgetSessionPassword} />
                  ))}
                </div>
              );
            })()}
          </section>
        </>)}

        {/* ══ AGENTS TAB ══ */}
        {tab === "agents" && <AgentsPanel workspace={workspace} />}

        {/* ══ DATABASE TAB ══ */}
        {tab === "database" && (
          <DatabaseTab
            dbStatus={dbStatus}
            reloadDbStatus={reloadDbStatus}
            job={jobs["db:sync"]}
            mediaJob={jobs["db:media-index"]}
            voiceJob={jobs["db:voice-index"]}
            modelJob={jobs["db:voice-model-download"]}
            onSync={startSync}
            onMediaIndex={startMediaIndex}
            onVoiceIndex={startVoiceIndex}
            onVoiceModelDownload={startVoiceModelDownload}
            hasSessionPassword={hasSessionPassword}
            onForgetPassword={forgetSessionPassword}
            binding={workspace.binding}
            onForgetBinding={forgetBinding}
          />
        )}

      </main>

      {deleteTarget && (
        <DeleteConfirmModal
          backup={deleteTarget}
          onClose={() => setDeleteTarget(null)}
          onDeleted={() => { setDeleteTarget(null); setBackupsKey(k => k + 1); }}
        />
      )}

      {deletingWs && (
        <WorkspaceDeleteModal
          workspace={workspace}
          onClose={() => setDeletingWs(false)}
          onDeleted={() => { setDeletingWs(false); onSwitchWorkspace(); }}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// Root App
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [workspace, setWorkspace] = useState(null);
  const [checking, setChecking]   = useState(true);

  // reloadWorkspace re-fetches /api/workspace/current and refreshes
  // the active workspace's binding without dropping to the picker
  // screen. Triggered after each sync (so a freshly-written
  // .whatskept.json shows up in the header immediately) and after
  // the Forget-identity action (so the label switches back to the
  // unbound state without a page reload).
  const reloadWorkspace = async () => {
    try {
      const ws = await api.get("/api/workspace/current");
      if (ws) setWorkspace(ws);
    } catch(e) {}
  };

  useEffect(() => {
    api.get("/api/workspace/current")
      .then(ws => { if (ws) setWorkspace(ws); })
      .catch(() => {})
      .finally(() => setChecking(false));
  }, []);

  if (checking) return (
    <div className="min-h-screen flex items-center justify-center text-sm" style={{background:'#ECE5DD',color:'#128C7E'}}>Loading…</div>
  );
  if (!workspace) return <WorkspaceScreen onOpen={setWorkspace} />;
  return <BackupManagerScreen workspace={workspace}
           onSwitchWorkspace={() => setWorkspace(null)}
           reloadWorkspace={reloadWorkspace} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
